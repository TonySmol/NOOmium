   */
  function dispatch(transition, payload) {
    // Валидация типа перехода
    if (!VALID_TRANSITIONS.has(transition)) {
      console.warn('[StateManager] Unknown transition:', transition);

    }
    
    var previousMode = state.uiMode;
    var previousFocusedItem = state.focusedItem;
    var partial = {};
    
    switch (transition) {

        partial.focusedItem = payload.item;
        partial.streamActive = false;
        partial.lists = { local: [], world: [], seren: [], focus: [] };

        }

          return false;

    }

  }

   * Возвращает текущий UI-режим.
   * Convenience getter для компонентов.
   * 
   * @returns {UIMode} Текущий режим.
   */
  function getUIMode() {
    return state.uiMode;
  }

  /**
   * Проверяет, активен ли указанный режим.
   * 
   * @param {UIMode} mode - Режим для проверки.
   * @returns {boolean} true если режим активен.
   */
  function isMode(mode) {
    return state.uiMode === mode && VALID_UI_MODES.has(mode);
  }

  /**
   * Возвращает вычисляемый флаг видимости сегментов.
   * Convenience getter для StreamViewComponent.
   * 
   * @returns {boolean} true если сегменты должны быть видны.
   */
  function shouldShowSegments() {
    return state.showSegments;
  }

  return {
    // Legacy API (для обратной совместимости)
    getState: getState,
    setState: setState,
    subscribe: subscribe,
    
    // State Machine API (новый, рекомендуемый)

/**
 * Стратегия Live Stream (режим IDLE).
 * 
 * Отвечает за:
 * - Управление подпиской на поток новых заметок из сети
 * - Хранение streamItems в памяти (эфемерно, привязано к пирам)
 * - Сортировку по created_at (новизна)
 * - Автоматическую очистку при отключении пиров
 * - Дедупликацию событий, пришедших с разных Nostr-релеев
 * - 🔑 Удаление заметок по событию net:deletion (Kind 21002)
 * 
 * Архитектурные решения:
 * - **Stateless execute:** принимает state, возвращает обновлённые данные
 * - **Эфемерность:** streamItems живут только в памяти, не сохраняются в БД
 * - **Привязка к пирам:** каждый элемент содержит peerPubkey для очистки
 * - **FIFO limit:** максимум 50 элементов для защиты от OOM
 * - **Дедупликация:** проверка уникальности id перед добавлением
 * - **Синхронизация удалений:** подписка на net:deletion для удаления заметок,
 *   отозванных автором через Kind 21002
 * 
 * @module LiveStreamStrategy
 */
DI.register('LiveStreamStrategy', function(Bus, Net, Config) {

  /**
   * Контроллер для управления подпиской на stream-события.
   * @type {AbortController | null}
   */
  var streamController = null;

  /**
   * Запускает подписку на Live Stream, если она ещё не активна.
   * Вызывается при переходе в режим IDLE.
   * 
   * 🔑 ИЗМЕНЕНИЕ v1.4.18: Добавлена подписка на net:deletion для обработки
   * Kind 21002 (уведомлений об удалении shared-заметок автором).
   * 
   * @returns {void}
   */
  function start() {
    if (streamController) return; // Уже запущен
    
    streamController = new AbortController();
    var signal = streamController.signal;
    
    // Подписка на stream-события с автоотпиской
    Bus.subscribe('net:stream-event', function(payload) {
      if (!payload || !payload.note) return;
      // Данные обрабатываются в Coordinator через dispatch('update-stream')
    }, signal);
    
    // Подписка на отключение пиров для очистки streamItems
    Bus.subscribe('net:peer-offline', function(payload) {
      if (!payload || !payload.pubkey) return;
      // Coordinator должен удалить все заметки этого пира из streamData
    }, signal);
    
    // 🔑 НОВОЕ: Подписка на уведомления об удалении заметок (Kind 21002)
    Bus.subscribe('net:deletion', function(payload) {
      if (!payload || !payload.id) return;
      // Coordinator удалит заметку из streamData через removeStreamItem
    }, signal);
    
    // Запуск сетевой подписки через Net
    if (Net && typeof Net.startLiveStream === 'function') {
      Net.startLiveStream();
    }
  }

  /**
   * Останавливает подписку на Live Stream.
   * Вызывается при выходе из режима IDLE.
   * 
   * @returns {void}
   */
  function stop() {
    if (streamController) {
      streamController.abort();
      streamController = null;
    }
    
    if (Net && typeof Net.stopLiveStream === 'function') {
      Net.stopLiveStream();
    }
  }

  /**
   * Выполняет стратегию: возвращает текущие streamItems.
   * Stateless метод для консистентности с другими стратегиями.
   * 
   * @param {AppState} state - Текущее состояние приложения.
   * @returns {Object} Объект с обновлёнными данными для dispatch.
   */
  function execute(state) {
    // Live Stream не выполняет поиск, только управляет подпиской
    // Данные приходят через net:stream-event и обновляются Coordinator'ом
    return {
      streamActive: true,
      streamData: state.streamData || []
    };
  }

  /**
   * Обновляет streamData: добавляет новую заметку в начало (FIFO).
   * 
   * 🔑 ИЗМЕНЕНИЕ v1.4.17: Добавлена дедупликация по id для защиты от повторов,
   * когда одно и то же Nostr-событие приходит через несколько релеев.
   * Обрезает до лимита для защиты от OOM.
   * 
   * @param {SearchResult[]} currentData - Текущий массив streamData.
   * @param {SearchResult} newNote - Новая заметка для добавления.
   * @returns {SearchResult[]} Обновлённый массив.
   */
  function addStreamItem(currentData, newNote) {
    // Защита от невалидных входных данных
    if (!newNote || !newNote.id) return currentData || [];
    
    var data = currentData || [];
    
    // Дедупликация: проверяем, есть ли уже элемент с таким id
    var exists = data.some(function(item) {
      return item && item.id === newNote.id;
    });
    
    // Если дубликат найден — возвращаем исходный массив без изменений
    if (exists) return data;
    
    // Добавляем новую заметку в начало (FIFO: самое свежее сверху)
    var newData = [newNote].concat(data);
    
    // Ограничение размера для защиты от OOM
    var limit = 50;
    if (newData.length > limit) {
      newData = newData.slice(0, limit);
    }
    
    return newData;
  }

  /**
   * Удаляет все заметки от указанного пира из streamData.
   * Вызывается при получении net:peer-offline.
   * 
   * @param {SearchResult[]} currentData - Текущий массив streamData.
   * @param {string} pubkey - Публичный ключ пира для удаления.
   * @returns {SearchResult[]} Отфильтрованный массив.
   */
  function removePeerItems(currentData, pubkey) {
    return (currentData || []).filter(function(item) {
      return item.fullPubkey !== pubkey;
    });
  }

  /**
   * 🔑 НОВЫЙ МЕТОД v1.4.18: Удаляет конкретную заметку из streamData по id.
   * 
   * Вызывается при получении события net:deletion (Kind 21002), когда автор
   * заметки уведомляет сеть об её удалении. Это обеспечивает синхронизацию
   * эфемерной ленты: если автор отозвал свою shared-заметку, она должна
   * исчезнуть у всех пиров, которые её получили.
   * 
   * @param {SearchResult[]} currentData - Текущий массив streamData.
   * @param {string} id - ID заметки для удаления.
   * @returns {SearchResult[]} Отфильтрованный массив.
   */
  function removeStreamItem(currentData, id) {
    if (!id) return currentData || [];
    return (currentData || []).filter(function(item) {
      return item && item.id !== id;
    });
  }

  return {
    start: start,
    stop: stop,
    execute: execute,
    addStreamItem: addStreamItem,
    removePeerItems: removePeerItems,
    removeStreamItem: removeStreamItem
  };
}, ['Bus', 'Net', 'Config']);

/**
 * Стратегия текстового поиска (режим SEARCH).
 * 
 * Отвечает за:
 * - Семантический поиск по локальной базе (local)
 * - Поиск по сетевым ответам (world)
 * - Режим озарений (seren) — близкие, но ниже порога
 * - Отправку запроса в сеть с вектором
 * 
 * Архитектурные решения:
 * - **AbortController:** каждый поиск создаёт свой контроллер для отмены
 * - **LRU-кэш:** использует AI.embed с внутренним кэшированием
 * - **Фильтрация по порогам:** local/world >= threshold, seren = threshold - serendipity
 * - **MAX_RESULTS_PER_LIST:** защита от тормозов UI при большой базе
 * 
 * @module TextSearchStrategy
 */
DI.register('TextSearchStrategy', function(AI, DB, Net, Config, StateManager) {

  /**
   * Максимальное количество результатов в каждом списке.
   * Защита от тормозов UI при большой базе (10000+ заметок).
   * @type {number}
   */
  var MAX_RESULTS_PER_LIST = 100;

  /**
   * Контроллер для отмены предыдущего поиска.
   * @type {AbortController | null}
   */
  var searchController = null;

  /**
   * Вектор последнего выполненного поискового запроса.
   * Используется для дедупликации сетевых запросов.
   * @type {Vector | null}
   */
  var lastVec = null;

  /**
   * Timestamp последнего поискового запроса.
   * @type {number}
   */
  var lastQuery = 0;

  /**
   * Кэш всех локальных заметок для оптимизации.
   * @type {Note[] | null}
   */
  var allNotesCache = null;

  /**
   * Timestamp последнего обновления кэша.
   * @type {number}
   */
  var allNotesCacheTime = 0;

  /**
   * Время жизни кэша (5 минут).
   * @type {number}
   */
  var ALL_NOTES_TTL = 5 * 60 * 1000;

  /**
   * Возвращает все заметки из базы, используя кэш.
   * @returns {Promise<Note[]>}
   */
  function getAllNotesCached() {
    var now = Date.now();
    if (allNotesCache && (now - allNotesCacheTime < ALL_NOTES_TTL)) {
      return Promise.resolve(allNotesCache);
    }
    return DB.all().then(function(notes) {
      allNotesCache = notes;
      allNotesCacheTime = now;
      return notes;
    });
  }

  /**
   * Сбрасывает кэш заметок (вызывается после мутаций БД).
   * @returns {void}
   */
  function invalidateNotesCache() {
    allNotesCache = null;
  }

  /**
   * Выполняет семантический поиск по тексту.
   * 
   * Алгоритм:
   * 1. Вычисляет вектор запроса через AI.embed
   * 2. Отправляет запрос в сеть (если вектор изменился)
   * 3. Ищет похожие заметки в локальной базе
   * 4. Фильтрует по порогам (local/world/seren)
   * 5. Возвращает списки для dispatch('update-lists')
   * 
   * @param {string} text - Поисковый запрос.
   * @param {boolean} [force=false] - Принудительная отправка в сеть.
   * @returns {Promise<Object>} Объект с lists для dispatch.
   */
  function execute(text, force) {
    var trimmed = (text || '').trim();
    
    // Если текст пуст, очищаем результаты
    if (!trimmed || !AI.ready()) {
      return Promise.resolve({
        lists: { local: [], world: [], seren: [], focus: [] }
      });
    }

    // Отменяем предыдущий поиск
    if (searchController) {
      searchController.abort();
    }
    searchController = new AbortController();
    var signal = searchController.signal;

    return AI.embed(trimmed).then(function(vec) {
      if (signal.aborted) return null;
      if (!vec) return null;

      // Определение необходимости отправки запроса в сеть
      var shouldSendToNet = false;
      if (!lastVec || AI.cosine(vec, lastVec) < Config.get('vectorSimilarityThreshold', 0.98) || force) {
        lastVec = vec;
        lastQuery = Date.now();
        shouldSendToNet = true;
      }

      return getAllNotesCached().then(function(notes) {
        if (signal.aborted) return null;

        // Отправка запроса в сеть (если нужно)
        if (shouldSendToNet && AI.getMode() === 'model') {
          var st = StateManager.getState();
          if (st.netAuthorized && Net && typeof Net.send === 'function') {
            Net.send(vec);
          }
        }

        // Подготовка локальных кандидатов
        var localCandidates = [];
        var localDataMap = new Map();
        for (var i = 0; i < notes.length; i++) {
          var note = notes[i];
          if (note && note.vector) {
            localCandidates.push({ id: note.id, vector: note.vector });
            localDataMap.set(note.id, note);
          }
        }

        // Получение активных ответов из сети
        var st2 = StateManager.getState();
        var worldAnswers = st2.netAuthorized && Net ? Net.activeAnswers() : [];

        // Запрос в AI для локальных заметок
        var processLocal = localCandidates.length > 0 
          ? AI.cosineBatch(vec, localCandidates, signal) 
          : Promise.resolve([]);

        return processLocal.then(function(localScores) {
          if (signal.aborted) return null;

          // Формирование локальных результатов
          var localScored = [];
          for (var k = 0; k < localScores.length; k++) {
            var s = localScores[k];
            var note = localDataMap.get(s.id);
            if (note) {
              localScored.push({
                id: note.id,
                text: note.text,
                vector: note.vector,
                score: s.score,
                shared: note.shared,
                createdAt: note.createdAt,
                parentId: note.parentId,
                children: note.children
              });
            }
          }

          // Формирование сетевых результатов
          var worldScored = [];
          for (var j = 0; j < worldAnswers.length; j++) {
            var answer = worldAnswers[j];
            if (answer && typeof answer.score === 'number') {
              worldScored.push({
                id: answer.id,
                text: answer.text,
                vector: answer.vector,
                score: answer.score,
                shared: true,
                peer: answer.peer,
                createdAt: answer.createdAt,
                parentId: answer.parentId,
                children: answer.children
              });
            }
          }

          // Фильтрация по порогам
          var threshold = Config.get('threshold', 0.7);
          var serendipityDelta = Config.get('serendipity', 0.3);
          var serenMin = threshold - serendipityDelta;

          var newLists = {
            local: localScored
              .filter(function(n) { return n.score >= threshold; })
              .sort(function(a, b) { return b.score - a.score; })
              .slice(0, MAX_RESULTS_PER_LIST),
            world: worldScored
              .filter(function(n) { return n.score >= threshold; })
              .sort(function(a, b) { return b.score - a.score; })
              .slice(0, MAX_RESULTS_PER_LIST),
            seren: localScored.concat(worldScored)
              .filter(function(n) { return n.score >= serenMin && n.score < threshold; })
              .sort(function(a, b) { return b.score - a.score; })
              .slice(0, MAX_RESULTS_PER_LIST),
            focus: [] // В режиме SEARCH focus пуст
          };

          return { lists: newLists };
        });
      });
    }).catch(function(err) {
      if (signal.aborted) return null;
      console.warn('[TextSearchStrategy] Search error:', err);
      return { lists: { local: [], world: [], seren: [], focus: [] } };
    }).finally(function() {
      searchController = null;
    });
  }

  /**
   * Очищает состояние стратегии (вызывается при destroy).
   * @returns {void}
   */
  function cleanup() {
    if (searchController) {
      searchController.abort();
      searchController = null;
    }
    lastVec = null;
    lastQuery = 0;
    allNotesCache = null;
  }

  return {
    execute: execute,
    getAllNotesCached: getAllNotesCached,
    invalidateNotesCache: invalidateNotesCache,
    cleanup: cleanup
  };
}, ['AI', 'DB', 'Net', 'Config', 'StateManager']);
<!-- NOOMIUM_MODULE_END TextSearchStrategy -->

/**
 * Стратегия поиска по вектору фокуса (режим FOCUS).
 * 
 * Отвечает за:
 * - Поиск похожих заметок по вектору закреплённой заметки
 * - Отправку вектора в сеть как поисковый запрос
 * - Throttle для предотвращения спама запросов при быстром "дрейфе"
 * - Объединение локальных и сетевых результатов в единый список
 * 
 * Архитектурные решения:
 * - **Throttle 1.5с:** защита от rate limit при быстром переключении фокуса
 * - **Единый список focus:** результаты не делятся на local/world/seren
 * - **MAX_RESULTS_PER_LIST:** защита от тормозов UI
 * - **AbortController:** отмена предыдущего поиска при смене фокуса
 * 
 * @module FocusSearchStrategy
 */
DI.register('FocusSearchStrategy', function(AI, DB, Net, Config, StateManager) {

  /**
   * Максимальное количество результатов в списке focus.
   * @type {number}
   */
  var MAX_RESULTS_PER_LIST = 100;

  /**
   * Задержка throttle для сетевых запросов (1.5 секунды).
   * @type {number}
   */
  var THROTTLE_DELAY = 1500;

  /**
   * Контроллер для отмены предыдущего поиска.
   * @type {AbortController | null}
   */
  var searchController = null;

  /**
   * Timestamp последнего сетевого запроса (для throttle).
   * @type {number}
   */
  var lastRequestTime = 0;

  /**
   * Отложенный вектор для отправки после throttle.
   * @type {Vector | null}
   */
  var pendingVector = null;

  /**
   * ID таймера throttle.
   * @type {number | null}
   */
  var throttleTimer = null;

  /**
   * Кэш всех локальных заметок.
   * @type {Note[] | null}
   */
  var allNotesCache = null;

  /**
   * Timestamp последнего обновления кэша.
   * @type {number}
   */
  var allNotesCacheTime = 0;

  /**
   * Время жизни кэша (5 минут).
   * @type {number}
   */
  var ALL_NOTES_TTL = 5 * 60 * 1000;

  /**
   * Возвращает все заметки из базы, используя кэш.
   * @returns {Promise<Note[]>}
   */
  function getAllNotesCached() {
    var now = Date.now();
    if (allNotesCache && (now - allNotesCacheTime < ALL_NOTES_TTL)) {
      return Promise.resolve(allNotesCache);
    }
    return DB.all().then(function(notes) {
      allNotesCache = notes;
      allNotesCacheTime = now;
      return notes;
    });
  }

  /**
   * Сбрасывает кэш заметок.
   * @returns {void}
   */
  function invalidateNotesCache() {
    allNotesCache = null;
  }

  /**
   * Отправляет вектор в сеть с throttle.
   * Если запрос был менее 1.5с назад, откладывает отправку.
   * 
   * @param {Vector} vector - Вектор для отправки.
   * @returns {void}
   */
  function sendWithThrottle(vector) {
    var now = Date.now();
    
    // Если прошло достаточно времени, отправляем сразу
    if (now - lastRequestTime >= THROTTLE_DELAY) {
      lastRequestTime = now;
      var st = StateManager.getState();
      if (st.netAuthorized && Net && typeof Net.send === 'function') {
        Net.send(vector);
      }
      pendingVector = null;
      return;
    }
    
    // Иначе откладываем
    pendingVector = vector;
    if (throttleTimer) clearTimeout(throttleTimer);
    
    throttleTimer = setTimeout(function() {
      if (pendingVector) {
        lastRequestTime = Date.now();
        var st = StateManager.getState();
        if (st.netAuthorized && Net && typeof Net.send === 'function') {
          Net.send(pendingVector);
        }
        pendingVector = null;
      }
      throttleTimer = null;
    }, THROTTLE_DELAY - (now - lastRequestTime));
  }

  /**
   * Выполняет поиск по вектору фокуса.
   * 
   * Алгоритм:
   * 1. Отправляет вектор в сеть (с throttle)
   * 2. Ищет похожие заметки в локальной базе
   * 3. Получает ответы из сети
   * 4. Объединяет и сортирует по score
   * 5. Возвращает единый список focus
   * 
   * @param {Vector} vector - Вектор закреплённой заметки.
   * @returns {Promise<Object>} Объект с lists для dispatch.
   */
  function execute(vector) {
    if (!vector || !AI.ready()) {
      return Promise.resolve({ lists: { local: [], world: [], seren: [], focus: [] } });
    }

    // Отменяем предыдущий поиск
    if (searchController) {
      searchController.abort();
    }
    searchController = new AbortController();
    var signal = searchController.signal;

    // Отправляем вектор в сеть с throttle
    sendWithThrottle(vector);

    return getAllNotesCached().then(function(notes) {
      if (signal.aborted) return null;

      // Подготовка локальных кандидатов
      var localCandidates = [];
      var localDataMap = new Map();
      for (var i = 0; i < notes.length; i++) {
        if (notes[i] && notes[i].vector) {
          localCandidates.push({ id: notes[i].id, vector: notes[i].vector });
          localDataMap.set(notes[i].id, notes[i]);
        }
      }

      // Запрос в AI для локальных заметок
      var processLocal = localCandidates.length > 0 
        ? AI.cosineBatch(vector, localCandidates, signal) 
        : Promise.resolve([]);

      return processLocal.then(function(localScores) {
        if (signal.aborted) return null;

        // Формирование списка локальных результатов
        var localScored = [];
        for (var k = 0; k < localScores.length; k++) {
          var note = localDataMap.get(localScores[k].id);
          if (note) {
            localScored.push({
              id: note.id,
              text: note.text,
              vector: note.vector,
              score: localScores[k].score,
              shared: note.shared,
              createdAt: note.createdAt,
              parentId: note.parentId,
              children: note.children
            });
          }
        }

        // Получение активных ответов из сети
        var state = StateManager.getState();
        var worldAnswers = state.netAuthorized && Net ? Net.activeAnswers() : [];
        var worldScored = [];
        for (var j = 0; j < worldAnswers.length; j++) {
          var answer = worldAnswers[j];
          if (answer && typeof answer.score === 'number') {
            worldScored.push({
              id: answer.id,
              text: answer.text,
              vector: answer.vector,
              score: answer.score,
              shared: true,
              peer: answer.peer,
              createdAt: answer.createdAt,
              parentId: answer.parentId,
              children: answer.children
            });
          }
        }

        // В режиме фокуса всё объединяем в одну ленту
        var combined = localScored.concat(worldScored)
          .sort(function(a, b) { return b.score - a.score; })
          .slice(0, MAX_RESULTS_PER_LIST);

        return {
          lists: {
            local: [],
            world: [],
            seren: [],
            focus: combined
          }
        };
      });
    }).catch(function(err) {
      if (signal.aborted) return null;
      console.warn('[FocusSearchStrategy] Search error:', err);
      return { lists: { local: [], world: [], seren: [], focus: [] } };
    }).finally(function() {
      searchController = null;
    });
  }

  /**
   * Очищает состояние стратегии.
   * @returns {void}
   */
  function cleanup() {
    if (searchController) {
      searchController.abort();
      searchController = null;
    }
    if (throttleTimer) {
      clearTimeout(throttleTimer);
      throttleTimer = null;
    }
    pendingVector = null;
    lastRequestTime = 0;
    allNotesCache = null;
  }

  return {
    execute: execute,
    getAllNotesCached: getAllNotesCached,
    invalidateNotesCache: invalidateNotesCache,
    cleanup: cleanup
  };
}, ['AI', 'DB', 'Net', 'Config', 'StateManager']);
<!-- NOOMIUM_MODULE_END FocusSearchStrategy -->

/**
 * Координатор поисковых стратегий.
 * 
 * Отвечает за:
 * - Подписку на события смены контекста (ввод текста, фокус, очистка)
 * - Выбор стратегии на основе текущего uiMode и состояния редактора
 * - Вызов StateManager.dispatch для переходов между режимами
 * - Делегирование работы стратегиям и передачу результатов обратно
 * - 🔑 Обработку сетевых удалений (net:deletion) для очистки lists
 * 
 * 🔑 КЛЮЧЕВЫЕ ИЗМЕНЕНИЯ v1.4.18 (СТАБИЛИЗАЦИЯ):
 * 
 * 1. **Приоритет текста над закрепом:**
 *    При наличии текста в редакторе ВСЕГДА выполняется текстовый поиск,
 *    даже если активен закреп (focusedItem). Это соответствует новому
 *    поведению StateManager, где focusedItem сохраняется при переходе
 *    в search.
 * 
 * 2. **Обработка net:deletion:**
 *    При получении уведомления об удалении заметки (Kind 21002) из списков
 *    результатов (world, seren) удаляется соответствующая запись. Это
 *    обеспечивает консистентность UI с эфемерной природой сети.
 * 
 * 3. **Корректная работа с queryId:**
 *    Стратегии получают текущий queryId от Net для фильтрации world-ответов,
 *    что предотвращает смешивание результатов от разных запросов.
 * 
 * Архитектурные решения:
 * - **Event-driven:** реагирует на события Bus, а не вызывается напрямую
 * - **State machine aware:** использует StateManager.dispatch для переходов
 * - **Strategy pattern:** делегирует работу LiveStream/TextSearch/FocusSearch
 * - **AbortController:** все подписки привязаны к signal для автоочистки
 * 
 * @module SearchCoordinator
 */
DI.register('SearchCoordinator', function(
  Bus, StateManager, LiveStreamStrategy, TextSearchStrategy, FocusSearchStrategy, Net
) {

  /**
   * Контроллер для управления всеми подписками.
   * @type {AbortController | null}
   */
  var abortController = null;

  /**
   * Инициализирует координатор: подписывается на события и запускает начальную стратегию.
   * 
   * 🔑 ИЗМЕНЕНИЯ v1.4.18:
   * - Добавлена подписка на net:deletion для удаления заметок из lists
   * - Улучшена логика приоритета текста над закрепом
   * 
   * @returns {void}
   */
  function init() {
    if (abortController) return; // Уже инициализирован
    
    abortController = new AbortController();
    var signal = abortController.signal;

    /**
     * Подписка на запрос поиска из редактора.
     * 
     * 🔑 ЛОГИКА ПРИОРИТЕТА v1.4.18:
     * - Если есть текст → текстовый поиск (игнорируем закреп)
     * - Если нет текста, но есть закреп → поиск по вектору закрепа
     * - Если нет ни текста, ни закрепа → Live Stream
     */
    Bus.subscribe('editor:search-request', function(payload) {
      var state = StateManager.getState();
      var editor = document.getElementById('ed-ta');
      var text = editor ? editor.value.trim() : '';
      
      if (text) {
        // Есть текст → текстовый поиск имеет приоритет над закрепом
        // dispatch('to-search') НЕ сбросит focusedItem благодаря новому StateManager
        StateManager.dispatch('to-search');
        executeTextSearch(text, payload && payload.force);
      } else if (state.focusedItem && state.focusedItem.vector) {
        // Нет текста, но есть закреп → поиск по вектору закрепа
        // Переходим в focus режим, если ещё не там
        if (state.uiMode !== 'focus') {
          StateManager.dispatch('to-focus', { item: state.focusedItem });
        }
        executeFocusSearch(state.focusedItem.vector);
      } else {
        // Нет текста и закрепа → Live Stream
        StateManager.dispatch('to-idle');
        LiveStreamStrategy.start();
      }
    }, signal);

    /**
     * Подписка на завершение отправки заметки (нужно обновить списки).
     */
    Bus.subscribe('editor:send-complete', function() {
      var state = StateManager.getState();
      var editor = document.getElementById('ed-ta');
      var text = editor ? editor.value.trim() : '';
      
      if (text) {
        // Есть текст → обновляем текстовый поиск
        executeTextSearch(text, true);
      } else if (state.focusedItem && state.focusedItem.vector) {
        // Есть закреп → обновляем поиск по вектору
        executeFocusSearch(state.focusedItem.vector);
      }
    }, signal);

    /**
     * Подписка на stream-события для обновления streamData.
     */
    Bus.subscribe('net:stream-event', function(payload) {
      if (!payload || !payload.note) return;
      var state = StateManager.getState();
      
      if (state.uiMode === 'idle') {
        var newData = LiveStreamStrategy.addStreamItem(state.streamData, payload.note);
        StateManager.dispatch('update-stream', { streamData: newData });
      }
    }, signal);

    /**
     * Подписка на отключение пиров для очистки streamData.
     */
    Bus.subscribe('net:peer-offline', function(payload) {
      if (!payload || !payload.pubkey) return;
      var state = StateManager.getState();
      
      if (state.uiMode === 'idle') {
        var filteredData = LiveStreamStrategy.removePeerItems(state.streamData, payload.pubkey);
        StateManager.dispatch('update-stream', { streamData: filteredData });
      }
    }, signal);

    /**
     * 🔑 НОВАЯ ПОДПИСКА v1.4.18: Обработка сетевых удалений (Kind 21002).
     * 
     * При получении уведомления об удалении заметки:
     * 1. Удаляем из streamData (если в Live Stream)
     * 2. Удаляем из lists.world и lists.seren (если в режиме поиска)
     * 3. Удаляем из lists.focus (если в режиме фокуса)
     * 
     * Это обеспечивает консистентность UI: если автор отозвал свою shared-заметку,
     * она должна исчезнуть у всех пиров.
     */
    Bus.subscribe('net:deletion', function(payload) {
      if (!payload || !payload.id) return;
      var deletedId = payload.id;

      if (filteredWorld.length !== newLists.world.length) {

      if (filteredSeren.length !== newLists.seren.length) {

   * Публичный метод для запуска поиска по вектору извне.
   * Используется при активации фокуса.
   * 
   * @param {Vector} vector - Вектор для поиска.

   */
  function searchByVector(vector) {

/**
 * Фасад для обратной совместимости с существующим API.
 * 
 * Делегирует всю работу SearchCoordinator и стратегиям.
 * Сохраняет публичный API для компонентов, которые ещё не мигрированы.
 * 
 * @module SearchService
 */
DI.register('SearchService', function(
  SearchCoordinator, TextSearchStrategy, FocusSearchStrategy, StateManager, Bus, I18n, Toast, Logger, Utils, AI, Net, DB
) {

  /**
   * Инициализирует сервис (запускает координатор).
   * @returns {void}
   */
  function init() {
    SearchCoordinator.init();
    
    // Подписка на изменения БД для сброса кэша
    Bus.on('db:change', function() {
      TextSearchStrategy.invalidateNotesCache();
      FocusSearchStrategy.invalidateNotesCache();
    });
  }

  /**
   * Выполняет семантический поиск (делегирование в Coordinator).
   * 
   * @param {string} text - Поисковый запрос.
   * @param {boolean} [force=false] - Принудительная отправка в сеть.
   * @returns {Promise<void>}
   */
  function search(text, force) {
    return SearchCoordinator.search(text, force);
  }

  /**
   * Поиск по готовому вектору (делегирование в Coordinator).
   * 
   * @param {Vector} vector - Вектор запроса.
   * @returns {Promise<void>}
   */
  function searchByVector(vector) {
    return SearchCoordinator.searchByVector(vector);
  }

  /**
   * Сохраняет новую мысль в локальную базу и опционально публикует в сеть.
   * 
   * @param {string} text - Текст мысли.
   * @param {SendMode} mode - Режим отправки ('private' или 'world').
   * @param {string} [parentId] - ID родительской заметки.
   * @returns {Promise<void>}
   */
  function send(text, mode, parentId) {
    if (StateManager.getState().sendLock) return Promise.resolve();

    var trimmedText = (text || '').trim();
    if (!trimmedText) {
      Toast.show('warn', I18n.t('toast.empty'));
      return Promise.resolve();
    }

    if (!AI.ready()) {
      Toast.show('err', I18n.t('toast.ai.notready'));
      return Promise.resolve();
    }

    var state = StateManager.getState();
    if (mode === 'world' && !state.netAuthorized) {
      if (state.requestNetworkAuth) {
        state.requestNetworkAuth(function() {
          send(trimmedText, mode, parentId);
        });
      }
      return Promise.resolve();
    }

    var isWorld = mode === 'world';
    StateManager.setState({ sendLock: true });

    var newId = 'n' + Date.now().toString(36) + Math.random().toString(36).slice(2, 6);

    return AI.embed(trimmedText)
      .then(function(vector) {
        var noteObj = {
          id: newId,
          text: trimmedText,
          vector: vector,
          shared: !!isWorld,
          createdAt: Date.now()
        };
        if (parentId) noteObj.parentId = parentId;
        return DB.put(noteObj).then(function() { return noteObj; });
      })
      .then(function(savedNote) {
        if (parentId) {
          DB.addChild(parentId, savedNote.id);
        }
        if (savedNote.shared && Net && typeof Net.publishNote === 'function') {
          Net.publishNote(savedNote, parentId);
        }
        Toast.show('ok', isWorld ? I18n.t('toast.saved.public') : I18n.t('toast.saved.private'));
      })
      .catch(function(err) {
        Toast.show('err', String(err && err.message || err) || 'Send failed');
        if (Logger) Logger.warn('SearchService.send error', String(err && err.message || err));
      })
      .finally(function() {
        StateManager.setState({ sendLock: false });
      });
  }

  /**
   * Возвращает режим отправки.
   * @returns {SendMode}
   */
  function getSendMode() {
    return StateManager.getState().sendMode;
  }

  /**
   * Устанавливает режим отправки.
   * @param {SendMode} mode - Новый режим.
   * @returns {void}
   */
  function setSendMode(mode) {
    StateManager.setState({ sendMode: mode });
  }

  /**
   * Проверяет, заблокирована ли кнопка отправки.
   * @returns {boolean}
   */
  function isSending() {
    return StateManager.getState().sendLock;
  }

  /**
   * Возвращает кэш всех заметок.
   * @returns {Promise<Note[]>}
   */
  function getAllNotesCached() {
    return TextSearchStrategy.getAllNotesCached();
  }

  /**
   * Сбрасывает кэш заметок.
   * @returns {void}
   */
  function invalidateNotesCache() {
    TextSearchStrategy.invalidateNotesCache();
    FocusSearchStrategy.invalidateNotesCache();
  }

  return {
    init: init,
    search: search,
    searchByVector: searchByVector,
    send: send,
    getSendMode: getSendMode,
    setSendMode: setSendMode,
    isSending: isSending,
    getAllNotesCached: getAllNotesCached,
    invalidateNotesCache: invalidateNotesCache
  };
}, ['SearchCoordinator', 'TextSearchStrategy', 'FocusSearchStrategy', 'StateManager', 'Bus', 'I18n', 'Toast', 'Logger', 'Utils', 'AI', 'Net', 'DB']);

/**
 * Компонент редактора мыслей.
 * 
 * Отвечает за:
 * - Поле ввода текста (textarea)
 * - Счётчик символов
 * - Переключатель режима отправки (Личное/Мир)
 * - Кнопку отправки с индикатором загрузки
 * - Debounce поисковых запросов
 * - Управление Live Stream при вводе текста
 * - 🔑 State machine transitions с учётом закрепа (v1.4.18)
 * 
 * 🔑 КЛЮЧЕВЫЕ ИЗМЕНЕНИЯ v1.4.18 (СТАБИЛИЗАЦИЯ ЗАКРЕПА):
 * 
 * Логика `onInput` переработана для корректной работы с закрепом:
 * 
 * - **При вводе текста:** `dispatch('to-search')` — переход в режим поиска.
 *   Благодаря изменениям в StateManager, `focusedItem` НЕ сбрасывается,
 *   поэтому закреп остаётся видимым. Поиск идёт по тексту (обрабатывается
 *   в SearchCoordinator).
 * 
 * - **При очистке текста с закрепом:** `dispatch('to-focus', {item})` —
 *   возврат в режим фокуса с автоматическим запуском поиска по вектору
 *   закреплённой заметки через `SearchService.searchByVector()`.
 * 
 * - **При очистке текста без закрепа:** `dispatch('to-idle')` — переход
 *   в Live Stream.
 * 
 * Это обеспечивает плавное переключение между режимами без потери контекста
 * и без flickering интерфейса.
 * 
 * Безопасность:
 * - Все пользовательские данные вставляются через textContent (XSS-safe).
 * - Placeholder экранируется через Utils.esc при генерации HTML.
 * 
 * Управление памятью:
 * - Использует AbortController для автоматической отписки при destroy().
 * - Все DOM-обработчики привязываются к signal.
 * - Таймеры (debounce) очищаются при destroy().

 */
DI.register('EditorComponent', function(Bus, I18n, Utils, SearchService, Config, StateManager, Net) {

  /** @type {HTMLTextAreaElement | null} */
  var editor = null;

  /** @type {HTMLElement | null} */
  var counter = null;

  /** @type {HTMLButtonElement | null} */
  var sendBtn = null;

  /** @type {HTMLElement | null} */
  var modeToggle = null;

  /** @type {number | null} ID таймера debounce для поиска */
  var searchTimer = null;

  /** @type {AbortController | null} Контроллер для автоотписки */
  var abortController = null;

  /**
   * Обновляет ссылки на DOM-элементы.
   * Вызывается при каждом обращении, так как DOM может быть пересоздан после refreshUI.
   * @returns {void}
   */
  function refreshDOM() {
    editor = document.getElementById('ed-ta');
    counter = document.getElementById('ed-cnt');
    sendBtn = document.getElementById('btn-send');
    modeToggle = document.getElementById('mode-toggle');
  }

  /**
   * Возвращает текущий текст из поля ввода.
   * @returns {string}
   */
  function getValue() {
    if (!editor) refreshDOM();
    return editor ? editor.value : '';

  /**
   * Устанавливает текст в поле ввода и обновляет счётчик символов.
   * @param {string} val - Новый текст.
   * @returns {void}

  function setValue(val) {
    if (!editor) refreshDOM();
    if (editor) {
      editor.value = val;
      updateCounter();
    }
  }

  /**
   * Очищает поле ввода.
   * @returns {void}
   */
  function clear() {
    setValue('');
  }

  /**
   * Пересчитывает и отображает количество символов в UI с учетом локализации.
   * @returns {void}

  function updateCounter() {

    if (counter) {

      counter.textContent = Utils.word('symbols', value.length, I18n.getLang());

   * 
   * @param {SendMode} mode - Активный режим ('private' | 'world').
   * @returns {void}
   */
  function updateSendMode(mode) {
    SearchService.setSendMode(mode);
    if (!modeToggle) refreshDOM();
    if (!modeToggle) return;
    
    modeToggle.setAttribute('data-mode', mode);
    var opts = modeToggle.querySelectorAll('.tog-sw-opt');
    for (var i = 0; i < opts.length; i++) {
      var opt = opts[i];
      if (opt.getAttribute('data-v') === mode) {

      } else {

      }

   * @returns {void}

    if (!sendBtn) return;

      sendBtn.disabled = true;
      sendBtn.innerHTML = SPINNER_SVG;

  /**

   * @returns {void}

    if (!editor) refreshDOM();
    if (editor) {
      editor.placeholder = I18n.t('ed.placeholder');
    }
    updateCounter();
    
    if (!modeToggle) refreshDOM();
    if (modeToggle) {
      var opts = modeToggle.querySelectorAll('.tog-sw-opt');
      for (var i = 0; i < opts.length; i++) {
        var opt = opts[i];
        var v = opt.getAttribute('data-v');
        if (v === 'private') opt.textContent = I18n.t('btn.private');
        else if (v === 'world') opt.textContent = I18n.t('btn.public');
      }
    }
    
    if (sendBtn) {
      sendBtn.setAttribute('aria-label', I18n.t('btn.send'));
    }
  }

  /**
   * Обрабатывает клик по кнопке отправки:
   * 1. Сбрасывает таймер поиска.
   * 2. Извлекает parentId из StateManager (если активен фокус).
   * 3. Запускает сохранение через SearchService.

    if (searchTimer) {
      clearTimeout(searchTimer);
      searchTimer = null;
    }

    var text = getValue().trim();
    var mode = SearchService.getSendMode();
    var state = StateManager.getState();
    var parentId = null;

    // Логика Parent/Child: если активен фокус, привязываем заметку к родителю
    if (state.uiMode === 'focus' && state.focusedItem && state.focusedItem.id) {

      .then(function() {

    if (!abortController) return;
    var signal = abortController.signal;

    if (editor) {

        updateCounter();
        var val = getValue().trim();
        var state = StateManager.getState();

          }

          if (Bus && Bus.emit) {
            try { Bus.emit('editor:search-request', { force: false }); } catch (_) { /* ignore */ }

    onInput = onSendClick = onModeClick = null;

    init: init,
    destroy: destroy,
    getValue: getValue,
    setValue: setValue,
    clear: clear,

/**
 * Компонент панели фокуса (Focus Bar).
 * 
 * Отображает закреплённую заметку вверху интерфейса при активном Focus Mode.
 * Позволяет пользователю видеть текущий контекст поиска и снимать фокус.
 * 
 * 🔑 КЛЮЧЕВЫЕ ИЗМЕНЕНИЯ v1.4.18 (СТАБИЛИЗАЦИЯ ЗАКРЕПА):
 * 
 * Логика кнопки «Снять фокус» (✕) переработана с учётом состояния редактора:
 * 
 * - **При наличии текста в редакторе:** сбрасывает только `focusedItem` через
 *   `StateManager.setState({ focusedItem: null })`, НЕ меняя `uiMode`.
 *   Благодаря обновлённому `syncDerivedFields()` в StateManager, `showSegments`
 *   автоматически становится `true` (так как `uiMode === 'search'` и
 *   `focusedItem === null`), и плашка сегментов мгновенно появляется без
 *   мерцания. Затем запускается поиск по текущему тексту через
 *   `SearchService.search(editorVal, true)`.
 * 
 * - **При пустом редакторе:** выполняется стандартный переход
 *   `StateManager.dispatch('to-idle')` с активацией Live Stream.
 * 
 * Это обеспечивает плавное UX-переключение без мерцания интерфейса и без
 * потери контекста поиска при снятии закрепа.
 * 
 * Безопасность:
 * - Не использует innerHTML с пользовательскими данными (XSS-safe).
 * - Все текстовые данные вставляются через textContent.
 * 
 * Управление памятью:
 * - Использует AbortController для автоматической отписки при destroy().
 * - DOM-ссылки обновляются при каждом render() (защита от устаревших нод).
 * 
 * @module FocusBarComponent
 */
DI.register('FocusBarComponent', function(Bus, I18n, StateManager, SearchService) {

  /** @type {HTMLDivElement | null} Контейнер для панели фокуса */
  var container = null;
  
  /** @type {AbortController | null} Контроллер для автоотписки */
  var abortController = null;

  /**
   * Обновляет ссылку на DOM-контейнер.
   * Вызывается при каждом рендере, так как DOM может быть пересоздан после refreshUI.
   * @returns {void}
   */
  function ensureDOM() {
    container = document.getElementById('focus-bar');
  }

  /**
   * Создаёт DOM-структуру панели фокуса.
   * Безопасная альтернатива innerHTML: все элементы создаются через createElement,
   * текстовые данные вставляются через textContent (защита от XSS).
   * 
   * @param {string} text - Текст закреплённой заметки (экранируется автоматически).
   * @param {string} peer - Идентификатор пира или "вы" (экранируется автоматически).
   * @returns {HTMLDivElement} Корневой элемент панели.
   */
  function buildFocusBarUI(text, peer) {
    var wrapper = document.createElement('div');
    wrapper.className = 'focus-bar-inner';
    
    // Текстовый блок
    var textEl = document.createElement('div');
    textEl.className = 'focus-text';
    textEl.textContent = text; // textContent автоматически экранирует HTML
    wrapper.appendChild(textEl);
    
    // Мета-блок (peer + кнопка закрытия)
    var metaEl = document.createElement('div');
    metaEl.className = 'focus-meta';
    
    var peerEl = document.createElement('span');
    peerEl.className = 'focus-peer';
    peerEl.textContent = peer; // textContent автоматически экранирует HTML
    metaEl.appendChild(peerEl);
    
    var unfocusBtn = document.createElement('button');
    unfocusBtn.className = 'focus-unfocus';
    unfocusBtn.setAttribute('aria-label', I18n.t('btn.unfocus'));
    unfocusBtn.textContent = '✕';
    
    /**
     * 🔑 КЛЮЧЕВОЙ ОБРАБОТЧИК v1.4.18:
     * 
     * Снятие фокуса с учётом состояния редактора:
     * 
     * 1. Если в редакторе есть текст:
     *    - Сбрасываем ТОЛЬКО `focusedItem` через setState (без смены uiMode)
     *    - `StateManager.syncDerivedFields()` автоматически пересчитает `showSegments = true`,
     *      потому что uiMode='search' и focusedItem=null
     *    - Принудительно показываем плашку сегментов (для мгновенной реакции UI)
     *    - Запускаем поиск по текущему тексту
     *    - Результат: плавное появление сегментов без мерцания
     * 
     * 2. Если редактор пуст:
     *    - Стандартный переход в IDLE (Live Stream)
     *    - `dispatch('to-idle')` сбросит focusedItem и активирует streamActive
     */
    unfocusBtn.onclick = function() {
      var editor = document.getElementById('ed-ta');
      var editorVal = editor ? editor.value.trim() : '';
      
      if (editorVal) {
        // Текст есть: сбрасываем только focusedItem, не меняя uiMode
        // syncDerivedFields() в StateManager автоматически пересчитает showSegments
        StateManager.setState({ focusedItem: null });
        
        // Принудительно показываем плашку сегментов для мгновенной визуальной реакции
        // (до того, как сработает подписчик StateManager)
        var segBlock = document.querySelector('.seg');
        if (segBlock) {
          segBlock.style.display = '';
        }
        
        // Запускаем поиск по текущему тексту (force=true для принудительной сетевой отправки)
        SearchService.search(editorVal, true);
      } else {
        // Текст пуст: стандартный переход в IDLE (Live Stream)
        StateManager.dispatch('to-idle');
        // Запускаем поиск с пустым текстом для корректной инициализации Live Stream
        SearchService.search('', true);
      }
    };
    
    metaEl.appendChild(unfocusBtn);
    wrapper.appendChild(metaEl);
    
    return wrapper;
  }

  /**
   * Рендерит панель фокуса в зависимости от текущего состояния.
   * 
   * Логика отображения:
   * - Если uiMode === 'focus' && focusedItem: показываем панель, скрываем seg-блок.
   * - Если uiMode === 'search' && focusedItem: показываем панель, скрываем seg-блок.
   *   (Это состояние возникает, когда пользователь ввёл текст при активном закрепе)
   * - Иначе: скрываем панель, видимость seg-блока управляется через showSegments.
   * 
   * @returns {void}
   */
  function render() {
    if (!container) ensureDOM();
    if (!container) return;
    
    var state = StateManager.getState();
    var segBlock = document.querySelector('.seg');

    // 🔑 ИЗМЕНЕНИЕ v1.4.18: показываем FocusBar не только в режиме focus,
    // но и в режиме search, если есть focusedItem (когда пользователь вводит
    // текст при активном закрепе)
    var shouldShowFocusBar = state.focusedItem && 
                             (state.uiMode === 'focus' || state.uiMode === 'search');

    if (shouldShowFocusBar) {
      container.style.display = 'block';
      if (segBlock) segBlock.style.display = 'none';

      // Очистка старого содержимого
      while (container.firstChild) {
        container.removeChild(container.firstChild);
      }

      // Безопасное построение UI
      var text = state.focusedItem.text || '';
      if (text.length > 100) text = text.substring(0, 100) + '…';
      var peer = state.focusedItem.peer || I18n.t('focus.you');

      var ui = buildFocusBarUI(text, peer);
      container.appendChild(ui);
    } else {
      container.style.display = 'none';
      // Видимость seg-блока управляется через state.showSegments
      // (который теперь корректно вычисляется в StateManager)
      if (segBlock) segBlock.style.display = state.showSegments ? '' : 'none';
    }
  }

  /**
   * Инициализирует компонент: подписывается на изменения состояния и смену языка.
   * Использует AbortController для автоматической отписки при destroy().
   * Выполняет первый рендер.
   * 
   * @returns {void}
   */
  function init() {
    ensureDOM();
    
    // Создаём AbortController для автоотписки
    abortController = new AbortController();
    var signal = abortController.signal;
    
    // Подписка на изменения состояния с автоотпиской
    var stateUnsubscribe = StateManager.subscribe(render);
    
    // Регистрируем отписку через signal
    signal.addEventListener('abort', function() {
      stateUnsubscribe();
    }, { once: true });
    
    // Подписка на смену языка с автоотпиской
    Bus.subscribe('i18n:change', render, signal);
    
    render();
  }

  /**
   * Уничтожает компонент: отписывается от всех событий через AbortController.
   * Очищает DOM-ссылки для предотвращения утечек памяти.
   * 
   * @returns {void}
   */
  function destroy() {
    if (abortController) {
      abortController.abort(); // Автоматически отписывает все Bus.subscribe
      abortController = null;
    }
    container = null;
  }

  return {
    /**
     * Инициализирует компонент (публичный API).
     * @returns {void}
     */
    init: init,

    /**
     * Уничтожает компонент (публичный API).
     * @returns {void}
     */
    destroy: destroy
  };
}, ['Bus', 'I18n', 'StateManager', 'SearchService']);

  DI.register('AuthService', function(Config, Logger, Bus, DB) {

    /** @type {string} Ключ для хранения секретного ключа Nostr */
    var SK_KEY = 'noomium:sk';

    /** @type {string} Ключ для хранения конфигурации */
    var CFG_KEY = 'noomium:cfg';

    /** @type {string} Ключ для хранения версии приложения */
    var VER_KEY = 'noomium:appVersion';

    /** @type {string} Ключ для хранения выбранного языка */
    var LANG_KEY = 'noomium:lang';

    /** @type {number} Максимально допустимое количество попыток ввода пароля */
    var maxAttempts = Config.get('maxPasswordAttempts', 3);

    /** @type {number} Текущий счётчик неудачных попыток */
    var currentAttempts = 0;

    /**
     * Выводит ключ AES-GCM из пароля через PBKDF2 (100k итераций, SHA-256).
     * Использует Web Crypto API для безопасной деривации ключа.
     * 
     * @param {string} password - Пароль пользователя.
     * @param {Uint8Array} salt - Соль для PBKDF2 (16 байт).
     * @returns {Promise<CryptoKey>} Promise с CryptoKey для шифрования/дешифрования.
     */
    function deriveKey(password, salt) {
      var enc = new TextEncoder();
      return crypto.subtle.importKey('raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']).then(function(keyMaterial) {
        return crypto.subtle.deriveKey(
          { name: 'PBKDF2', salt: salt, iterations: 100000, hash: 'SHA-256' },
          keyMaterial,
          { name: 'AES-GCM', length: 256 },
          false,
          ['encrypt', 'decrypt']
        );
      });
    }

    /**
     * Шифрует hex-ключ паролем с использованием AES-GCM.
     * Формат результата: Base64(salt[16] + iv[12] + ciphertext[N]).
     * 
     * @param {string} hexKey - Секретный ключ в hex-формате (64 символа).
     * @param {string} password - Пароль для шифрования.
     * @returns {Promise<string>} Promise с Base64-строкой (salt + iv + ciphertext).
     */
    function encryptKey(hexKey, password) {
      var salt = crypto.getRandomValues(new Uint8Array(16));
      var iv = crypto.getRandomValues(new Uint8Array(12));
      return deriveKey(password, salt).then(function(key) {
        var enc = new TextEncoder();
        return crypto.subtle.encrypt({ name: 'AES-GCM', iv: iv }, key, enc.encode(hexKey)).then(function(ciphertext) {
          var combined = new Uint8Array(salt.length + iv.length + ciphertext.byteLength);
          combined.set(salt, 0);
          combined.set(iv, salt.length);
          combined.set(new Uint8Array(ciphertext), salt.length + iv.length);
          return btoa(String.fromCharCode.apply(null, combined));
        });
      });
    }

    /**
     * Расшифровывает hex-ключ из Base64-строки с использованием пароля.
     * Извлекает salt и iv из первых 28 байт, остальное — ciphertext.
     * 
     * @param {string} base64Str - Зашифрованная строка (salt + iv + ciphertext).
     * @param {string} password - Пароль для дешифрования.
     * @returns {Promise<string>} Promise с расшифрованным hex-ключом.
     * @throws {Error} Если пароль неверный или данные повреждены.
     */
    function decryptKey(base64Str, password) {
      var combined = Uint8Array.from(atob(base64Str), function(c) { return c.charCodeAt(0); });
      var salt = combined.slice(0, 16);
      var iv = combined.slice(16, 28);
      var ciphertext = combined.slice(28);
      return deriveKey(password, salt).then(function(key) {
        return crypto.subtle.decrypt({ name: 'AES-GCM', iv: iv }, key, ciphertext).then(function(dec) {
          return new TextDecoder().decode(dec);
        });
      });
    }

    /**
     * Читает сырое значение секретного ключа из localStorage.
     * Может быть либо hex-строка (64 символа), либо Base64 (зашифрованный).
     * 
     * @returns {string | null}
     */
    function getStoredKey() {
      try { return localStorage.getItem(SK_KEY); } catch (e) { return null; }
    }

    /**
     * Проверяет, существует ли ключ и зашифрован ли он (не в сыром hex-формате).
     * 
     * @returns {boolean}
     */
    function hasEncryptedKey() {
      var stored = getStoredKey();
      return !!(stored && !/^[0-9a-f]{64}$/i.test(stored));
    }

    /**
     * Проверяет, отсутствует ли ключ вообще (первый запуск приложения).
     * 
     * @returns {boolean}
     */
    function needsNewKey() {
      return !getStoredKey();
    }

    /**
     * Сбрасывает счётчик неудачных попыток ввода пароля.
     * Вызывается после успешной авторизации.
     * 
     * @returns {void}
     */
    function resetAttempts() {
      currentAttempts = 0;
    }

    /**
     * Пытается расшифровать существующий ключ с помощью введённого пароля.
     * Управляет счётчиком попыток и эмитит события через Bus.
     * 
     * @param {string} password - Введённый пароль.
     * @param {function(): void} onSuccess - Вызывается при успешной расшифровке.
     * @param {function(Error): void} onWrongPassword - Вызывается при неверном пароле (пока есть попытки).
     * @param {function(): void} onMaxAttempts - Вызывается при превышении лимита попыток.
     * @returns {void}
     */
    function unlock(password, onSuccess, onWrongPassword, onMaxAttempts) {
      var stored = getStoredKey();
      if (!stored) {
        if (typeof onWrongPassword === 'function') onWrongPassword(new Error('NO_KEY'));
        return;
      }

      // Если ключ в сыром hex-формате (миграция со старых версий)
      if (/^[0-9a-f]{64}$/i.test(stored)) {
        resetAttempts();
        if (typeof onSuccess === 'function') onSuccess();
        return;
      }

      decryptKey(stored, password).then(function() {
        resetAttempts();
        if (typeof onSuccess === 'function') onSuccess();
      }).catch(function(err) {
        currentAttempts++;
        if (Logger) Logger.warn('AuthService: wrong password attempt ' + currentAttempts + '/' + maxAttempts);

        if (currentAttempts >= maxAttempts) {
          if (Bus && Bus.emit) { try { Bus.emit('auth:locked'); } catch (_) { /* ignore */ } }
          if (typeof onMaxAttempts === 'function') onMaxAttempts();
        } else {
          if (typeof onWrongPassword === 'function') onWrongPassword(err);
        }
      });
    }

    /**
     * Генерирует новый секретный ключ Nostr и сохраняет его в зашифрованном виде.
     * Использует crypto.getRandomValues для криптографически стойкой генерации.
     * 
     * @param {string} password - Пароль для шифрования.
     * @param {function(): void} onSuccess - Вызывается после успешного сохранения.
     * @returns {void}
     */
    function createNew(password, onSuccess) {
      var raw = crypto.getRandomValues(new Uint8Array(32));
      var keyHex = Array.from(raw).map(function(b) { return b.toString(16).padStart(2, '0'); }).join('');

      encryptKey(keyHex, password).then(function(encrypted) {
        try { localStorage.setItem(SK_KEY, encrypted); } catch (e) {
          if (Logger) Logger.warn('AuthService: failed to save key', String(e));
        }
        resetAttempts();
        if (typeof onSuccess === 'function') onSuccess();
      }).catch(function(err) {
        if (Logger) Logger.error('AuthService: createNew failed', String(err && err.message || err));
      });
    }

    /**
     * Полностью сбрасывает хранилище: удаляет ключи, конфиг, язык и очищает IndexedDB.
     * Используется при превышении лимита попыток или при ручном сбросе пользователем.
     * 
     * @returns {Promise<void>}
     */
    function resetStorage() {
      try {
        localStorage.removeItem(SK_KEY);
        localStorage.removeItem(CFG_KEY);
        localStorage.removeItem(VER_KEY);
        localStorage.removeItem(LANG_KEY);
      } catch (e) {
        if (Logger) Logger.warn('AuthService: localStorage cleanup failed', String(e));
      }

      resetAttempts();

      return DB.reset().catch(function(err) {
        if (Logger) Logger.warn('AuthService: DB reset failed', String(err && err.message || err));
      });
    }

    return {
      /**
       * Проверяет, существует ли зашифрованный ключ.
       * @returns {boolean}
       */
      hasEncryptedKey: hasEncryptedKey,

      /**
       * Проверяет, нужен ли новый ключ (первый запуск).
       * @returns {boolean}
       */
      needsNewKey: needsNewKey,

      /**
       * Разблокирует существующий ключ паролем.
       * @param {string} password
       * @param {function(): void} onSuccess
       * @param {function(Error): void} onWrongPassword
       * @param {function(): void} onMaxAttempts
       * @returns {void}
       */
      unlock: unlock,

      /**
       * Создаёт новый ключ и шифрует его паролем.
       * @param {string} password
       * @param {function(): void} onSuccess
       * @returns {void}
       */
      createNew: createNew,

      /**
       * Полностью сбрасывает все данные пользователя.
       * @returns {Promise<void>}
       */
      resetStorage: resetStorage,

      /**
       * Возвращает текущее количество неудачных попыток ввода пароля.
       * @returns {number}
       */
      getAttempts: function() { return currentAttempts; },

      /**
       * Возвращает максимальное допустимое количество попыток.
       * @returns {number}
       */
      getMaxAttempts: function() { return maxAttempts; }
    };
  }, ['Config', 'Logger', 'Bus', 'DB']);

/**
 * @typedef {Object} NetStatusPayload
 * @description Payload события net:status.
 * @property {'disconnected' | 'connecting' | 'connected' | 'reconnecting' | 'failed'} status - Статус сети.
 */

/**
 * @typedef {Object} NetPeersPayload
 * @description Payload события net:peers.
 * @property {number} count - Количество активных пиров.
 */

/**
 * @typedef {Object} AIStatusPayload
 * @description Payload события ai:status.
 * @property {AIMode} mode - Текущий режим AI ('loading' | 'model' | 'demo').
 * @property {number} [percent] - Процент загрузки (только для mode='loading').
 */

/**
 * Компонент индикаторов статуса в хедере приложения.
 * 
 * Отображает два ключевых индикатора:
 * - **Сеть (Net):** статус подключения к Nostr-релеям и количество активных пиров
 * - **AI:** статус ML-модели (загрузка / готова / demo-режим)
 * 
 * Архитектурные решения:
 * - **DOM-запросы при каждом обновлении:** ссылки на элементы (`st-net-dot`, `st-ai-txt`)
 *   берутся через `document.getElementById` при каждом вызове update-функций.
 *   Это защищает от устаревших ссылок после `refreshUI()`, который полностью
 *   пересобирает DOM при смене языка. Кэш ссылок здесь был бы ошибкой.
 * 
 * - **AbortController:** все подписки на Bus и StateManager привязаны к единому
 *   сигналу. При `destroy()` достаточно вызвать `abort()` — браузер и Bus
 *   автоматически удалят все listeners. Это исключает утечки памяти.
 * 
 * - **Race condition protection:** обработчики проверяют `signal.aborted` перед
 *   обращением к DOM. Это защищает от ситуации, когда событие пришло после
 *   вызова `destroy()`, но до фактической очистки listeners браузером.
 *

 * - Все текстовые данные вставляются через `textContent` (XSS-safe).

 *

 */
DI.register('HeaderStatusComponent', function(Bus, I18n, Net, AI, Utils) {

  /**
   * Контроллер для автоматической отписки всех listeners при destroy().
   * @type {AbortController | null}
   */
  var abortController = null;

  /**
   * Whitelist валидных CSS-классов для индикаторов.

  /**
   * Обновляет индикатор сети в хедере.
   * DOM-элементы берутся каждый раз заново для корректной работы после refreshUI().
   * 
   * @param {string} cls - CSS-класс для точки (валидируется через whitelist).
   * @param {string} text - Текст статуса (вставляется через textContent).
   * @returns {void}
   */
  function updateNet(cls, text) {
    var dot = document.getElementById('st-net-dot');
    var txt = document.getElementById('st-net-txt');
    
    if (dot) {
      // Валидация класса через whitelist для защиты от injection
      var safeClass = VALID_STATUS_CLASSES.has(cls) ? cls : '';

      txt.textContent = text || '';
    }

   * Обновляет индикатор AI в хедере.

   * 
   * @param {string} cls - CSS-класс для точки (валидируется через whitelist).
   * @param {string} text - Текст статуса (вставляется через textContent).
   * @returns {void}
   */

    var dot = document.getElementById('st-ai-dot');
    var txt = document.getElementById('st-ai-txt');
    
    if (dot) {
      var safeClass = VALID_STATUS_CLASSES.has(cls) ? cls : '';

    }

   * Инициализирует компонент: подписывается на события сети, AI и смены языка.

   *

   */
  function init() {
    // Создаём AbortController для централизованной отписки
    abortController = new AbortController();
    var signal = abortController.signal;

    /**
     * Обработчик изменения статуса сети (connected, reconnecting, failed и т.д.).
     * Формирует человекочитаемый текст статуса и подбирает CSS-класс индикатора.
     * 
     * @param {NetStatusPayload} payload - Данные события.
     * @returns {void}
     */
    var netStatusHandler = function(payload) {
      // Защита от race condition: если компонент уже уничтожен, не трогаем DOM
      if (signal.aborted) return;
      
      var status = payload && payload.status ? payload.status : 'disconnected';
      var text = I18n.t('st.net');
      var cls = 'load';
      
      if (status === 'connected') {
        text = I18n.t('st.net.online') + ' · ' + Utils.word('peers', Net.peerCount(), I18n.getLang());
        cls = 'ok';
      } else if (status === 'connecting') {
        text = I18n.t('st.net.connecting');
        cls = 'load';
      } else if (status === 'reconnecting') {
        text = I18n.t('st.net.reconnecting');
        cls = 'warn';
      } else if (status === 'failed') {
        text = I18n.t('st.net.failed');
        cls = 'err';
      }

     * 
     * @param {NetPeersPayload} payload - Данные события.
     * @returns {void}
     */
    var netPeersHandler = function(payload) {
      if (signal.aborted) return;
      
      var count = payload && typeof payload.count === 'number' ? payload.count : 0;
      var text = count > 0
        ? I18n.t('st.net.online') + ' · ' + Utils.word('peers', count, I18n.getLang())
        : I18n.t('st.net.listen');
      var cls = count > 0 ? 'ok' : 'load';
      
      updateNet(cls, text);
    };

     * Отображает процент загрузки в режиме loading.

     * @param {AIStatusPayload} payload - Данные события.
     * @returns {void}
     */
    var aiStatusHandler = function(payload) {
      if (signal.aborted) return;
      if (!payload) return;
      
      var mode = payload.mode;
      var percent = payload.percent || 0;
      
      if (mode === 'loading') {
        updateAi('load', I18n.t('st.ai.loading') + ' ' + Math.round(percent) + '%');
      } else if (mode === 'model') {
        updateAi('ok', I18n.t('st.ai.ready'));
      } else if (mode === 'demo') {
        updateAi('warn', I18n.t('st.ai.demo'));
      }
    };

    /**
     * Обработчик смены языка: перерисовывает текущие статусы с новыми переводами.
     * Делегирует работу существующим handlers, сохраняя единую логику форматирования.
     * 
     * @returns {void}
     */
    var i18nHandler = function() {
      if (signal.aborted) return;
      
      if (Net) {
        var currentNetStatus = Net.getStatus();
        netStatusHandler({ status: currentNetStatus });
      }
      
      if (AI) {
        if (AI.ready()) {
          aiStatusHandler({ mode: AI.getMode() });
        } else {
          aiStatusHandler({ mode: 'loading' });
        }
      }
    };

    // Регистрация подписок с привязкой к AbortSignal
    // При вызове abortController.abort() все они автоматически удалятся
    Bus.subscribe('net:status', netStatusHandler, signal);
    Bus.subscribe('net:peers', netPeersHandler, signal);
    Bus.subscribe('ai:status', aiStatusHandler, signal);
    Bus.subscribe('i18n:change', i18nHandler, signal);

    // Первичная отрисовка текущего состояния
    if (Net) {
      netStatusHandler({ status: Net.getStatus() });
    } else {
      updateNet('load', I18n.t('st.net.connecting'));
    }

    if (AI && AI.ready()) {
      aiStatusHandler({ mode: AI.getMode() });
    } else {
      aiStatusHandler({ mode: 'loading' });
    }
  }

  /**
   * Уничтожает компонент: отписывается от всех событий через AbortController.
   * 
   * Один вызов `abort()` автоматически:
   * - Удаляет все Bus-подписки (через механизм abortHandler в Bus)
   * - Снимает все DOM-listeners (если бы они были привязаны к signal)
   * - Защищает handlers от выполнения через проверку signal.aborted
   * 
   * После abort обнуляем ссылку на контроллер для освобождения памяти.
   * 
   * @returns {void}
   */
  function destroy() {
    if (abortController) {
      abortController.abort();
      abortController = null;
    }
  }

  return {
    /**
     * Инициализирует компонент (публичный API).
     * @returns {void}
     */
    init: init,

    /**
     * Уничтожает компонент (публичный API).
     * @returns {void}
     */
    destroy: destroy
  };
}, ['Bus', 'I18n', 'Net', 'AI', 'Utils']);

 * - При наличии сети и пустой очереди полностью скрывается
 * 
 * Логика отображения:
 * ┌─────────────────────┬─────────────┬──────────────────────────────────┐
 * │ Статус сети         │ Outbox      │ Поведение                        │
 * ├─────────────────────┼─────────────┼──────────────────────────────────┤
 * │ disconnected        │ любой       │ Скрыт (нет смысла показывать)    │
 * │ connected           │ count > 0   │ "Офлайн-очередь (N)"             │
 * │ connected           │ count = 0   │ Скрыт                            │
 * │ reconnecting/failed │ count > 0   │ "Нет сети" + "(N)"               │
 * │ reconnecting/failed │ count = 0   │ "Нет сети"                       │
 * └─────────────────────┴─────────────┴──────────────────────────────────┘
 * 
 * Архитектурные решения:
 * - **DOM-запросы при каждом обновлении:** ссылки на элементы (`offline-bar`,
 *   `offline-text`, `offline-queue`) берутся через `document.getElementById`
 *   при каждом вызове `update()`. Это защищает от устаревших ссылок после
 *   `refreshUI()`, который полностью пересобирает DOM при смене языка.

 *   перед обращением к DOM. Это защищает от ситуации, когда событие пришло
 *   после вызова `destroy()`, но до фактической очистки listeners.
 * 
 * Безопасность:
 * - Все текстовые данные вставляются через `textContent` (XSS-safe).
 * - CSS-свойства (`display`) устанавливаются из ограниченного whitelist-набора.

DI.register('OfflineBarComponent', function(Bus, I18n, Net) {

  /**
   * Контроллер для автоматической отписки всех listeners при destroy().

   */
  var abortController = null;

    var bar = document.getElementById('offline-bar');
    var textEl = document.getElementById('offline-text');
    var queueEl = document.getElementById('offline-queue');

    if (!bar || !textEl || !queueEl) return;

    var status = Net ? Net.getStatus() : 'disconnected';
    var outboxLength = Net ? Net.getOutboxLength() : 0;

    // Если disconnected – полностью скрываем плашку
    if (status === 'disconnected') {

      return;
    }

    // Если connected – показываем только при наличии очереди

        setDisplay(bar, 'block');
        textEl.textContent = I18n.t('offline.bar');
        setDisplay(queueEl, 'inline');
        queueEl.textContent = '(' + I18n.t('offline.queue', { count: outboxLength }) + ')';
      } else {
        setDisplay(bar, 'none');
      }
      return;
    }

    // Остальные статусы (connecting, reconnecting, failed) – нет сети
    setDisplay(bar, 'block');
    textEl.textContent = I18n.t('offline.disconnected');
    if (outboxLength > 0) {
      setDisplay(queueEl, 'inline');
      queueEl.textContent = '(' + I18n.t('offline.queue', { count: outboxLength }) + ')';

    var netStatusHandler = function() {
      update();
    };

    /**
     * Обработчик изменения размера очереди outbox.
     * Делегирует работу в update(), сохраняя единую логику отображения.
     * 
     * @returns {void}
     */
    var netOutboxHandler = function() {
      update();
    };

    /**
     * Обработчик смены языка: перерисовывает бар с новыми переводами.
     * Делегирует работу в update(), сохраняя единую логику отображения.
     * 
     * @returns {void}
     */
    var i18nHandler = function() {
      update();
    };

    // Регистрация подписок с привязкой к AbortSignal
    // При вызове abortController.abort() все они автоматически удалятся
    Bus.subscribe('net:status', netStatusHandler, signal);
    Bus.subscribe('net:outbox', netOutboxHandler, signal);
    Bus.subscribe('i18n:change', i18nHandler, signal);

    // Первичная отрисовка текущего состояния
    update();
  }

  /**
   * Уничтожает компонент: отписывается от всех событий через AbortController.
   * 
   * Один вызов `abort()` автоматически удаляет все Bus-подписки через механизм

   *

   */
  function destroy() {
    if (abortController) {
      abortController.abort();
      abortController = null;
    }
  }

  return {
    /**
     * Инициализирует компонент (публичный API).
     * @returns {void}
     */
    init: init,

    /**
     * Уничтожает компонент (публичный API).

    destroy: destroy
