  <style>
:root {
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bot: env(safe-area-inset-bottom, 0px);
  --ease: cubic-bezier(.2, .7, .2, 1);
  --gap: 8px;
  --gap-sm: 6px;
  --r: 12px;
  --r-sm: 8px;
  --r-xs: 5px;
  --font: ui-sans-serif, -apple-system, 'SF Pro Text', 'Inter', 'Segoe UI', Roboto, sans-serif;
  --mono: ui-monospace, 'SF Mono', Menlo, Consolas, monospace;
  --hdr-h: 48px;
  --btab-h: 56px;
}

[data-theme="dark"] {
  --bg: #0b0b10;
  --bg-2: #121218;
  --surface: #16161e;
  --surface-2: #1c1c26;
  --surface-3: #242430;
  --text: #ececf1;
  --text-2: #a0a0ae;
  --text-3: #6c6c7a;
  --text-dim: #484855;
  --line: rgba(255, 255, 255, .06);
  --line-strong: rgba(255, 255, 255, .11);
  --brand: #8b7cff;
  --brand-glow: rgba(139, 124, 255, .14);
  --world: #38bdf8;
  --world-glow: rgba(56, 189, 248, .12);
  --seren: #4ade80;
  --seren-glow: rgba(74, 222, 128, .12);
  --danger: #ef4444;
  --danger-glow: rgba(239, 68, 68, .14);
  --warning: #eab308;
  --ok: #22c55e;
  color-scheme: dark;
}

[data-theme="light"] {
  --bg: #fafafa;
  --bg-2: #ffffff;
  --surface: #ffffff;
  --surface-2: #f4f4f6;
  --surface-3: #eaeaed;
  --text: #1a1a22;
  --text-2: #52525c;
  --text-3: #8a8a95;
  --text-dim: #b4b4be;
  --line: rgba(0, 0, 0, .06);
  --line-strong: rgba(0, 0, 0, .12);
  --brand: #6d5ef5;
  --brand-glow: rgba(109, 94, 245, .10);
  --world: #0284c7;
  --world-glow: rgba(2, 132, 199, .08);
  --seren: #16a34a;
  --seren-glow: rgba(22, 163, 74, .08);
  --danger: #dc2626;
  --danger-glow: rgba(220, 38, 38, .10);
  --warning: #ca8a04;
  --ok: #16a34a;
  color-scheme: light;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

html, body {
  height: 100vh;
  height: 100dvh;
  overflow: hidden;
  background: var(--bg);
  color: var(--text);
  font: 15px/1.5 var(--font);
  -webkit-font-smoothing: antialiased;
  -webkit-user-select: none;
  user-select: none;
  overscroll-behavior: none;
}

input, textarea {
  -webkit-user-select: text;
  user-select: text;
}

button {
  font: inherit;
  color: inherit;
  background: none;
  border: none;
  cursor: pointer;
  outline: none;
}

button[disabled] {
  opacity: .45;
  cursor: not-allowed;
}

::-webkit-scrollbar {
  width: 6px;
  height: 6px;
}

::-webkit-scrollbar-track {
  background: transparent;
}

::-webkit-scrollbar-thumb {
  background: var(--line-strong);
  border-radius: 3px;
}

#app-root {
  height: 100vh;
  height: 100dvh;
  display: none;
  flex-direction: column;
  overflow: hidden;
}

body.show-app #app-root {
  display: flex;
}

.hdr {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 14px;
  padding-top: calc(10px + var(--safe-top));
  padding-bottom: 10px;
  background: var(--surface);
  border-bottom: 1px solid var(--line);
  flex-shrink: 0;
  min-height: var(--hdr-h);
  gap: 12px;
}

.logo {
  display: flex;
  align-items: center;
  gap: 8px;
  font-weight: 700;
  font-size: 16px;
  letter-spacing: -.01em;
  flex-shrink: 0;
}

.logo-mark {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 24px;
  height: 24px;
  border-radius: 6px;
  background: var(--brand);
  color: white;
  font-weight: 800;
  font-size: 12px;
}

.logo-dot {
  color: var(--brand);
  margin: 0 .5px;
}

.hdr-status {
  display: flex;
  align-items: center;
  gap: 10px;
  flex: 1;
  min-width: 0;
  justify-content: flex-end;
  font-size: 11px;
  color: var(--text-3);
  font-family: var(--mono);
  letter-spacing: .02em;
  overflow: hidden;
}

.hdr-st-item {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  white-space: nowrap;
  flex-shrink: 0;
}

.hdr-st-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--text-dim);
  flex-shrink: 0;
}

.hdr-st-dot.ok {
  background: var(--ok);
}

.hdr-st-dot.warn {
  background: var(--warning);
}

.hdr-st-dot.err {
  background: var(--danger);
}

.hdr-st-dot.load {
  background: var(--brand);
  animation: pulse 1.4s ease-in-out infinite;
}

@keyframes pulse {
  50% {
    opacity: .3;
  }
}

.hdr-st-sep {
  color: var(--line-strong);
  flex-shrink: 0;
}

.burger {
  min-width: 44px;
  min-height: 44px;
  padding: 10px;
  border-radius: 10px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 4px;
  transition: background .15s var(--ease);
  flex-shrink: 0;
}

.burger:active {
  background: var(--surface-2);
}

.burger-line {
  width: 16px;
  height: 2px;
  background: var(--text-2);
  border-radius: 1px;
}

.ws {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  position: relative;
  min-height: 0;
  gap: var(--gap);
  padding-bottom: 0;
  padding-top: var(--gap);
}

.seg {
  display: flex;
  gap: 2px;
  margin: 0 12px;
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--r-sm);
  flex-shrink: 0;
  padding: 6px 3px;
  min-height: 44px;
}

.seg-b {
  flex: 1;
  padding: 0 6px;
  border-radius: 6px;
  font-size: 13px;
  font-weight: 500;
  color: var(--text-3);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  transition: background .15s var(--ease), color .15s var(--ease);
  min-width: 0;
  min-height: 32px;
}

.seg-b.on {
  background: var(--surface-2);
  color: var(--text);
}

.seg-b .lbl {
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.seg-b .cnt {
  font-size: 10px;
  padding: 1px 6px;
  border-radius: 9px;
  background: var(--surface-3);
  font-family: var(--mono);
  font-variant-numeric: tabular-nums;
  font-weight: 600;
  flex-shrink: 0;
  min-width: 16px;
  text-align: center;
}

.seg-b.on[data-k="local"] .cnt {
  background: var(--brand-glow);
  color: var(--brand);
}

.seg-b.on[data-k="world"] .cnt {
  background: var(--world-glow);
  color: var(--world);
}

.seg-b.on[data-k="seren"] .cnt {
  background: var(--seren-glow);
  color: var(--seren);
}

.carousel-wrap {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-height: 0;
  position: relative;
  margin: 0;
  padding: 0;
}

.carousel {
  flex: 1;
  display: flex;
  overflow-x: auto;
  overflow-y: hidden;
  scroll-snap-type: x mandatory;
  scroll-behavior: smooth;
  scroll-padding: 0 12px;
  gap: 10px;
  padding: 0 12px 0;
  min-height: 0;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
  touch-action: pan-x;
}

.carousel::-webkit-scrollbar {
  display: none;
}

.carousel-item {
  flex: 0 0 calc(100% - 4px);
  scroll-snap-align: center;
  scroll-snap-stop: always;
  display: flex;
  min-height: 0;
  width: calc(100% - 4px);
  padding: 2px 0;
  touch-action: pan-x;
}

.carousel-dots {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 4px;
  flex-shrink: 0;
  flex-wrap: wrap;
}

.carousel-dot {
  width: 4px;
  height: 4px;
  border-radius: 50%;
  background: var(--line-strong);
  transition: background .2s var(--ease), transform .2s var(--ease), width .2s var(--ease);
}

.carousel-dot.active {
  background: var(--brand);
  width: 12px;
  border-radius: 2px;
}

.carousel-counter {
  font-size: 11px;
  color: var(--text-3);
  font-family: var(--mono);
  font-variant-numeric: tabular-nums;
  margin: 0 4px;
}

.fi {
  background: var(--surface);
  border: 1px solid var(--line);
  border-style: solid;
  border-radius: var(--r);
  padding: 14px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  width: 100%;
  height: 100%;
  min-height: 0;
  transition: border-color .2s var(--ease);
}

.fi.active {
  border-color: var(--line-strong);
}

.fi-h {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 8px;
  font-size: 11px;
  flex-shrink: 0;
}

.fi-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 3px 9px;
  border-radius: 4px;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: .03em;
  background: var(--surface-2);
  color: var(--text-3);
  border: 1px solid var(--line);
  text-transform: uppercase;
  flex-shrink: 0;
}

.fi.t-local .fi-badge {
  color: var(--brand);
  border-color: var(--brand-glow);
}

.fi.t-world .fi-badge {
  color: var(--world);
  border-color: var(--world-glow);
}

.fi.t-seren .fi-badge {
  color: var(--seren);
  border-color: var(--seren-glow);
}

.fi-score {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  flex-shrink: 0;
  font-family: var(--mono);
  font-variant-numeric: tabular-nums;
}

.fi-score-label {
  font-size: 10px;
  color: var(--text-3);
  text-transform: lowercase;
}

.fi-score-value {
  font-size: 11px;
  font-weight: 600;
}

.fi.t-local .fi-score-value {
  color: var(--brand);
}

.fi.t-world .fi-score-value {
  color: var(--world);
}

.fi.t-seren .fi-score-value {
  color: var(--seren);
}

.fi-body {
  flex: 1;
  min-height: 0;
  overflow-y: auto;
  overscroll-behavior: contain;
  font-size: 15px;
  line-height: 1.6;
  color: var(--text);
  white-space: pre-wrap;
  word-break: break-word;
  overflow-wrap: anywhere;
  scrollbar-width: thin;
  scrollbar-color: var(--line-strong) transparent;
  padding: 2px;
  touch-action: pan-y pinch-zoom;
}

.fi-body::-webkit-scrollbar {
  width: 4px;
}

.fi-body::-webkit-scrollbar-thumb {
  background: var(--line-strong);
  border-radius: 2px;
}

.fi-body mark {
  background: var(--brand-glow);
  color: var(--brand);
  padding: 0 3px;
  border-radius: 2px;
  font-weight: 600;
}

.fi-foot {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  padding-top: 10px;
  border-top: 1px solid var(--line);
  flex-shrink: 0;
}

.fi-act {
  min-height: 38px;
  padding: 8px 14px;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 500;
  color: var(--text-2);
  transition: background .12s var(--ease), color .12s var(--ease), opacity .12s var(--ease);
  border: 1px solid var(--line);
  background: transparent;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  white-space: nowrap;
}

.fi-act:active:not([disabled]) {
  background: var(--surface-2);
}

.fi-act.danger:active:not([disabled]) {
  background: var(--danger-glow);
  color: var(--danger);
  border-color: rgba(239, 68, 68, .3);
}

.fi-act.primary {
  background: var(--brand);
  color: white;
  border-color: transparent;
}

.fi-act.primary:active:not([disabled]) {
  filter: brightness(1.1);
  color: white;
}

.fi-act[disabled] {
  opacity: .45;
  cursor: not-allowed;
}

.ed {
  background: var(--surface);
  margin: 0 12px;
  border: 1px solid var(--line);
  border-radius: var(--r);
  padding: 10px 12px;
  flex-shrink: 0;
  transition: border-color .15s var(--ease);
}

.ed:focus-within {
  border-color: var(--brand);
}

.ed-ta {
  width: 100%;
  min-height: 44px;
  max-height: 110px;
  background: transparent;
  border: none;
  outline: none;
  resize: none;
  font: 15px/1.5 var(--font);
  color: var(--text);
  padding: 4px 0;
}

.ed-ta::placeholder {
  color: var(--text-dim);
}

.ed-foot {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 10px;
  padding-top: 10px;
  border-top: 1px solid var(--line);
  gap: 8px;
}

.ed-cnt {
  font-size: 11px;
  color: var(--text-3);
  font-family: var(--mono);
  font-variant-numeric: tabular-nums;
}

.ed-acts {
  display: flex;
  gap: 8px;
  align-items: center;
  flex: 1;
  justify-content: flex-end;
}

.tog-sw {
  display: inline-flex;
  align-items: center;
  background: var(--surface-2);
  border: 1px solid var(--line);
  border-radius: 999px;
  padding: 3px;
  position: relative;
  height: 40px;
  min-width: 140px;
  user-select: none;
}

.tog-sw-opt {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 5px;
  height: 100%;
  padding: 0 12px;
  font-size: 13px;
  font-weight: 600;
  color: var(--text-3);
  border-radius: 999px;
  z-index: 2;
  position: relative;
  cursor: pointer;
  transition: color .2s var(--ease);
  white-space: nowrap;
  min-width: 62px;
}

.tog-sw-opt.on {
  color: var(--text);
}

.tog-sw-thumb {
  position: absolute;
  top: 3px;
  bottom: 3px;
  width: calc(50% - 3px);
  background: var(--surface-3);
  border-radius: 999px;
  left: 3px;
  transition: left .25s var(--ease), background .2s var(--ease);
  z-index: 1;
  box-shadow: 0 1px 3px rgba(0, 0, 0, .15);
}

.tog-sw[data-mode="world"] .tog-sw-thumb {
  left: calc(50%);
  background: var(--world-glow);
}

.tog-sw[data-mode="world"] .tog-sw-opt[data-v="world"] {
  color: var(--world);
}

.tog-sw[data-mode="private"] .tog-sw-thumb {
  background: var(--brand-glow);
}

.tog-sw[data-mode="private"] .tog-sw-opt[data-v="private"] {
  color: var(--brand);
}

.btn-send {
  height: 40px;
  min-width: 44px;
  padding: 0 16px;
  border-radius: 999px;
  background: var(--brand);
  color: white;
  font-size: 14px;
  font-weight: 600;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  box-shadow: 0 2px 8px var(--brand-glow);
  transition: transform .1s var(--ease), filter .15s var(--ease), opacity .15s var(--ease);
}

.btn-send:active:not([disabled]) {
  transform: scale(.95);
}

.btn-send:hover:not([disabled]) {
  filter: brightness(1.08);
}

.btn-send[disabled] {
  opacity: .5;
}

.btn-send.sending {
  pointer-events: none;
  opacity: .7;
}

.btn-send svg {
  width: 16px;
  height: 16px;
  flex-shrink: 0;
}

.btn-send.sending svg {
  animation: spin .8s linear infinite;
}

@keyframes spin {
  to {
    transform: rotate(360deg);
  }
}

.md-btn {
  min-height: 40px;
  padding: 8px 16px;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 600;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  transition: transform .1s var(--ease), filter .15s var(--ease), opacity .15s var(--ease);
  cursor: pointer;
}

.md-btn:active:not([disabled]) {
  transform: scale(.95);
}

.feed-empty {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 32px 24px;
  color: var(--text-3);
  margin: 0 12px;
  background: var(--surface);
  border: 1px dashed var(--line-strong);
  border-radius: var(--r);
}

.feed-empty-ic {
  font-size: 28px;
  margin-bottom: 12px;
  opacity: .5;
  width: 52px;
  height: 52px;
  display: flex;
  align-items: center;
  justify-content: center;
  border: 1px solid var(--line);
  border-radius: 12px;
}

.feed-empty-t {
  font-size: 14px;
  font-weight: 600;
  color: var(--text-2);
  margin-bottom: 4px;
}

.feed-empty-d {
  font-size: 13px;
  max-width: 280px;
  line-height: 1.45;
}

.base {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  min-height: 0;
}

.base-h {
  padding: 10px 12px 0;
  flex-shrink: 0;
}

.base-stats {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 6px;
  margin-bottom: 8px;
}

.stat {
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--r-sm);
  padding: 8px;
  text-align: center;
  min-width: 0;
}

.stat-v {
  font-size: 20px;
  font-weight: 700;
  font-family: var(--mono);
  font-variant-numeric: tabular-nums;
}

.stat-l {
  font-size: 10px;
  color: var(--text-3);
  text-transform: uppercase;
  letter-spacing: .04em;
  margin-top: 2px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.base-ctrls {
  display: flex;
  gap: 6px;
  align-items: center;
}

.base-search {
  flex: 1;
  min-width: 0;
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--r-sm);
  padding: 9px 12px;
  font: 14px var(--font);
  color: var(--text);
  outline: none;
  transition: border-color .15s var(--ease);
  min-height: 40px;
}

.base-search:focus {
  border-color: var(--brand);
}

.base-search::placeholder {
  color: var(--text-dim);
}

.base-sort {
  flex: 0 0 auto;
  min-width: 0;
  max-width: 140px;
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--r-sm);
  padding: 9px 28px 9px 12px;
  font: 13px var(--font);
  color: var(--text-2);
  outline: none;
  cursor: pointer;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  appearance: none;
  -webkit-appearance: none;
  min-height: 40px;
  background-image: url("data:image/svg+xml;charset=utf-8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'%3E%3Cpath fill='none' stroke='%23888' stroke-width='1.5' stroke-linecap='round' d='M1 1l4 4 4-4'/%3E%3C/svg%3E");
  background-repeat: no-repeat;
  background-position: right 10px center;
}

.base-sort option {
  background: var(--surface);
  color: var(--text);
}

.base-list {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 0 12px;
  position: relative;
  min-height: 0;
  width: 100%;
  -webkit-overflow-scrolling: touch;
}

.base-items {
  position: absolute;

   * @param {function(*): void} handler - Обработчик.
   * @returns {boolean} true если найдена и удалена.
   */
  function offByHandler(event, handler) {
    var subMap = map.get(event);
    if (!subMap) return false;

    var foundId = null;
    subMap.forEach(function(record, id) {
      if (record.handler === handler && !foundId) {
        foundId = id;
      }
    });

    if (foundId !== null) {
      var record = subMap.get(foundId);

      if (record.signal && record.abortHandler) {
        record.signal.removeEventListener('abort', record.abortHandler);
      }

      subMap.delete(foundId);

      if (subMap.size === 0) {
        map.delete(event);
      }

      return true;
    }

    return false;
  }

  /**
   * Публикует событие всем подписчикам.
   *
   * Создаёт массив-копию слушателей перед итерацией, чтобы удаление/добавление
   * подписок внутри обработчиков не ломало цикл.
   * Ошибки в отдельных обработчиках перехватываются и логируются.
   *
   * @param {string} event - Имя события.
   * @param {*} [payload] - Данные события.
   * @returns {void}
   */
  function emit(event, payload) {
    var subMap = map.get(event);
    if (!subMap) return;

    var records = [];
    subMap.forEach(function(record) {
      records.push(record);
    });

    for (var i = 0; i < records.length; i++) {
      try {
        records[i].handler(payload);
      } catch (err) {
        console.error('[Bus] Error in listener for "' + event + '":', err);
      }
    }
  }

  /**
   * Возвращает количество активных подписчиков на событие.
   *
   * @param {string} event - Имя события.
   * @returns {number} Количество подписчиков.
   */
  function listenerCount(event) {
    var subMap = map.get(event);
    return subMap ? subMap.size : 0;
  }

  /**
   * Возвращает список всех событий, на которые есть подписки.
   *
   * @returns {string[]} Массив имён событий.
   */
  function listEvents() {
    return Array.from(map.keys());
  }

  /**
   * Полностью очищает все подписки.
   * Вызывается при уничтожении приложения или глобальном reset.
   *
   * @returns {void}
   */
  function clear() {
    map.forEach(function(subMap) {
      subMap.forEach(function(record) {
        if (record.signal && record.abortHandler) {
          record.signal.removeEventListener('abort', record.abortHandler);
        }
      });
    });

    map.clear();
  }

  /**
   * Инициализация модуля.
   *
   * @param {AbortSignal} [signal] - Сигнал для автоочистки (не используется).
   * @returns {void}
   */
  function init(signal) {
    // Bus не требует инициализации
  }

  /**
   * Уничтожение модуля.
   * Очищает все подписки.
   *
   * @returns {void}
   */
  function destroy() {
    clear();
  }

  return {
    on: on,
    subscribe: subscribe,
    off: off,
    emit: emit,
    listenerCount: listenerCount,
    listEvents: listEvents,
    clear: clear,
    init: init,
    destroy: destroy
  };
}, []);

/**
 * @module UI.Menu
 * @description Модальное окно настроек приложения.
 *
 * @namespace UI.Menu
 */
DI.register('UI.Menu', function(Config, Logger, Bus, I18n, Modal, Net, Toast, AuthService) {

  /** @type {number} */
  var openCount = 0;

  /** @type {number} */
  var saveCount = 0;

  /**
   * @param {string} key
   * @param {string} fallback
   * @returns {string}
   */
  function t(key, fallback) {
    return I18n ? I18n.t(key, {}, fallback) : fallback;
  }

  /**
   * @param {string} titleKey
   * @param {string} titleFallback
   * @returns {HTMLDivElement}
   */
  function createSection(titleKey, titleFallback) {
    var section = document.createElement('div');
    section.className = 'set-sec';
    var title = document.createElement('div');
    title.className = 'set-sec-t';
    title.textContent = t(titleKey, titleFallback);
    section.appendChild(title);
    return section;
  }

  /**
   * @param {string} labelKey
   * @param {string} labelFallback
   * @param {HTMLElement} input
   * @param {string} [hintKey]
   * @param {string} [hintFallback]
   * @returns {HTMLDivElement}
   */
  function createFieldGroup(labelKey, labelFallback, input, hintKey, hintFallback) {
    var group = document.createElement('div');
    group.className = 'fg';
    var label = document.createElement('label');
    label.className = 'fl';
    label.textContent = t(labelKey, labelFallback);
    group.appendChild(label);
    group.appendChild(input);
    if (hintKey) {
      var hint = document.createElement('div');
      hint.className = 'fh';
      hint.textContent = t(hintKey, hintFallback);
      group.appendChild(hint);
    }
    return group;
  }

  /**
   * @param {'dark'|'light'} theme
   * @returns {void}
   */
  function applyTheme(theme) {
    document.body.setAttribute('data-theme', theme);
    if (Config && Config.set) Config.set('theme', theme);
    if (Config && Config.save) Config.save();
    var metaTheme = document.querySelector('meta[name="theme-color"]');
    if (metaTheme) {
      metaTheme.setAttribute('content', theme === 'light' ? '#fafafa' : '#0b0b10');
    }
  }

  /**
   * @returns {{section: HTMLDivElement, cleanup: function}}
   */
  function buildAppSection() {
    var section = createSection('menu.settings', 'Настройки');

    var currentTheme = Config ? Config.get('theme', 'dark') : 'dark';
    var themeRow = document.createElement('button');
    themeRow.className = 'tog' + (currentTheme === 'light' ? ' on' : '');
    themeRow.innerHTML = '<span class="tog-ic">◐</span>' +
      '<span class="tog-lbl">' + t('menu.theme', 'Тема') + '</span>' +
      '<div class="tog-track"><div class="tog-thumb"></div></div>';
    themeRow.onclick = function() {
      var current = Config ? Config.get('theme', 'dark') : 'dark';
      var next = current === 'dark' ? 'light' : 'dark';
      applyTheme(next);
      themeRow.classList.toggle('on', next === 'light');
    };
    section.appendChild(themeRow);

    var langRow = document.createElement('div');
    langRow.style.marginTop = '8px';
    var langLabel = document.createElement('div');
    langLabel.className = 'fl mb-5';
    langLabel.textContent = t('menu.lang', 'Язык');
    langRow.appendChild(langLabel);
    var langSwitch = document.createElement('div');
    langSwitch.className = 'lang-sw';
    ['ru', 'en'].forEach(function(lang) {
      var langBtn = document.createElement('button');
      langBtn.className = 'lang-sw-b' + (I18n && I18n.getLang() === lang ? ' on' : '');
      langBtn.textContent = lang.toUpperCase();
      langBtn.onclick = function() {
        if (I18n && I18n.setLang) I18n.setLang(lang);
        if (Modal && Modal.close) Modal.close();
      };
      langSwitch.appendChild(langBtn);
    });
    langRow.appendChild(langSwitch);
    section.appendChild(langRow);

    var helpBtn = document.createElement('button');
    helpBtn.className = 'tog';
    helpBtn.style.marginTop = '8px';
    helpBtn.innerHTML = '<span class="tog-ic">?</span>' +
      '<span class="tog-lbl">' + t('menu.help', 'Как это работает') + '</span>' +
      '<span class="tog-arr">→</span>';
    helpBtn.onclick = function() {
      if (Modal && Modal.close) Modal.close();
      setTimeout(function() {
        try {
          var UIHelp = DI.resolve('UI.Help');
          if (UIHelp && UIHelp.openHelp) UIHelp.openHelp(false);
        } catch (e) {
          if (Logger) Logger.error('UI.Menu', 'Failed to open help', e);
        }
      }, 200);
    };
    section.appendChild(helpBtn);

    return {
      section: section,
      cleanup: function() {
        themeRow.onclick = null;
        helpBtn.onclick = null;
      }
    };
  }

  /**
   * @returns {{section: HTMLDivElement, getValues: function, cleanup: function}}
   */
  function buildNetSection() {
    var section = createSection('set.advanced', 'Расширенные');

    var roomInput = document.createElement('input');
    roomInput.type = 'text';
    roomInput.className = 'fi-input';
    roomInput.value = Config ? Config.get('room', 'noomium-main') : 'noomium-main';
    section.appendChild(createFieldGroup('set.room', 'Комната', roomInput, 'set.room.hint', 'Nostr-топик группы'));

    var thresholdInput = document.createElement('input');
    thresholdInput.type = 'range';
    thresholdInput.className = 'fr';
    thresholdInput.min = '0';
    thresholdInput.max = '1';
    thresholdInput.step = '0.01';
    thresholdInput.value = String(Config ? Config.get('threshold', 0.7) : 0.7);
    var thresholdValue = document.createElement('span');
    thresholdValue.className = 'rv';
    thresholdValue.textContent = Number(thresholdInput.value).toFixed(2);
    thresholdInput.oninput = function(e) {
      thresholdValue.textContent = parseFloat(e.target.value).toFixed(2);
    };
    var thresholdWrapper = document.createElement('div');
    thresholdWrapper.appendChild(thresholdInput);
    thresholdWrapper.appendChild(thresholdValue);
    section.appendChild(createFieldGroup('set.threshold', 'Порог', thresholdWrapper, 'set.threshold.hint', 'выше = строже'));

    var serenInput = document.createElement('input');
    serenInput.type = 'range';
    serenInput.className = 'fr';
    serenInput.min = '0';
    serenInput.max = '1';
    serenInput.step = '0.01';
    serenInput.value = String(Config ? Config.get('serendipity', 0.3) : 0.3);
    var serenValue = document.createElement('span');
    serenValue.className = 'rv';
    serenValue.textContent = Number(serenInput.value).toFixed(2);
    serenInput.oninput = function(e) {
      serenValue.textContent = parseFloat(e.target.value).toFixed(2);
    };
    var serenWrapper = document.createElement('div');
    serenWrapper.appendChild(serenInput);
    serenWrapper.appendChild(serenValue);
    section.appendChild(createFieldGroup('set.seren', 'Дельта озарений', serenWrapper, 'set.seren.hint', 'ширина поиска'));

    var relaysInput = document.createElement('textarea');
    relaysInput.className = 'fi-textarea';
    relaysInput.value = Config ? Config.get('relays', []).join('\n') : '';

    return {

        return {

          relays: relaysInput.value.trim()
            ? relaysInput.value.trim().split(/[\n,]+/).map(function(r) { return r.trim(); }).filter(function(r) { return r && /^wss?:\/\//.test(r); })
            : (Config && Config.defaults ? Config.defaults().relays : [])
        };
      },
      cleanup: function() {
        thresholdInput.oninput = null;
        serenInput.oninput = null;
      }
    };
  }

  /**
   * @returns {{section: HTMLDivElement, cleanup: function}}

      '<span class="tog-arr">→</span>';
    exportBtn.onclick = function() {

          if (Toast && Toast.show) Toast.show('err', String(err && err.message || err) || 'Export failed');
        }
      }, 200);
    };
    section.appendChild(exportBtn);

    var importBtn = document.createElement('button');
    importBtn.className = 'tog';
    importBtn.style.marginTop = '4px';
    importBtn.innerHTML = '<span class="tog-ic">↑</span>' +
      '<span class="tog-lbl">' + t('menu.import', 'Импорт') + '</span>' +
      '<span class="tog-arr">→</span>';
    importBtn.onclick = function() {
      if (Modal && Modal.close) Modal.close();
      setTimeout(function() {
        try {
          var BaseView = DI.resolve('BaseViewComponent');
          if (BaseView && BaseView.importData) BaseView.importData();
        } catch (err) {
          if (Toast && Toast.show) Toast.show('err', String(err && err.message || err) || 'Import failed');
        }
      }, 200);
    };
    section.appendChild(importBtn);

    return {
      section: section,
      cleanup: function() {
        exportBtn.onclick = null;
        importBtn.onclick = null;
      }
    };
  }

  /**
   * @returns {{section: HTMLDivElement, cleanup: function}}
   */
  function buildDangerSection() {
    var section = createSection('set.danger', 'Опасная зона');

    var clearCacheBtn = document.createElement('button');
    clearCacheBtn.className = 'btn-send full-width mb-8';
    clearCacheBtn.textContent = t('btn.clear_cache', 'Сбросить кеш');
    clearCacheBtn.onclick = function() {
      if (window.caches) {
        caches.keys().then(function(keys) {
          return Promise.all(keys.map(function(key) { return caches.delete(key); }));
        }).then(function() {
          if (Toast && Toast.show) Toast.show('ok', t('toast.cache_cleared', 'Кеш сброшен'));
          setTimeout(function() { location.reload(true); }, 500);
        }).catch(function() {
          setTimeout(function() { location.reload(true); }, 500);
        });
      } else {
        setTimeout(function() { location.reload(true); }, 500);
      }
    };
    section.appendChild(clearCacheBtn);

    var wipeBtn = document.createElement('button');
    wipeBtn.className = 'btn-send full-width danger-bg';
    wipeBtn.textContent = t('base.wipe', 'Стереть базу');
    wipeBtn.onclick = function() {
      var confirmMsg = t('base.wipe.confirm', 'Удалить все ваши мысли навсегда?');
      if (!confirm(confirmMsg)) return;
      try {
        if (AuthService && AuthService.resetStorage) {
          AuthService.resetStorage().then(function() {
            if (Toast && Toast.show) Toast.show('ok', t('toast.base.wiped', 'база стёрта'));
            setTimeout(function() { location.reload(); }, 500);
          });
        }
      } catch (e) {
        setTimeout(function() { location.reload(); }, 500);
      }
    };
    section.appendChild(wipeBtn);

    return {
      section: section,
      cleanup: function() {
        clearCacheBtn.onclick = null;
        wipeBtn.onclick = null;
      }
    };
  }

  /**
   * @returns {void}
   */
  function openMenu() {
    openCount++;
    var body = document.createElement('div');
    var appSection = buildAppSection();
    var netSection = buildNetSection();
    var dataSection = buildDataSection();
    var dangerSection = buildDangerSection();
    body.appendChild(appSection.section);
    body.appendChild(netSection.section);
    body.appendChild(dataSection.section);
    body.appendChild(dangerSection.section);

    if (Modal && Modal.open) {
      Modal.open({
        title: '',
        body: body,
        buttons: [
          {
            text: t('btn.cancel', 'Отмена'),
            primary: false,
            onClick: function() {
              if (Modal && Modal.close) Modal.close();
              cleanup();
            }
          },
          {
            text: t('btn.save', 'Сохранить'),
            primary: true,
            onClick: function() {
              saveCount++;
              var netValues = netSection.getValues();
              if (Config && Config.set) {
                Config.set('room', netValues.room);
                Config.set('threshold', netValues.threshold);
                Config.set('serendipity', netValues.serendipity);
                Config.set('relays', netValues.relays);
              }
              if (Config && Config.save) Config.save();
              if (Modal && Modal.close) Modal.close();
              if (Toast && Toast.show) Toast.show('info', t('toast.net.restart', 'перезапуск сети...'));
              setTimeout(function() {
                if (Net && Net.restart) {
                  Net.restart(function() {
                    if (Bus && Bus.emit) {
                      try { Bus.emit('editor:search-request', { force: true }); } catch (e) {}
                    }
                  });
                }
              }, 300);
              cleanup();
            }
          }
        ]
      });
    }

    function cleanup() {
      appSection.cleanup();
      netSection.cleanup();
      dataSection.cleanup();
      dangerSection.cleanup();
    }
  }

  /**
   * @returns {{opened: number, saved: number}}
   */
  function getStats() {
    return { opened: openCount, saved: saveCount };
  }

  /**
   * @returns {void}
   */
  function resetStats() {
    openCount = 0;
    saveCount = 0;
  }

  /**
   * @param {AbortSignal} [signal]
   * @returns {void}
   */
  function init(signal) {}

  /**
   * @returns {void}
   */
  function destroy() {
    resetStats();
  }

  return {
    openMenu: openMenu,
    getStats: getStats,
    resetStats: resetStats,
    init: init,
    destroy: destroy
  };
}, ['Config', 'Logger', 'Bus', 'I18n', 'Modal', 'Net', 'Toast', 'AuthService']);
