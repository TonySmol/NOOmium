  /**
   * Модуль инициализации и загрузки приложения.
   * Управляет последовательностью старта: AI -> Auth -> Net -> UI.
   * 
   * Использует глобальные хелперы и сервисы из App.State, а также
   * резолвит AuthService через DI (так как он нужен только на этапе загрузки).
   * 
   * @namespace App.Boot
   */

  var AuthService = DI.resolve('AuthService');

  /**
   * Главная функция загрузки приложения:
   * 1. Показывает прогресс-бар загрузки AI.
   * 2. Загружает ML-модель в Worker'е.
   * 3. Запрашивает пароль у пользователя (создание нового ключа или расшифровка).
   * 4. Инициализирует сеть Nostr.
   * 5. При первом запуске показывает онбординг.
   * 
   * @returns {void}
   */
  function bootApp() {
    // Добавляем специфичные ключи для модалок авторизации, если их нет в основном словаре
    I18n.addDict('ru', { 'btn.forgot': 'Забыли пароль?' });
    I18n.addDict('en', { 'btn.forgot': 'Forgot password?' });

    Progress.show();

    var aiLoaded = false;
    var netInitialized = false;

    /**
     * Проверяет, завершены ли загрузка AI и инициализация сети,
     * и показывает онбординг при первом запуске (флаг onboarded в Config).
     * @returns {void}
     */
    function checkOnboarding() {
      if (aiLoaded && netInitialized && !Config.get('onboarded', false)) {
        openHelp(true);
      }
    }

    // Запуск загрузки AI модели
    AI.load().then(function() {
      Progress.hide();
      aiLoaded = true;
      requestAuth();
      checkOnboarding();
    }).catch(function(err) {
      Progress.hide();
      if (Logger) Logger.error('AI load failed', String(err && err.message || err));
      aiLoaded = true;
      // Даже если AI упал в demo-режим, продолжаем загрузку
      requestAuth();
      checkOnboarding();
    });

    /**
     * Пытается инициализировать сеть с заданным паролем.
     * Устанавливает флаг netAuthorized в StateManager при успехе.
     * 
     * @param {string} password - Пароль для расшифровки ключа.
     * @returns {Promise<void>}
     */
    function tryInit(password) {
      return Net.init(function() { executeSearch(); }, password).then(function() {
        netInitialized = true;
        StateManager.setState({ netAuthorized: true });
        checkOnboarding();
      }).catch(function(err) {
        if (Logger) Logger.error('Net init failed', String(err && err.message || err));
        netInitialized = true; // Считаем сеть инициализированной (в offline/failed режиме)
        checkOnboarding();
      });
    }

    /**
     * Запрашивает у пользователя пароль (создание нового или ввод существующего).
     * Рекурсивно вызывает себя при неверном пароле, пока не будет превышен лимит попыток.
     * 
     * @param {function(): void} [onSuccess] - Колбэк после успешной авторизации.
     * @returns {void}
     */
    function requestAuth(onSuccess) {
      if (AuthService.needsNewKey()) {
        promptNewPassword(function(pwd) {
          AuthService.createNew(pwd, function() {
            tryInit(pwd).then(function() {
              if (typeof onSuccess === 'function') onSuccess();
            });
          });
        });
      } else {
        promptExistingPassword(function(pwd) {
          AuthService.unlock(pwd,
            function() {
              tryInit(pwd).then(function() {
                if (typeof onSuccess === 'function') onSuccess();
              });
            },
            function() {
              toast(translate('auth.wrong_password'), 'err');
              requestAuth(onSuccess); // Рекурсия при неверном пароле
            },
            function() {
              showResetModal(); // Превышен лимит попыток
            }
          );
        });
      }
    }

    /**
     * Показывает модалку сброса данных при превышении лимита попыток ввода пароля.
     * Предлагает пользователю стереть локальное хранилище и начать заново.
     * @returns {void}
     */
    function showResetModal() {
      var body = document.createElement('div');
      body.innerHTML = '<p class="reset-modal-text">' + translate('auth.reset_body') + '</p>';
      Modal.open({
        title: translate('auth.reset_title'),
        body: body,
        buttons: [
          {
            text: translate('auth.reset_btn'),
            danger: true,
            primary: true,
            onClick: function() {
              AuthService.resetStorage().then(function() {
                location.reload(true);
              });
            }
          }
        ]
      });
    }

    /**
     * Показывает модалку создания нового пароля (первый запуск).
     * Валидирует совпадение двух введённых паролей.
     * 
     * @param {function(string): void} callback - Вызывается с введённым паролем.
     * @returns {void}
     */
    function promptNewPassword(callback) {
      var body = document.createElement('div');
      body.innerHTML = '<div class="fg"><label class="fl">' + translate('auth.new_password_label1') + '</label><input type="password" class="fi-input" id="pwd1" /></div>' +
                       '<div class="fg"><label class="fl">' + translate('auth.new_password_label2') + '</label><input type="password" class="fi-input" id="pwd2" /></div>';
      var errorEl = document.createElement('div');
      errorEl.className = 'danger-text fs-12 mt-8';
      body.appendChild(errorEl);

      Modal.open({
        title: translate('auth.new_password_title'),
        body: body,
        buttons: [
          {
            text: translate('auth.new_password_save'),
            primary: true,
            onClick: function() {
              var p1 = document.getElementById('pwd1').value;
              var p2 = document.getElementById('pwd2').value;
              if (!p1) { errorEl.textContent = translate('auth.new_password_empty'); return; }
              if (p1 !== p2) { errorEl.textContent = translate('auth.new_password_mismatch'); return; }
              Modal.close();
              callback(p1);
            }
          }
        ]
      });
    }

    /**
     * Показывает модалку ввода пароля (повторный запуск).
     * Содержит кнопку сброса хранилища при забытом пароле.
     * 
     * @param {function(string): void} callback - Вызывается с введённым паролем.
     * @returns {void}
     */
    function promptExistingPassword(callback) {
      var body = document.createElement('div');
      body.innerHTML = '<div class="fg"><label class="fl">' + translate('auth.existing_password_label') + '</label><input type="password" class="fi-input" id="pwd1" /></div>';

      var forgotBtn = document.createElement('button');
      forgotBtn.type = 'button';
      forgotBtn.className = 'nv-act danger full-width mt-10 inline-flex-center';
      forgotBtn.textContent = translate('btn.reset_storage');
      forgotBtn.onclick = function() {
        if (!confirm(translate('reset_storage.confirm'))) return;
        Modal.close();
        AuthService.resetStorage().then(function() {
          location.reload(true);
        });
      };
      body.appendChild(forgotBtn);

      var errorEl = document.createElement('div');
      errorEl.className = 'danger-text fs-12 mt-8';
      body.appendChild(errorEl);

      Modal.open({
        title: translate('auth.existing_password_title'),
        body: body,
        buttons: [
          {
            text: translate('auth.existing_password_btn'),
            primary: true,
            onClick: function() {
              var p1 = document.getElementById('pwd1').value;
              if (!p1) { errorEl.textContent = translate('auth.existing_password_empty'); return; }
              Modal.close();
              callback(p1);
            }
          }
        ]
      });
    }

    /**
     * Колбэк для запроса авторизации сети из SearchService.
     * Вызывается, когда пользователь пытается отправить заметку в 'world',
     * но сеть ещё не авторизована (например, после сбоя инициализации).
     * 
     * @param {function(): void} onSuccess - Вызывается после успешной авторизации.
     * @returns {void}
     */
    function requestNetworkAuth(onSuccess) {
      if (StateManager.getState().netAuthorized) {
        if (typeof onSuccess === 'function') onSuccess();
        return;
      }
      requestAuth(onSuccess);
    }

    // Сохраняем колбэк в StateManager для доступа из SearchService
    StateManager.setState({ requestNetworkAuth: requestNetworkAuth });
  }

  /**
   * Точка монтирования приложения: создаёт корневой элемент,
   * рендерит разметку, инициализирует все UI-компоненты и запускает bootApp().
   * При критической ошибке показывает fallback-экран с кнопкой перезагрузки.
   * 
   * @returns {void}
   */
  function mountApp() {
    try {
      // Очистка возможных старых обработчиков (на случай HMR или повторного вызова)
      cleanup();

      var root = document.getElementById('app-root');
      if (!root) {
        root = document.createElement('div');
        root.id = 'app-root';
        document.body.appendChild(root);
      }
      document.body.classList.add('show-app');
      
      // Генерация и вставка HTML-разметки
      root.innerHTML = buildMarkup();
      
      // Привязка глобальных window listeners и Bus events
      setupWindowListeners();
      bindEvents();

      // Инициализация UI-компонентов
      try { DI.resolve('HeaderStatusComponent').init(); } catch (e) {
        if (Logger) Logger.warn('HeaderStatusComponent init failed', String(e));
      }
      try { DI.resolve('OfflineBarComponent').init(); } catch (e) {
        if (Logger) Logger.warn('OfflineBarComponent init failed', String(e));
      }
      try { EditorComponent.init(); } catch (e) {
        if (Logger) Logger.warn('EditorComponent init failed', String(e));
      }
      try { DI.resolve('StreamViewComponent').init(); } catch (e) {
        if (Logger) Logger.warn('StreamViewComponent init failed', String(e));
      }
      try { DI.resolve('FocusBarComponent').init(); } catch (e) {
        if (Logger) Logger.warn('FocusBarComponent init failed', String(e));
      }
      try { DI.resolve('BaseViewComponent').init(); } catch (e) {
        if (Logger) Logger.warn('BaseViewComponent init failed', String(e));
      }

      // Инициализация сервисов
      try { SearchService.init(); } catch (e) {
        if (Logger) Logger.warn('SearchService init failed', String(e));
      }

      // Запуск цепочки загрузки (AI -> Auth -> Net)
      bootApp();
      
      if (Logger) Logger.info('App mounted successfully');
    } catch (err) {
      console.error('App mount failed:', err);
      
      // Fallback UI при фатальной ошибке инициализации
      var root = document.getElementById('app-root');
      if (root) {
        root.textContent = '';
        var wrapper = document.createElement('div');
        wrapper.className = 'error-wrapper';

        var heading = document.createElement('h2');
        heading.className = 'error-heading';
        heading.textContent = 'NOOmium failed to start';

        var message = document.createElement('p');
        message.className = 'error-message';
        message.textContent = String(err && err.message || err);

        var reloadBtn = document.createElement('button');
        reloadBtn.className = 'error-reload-btn';
        reloadBtn.textContent = 'Reload';
        reloadBtn.onclick = function() { location.reload(); };

  /**
   * Точка входа приложения NOOmium.
   * 
   * Отвечает за:
   * 1. Резолв корневого модуля App через DI-контейнер.
   * 2. Вызов mount() для инициализации UI и запуска цепочки загрузки.
   * 3. Инициализацию Service Worker (опционально, с graceful degradation).
   * 4. Отображение fallback-экрана при критических ошибках старта.
   * 
   * Архитектурные решения:
   * - Использует var для консистентности с остальной кодовой базой.
   * - Инициализация SW изолирована в отдельный try/catch, чтобы сбой SW 
   *   не ломал запуск всего приложения (SW — опциональный компонент).
   * - Проверяет document.readyState для корректного запуска как при 
   *   синхронной загрузке скрипта, так и при отложенной.
   * 
   * @function bootstrap
   * @returns {void}
   */
  function bootstrap() {
    try {
      // Резолвим корневой модуль App, что триггерит создание всех Singleton-сервисов
      var app = DI.resolve('App');
      app.mount();
      
      // Инициализация Service Worker (клиентская часть: регистрация и управление жизненным циклом).
      // Вызов изолирован в try/catch, чтобы сбой SW не ломал запуск всего приложения:
      // SW — опциональный компонент, приложение должно работать и без него (fallback).
      try {
        var sw = DI.resolve('SW');
        sw.init();
      } catch (swErr) {
        // Логируем, но не прерываем работу приложения
        if (typeof console !== 'undefined' && console.warn) {
          console.warn('[Bootstrap] SW init failed:', swErr);
        }
      }
    } catch (err) {
      // Критическая ошибка: не удалось смонтировать приложение
      if (typeof console !== 'undefined' && console.error) {
        console.error('Bootstrap failed:', err);
      }

      // Fallback UI: показываем экран с описанием ошибки и кнопкой перезагрузки,
      // чтобы пользователь мог восстановить работоспособность (например, после
      // повреждения localStorage или несовместимости браузера).
      var root = document.getElementById('app-root');
      if (!root) {
        root = document.createElement('div');
        root.id = 'app-root';
        document.body.appendChild(root);
      }

      root.textContent = '';

      var wrapper = document.createElement('div');
      wrapper.className = 'startup-wrapper';

      var heading = document.createElement('h2');
      heading.textContent = 'Startup failed';

      var message = document.createElement('p');
      message.className = 'startup-message';
      message.textContent = String(err && err.message || err);

      var reloadBtn = document.createElement('button');
      reloadBtn.className = 'startup-reload';
      reloadBtn.textContent = 'Reload';
      reloadBtn.onclick = function() { location.reload(); };

      wrapper.appendChild(heading);
      wrapper.appendChild(message);
      wrapper.appendChild(reloadBtn);
      root.appendChild(wrapper);

      document.body.classList.add('show-app');
    }
  }

   * 
   * - Если DOM ещё загружается ('loading') — ждём события DOMContentLoaded.
   * - Если DOM уже готов ('interactive' или 'complete') — запускаем немедленно.

     * Обработчик изменения состояния устанавливающегося Service Worker'а.
     * Отслеживает переход в 'installed' и инициирует немедленную активацию,
     * если уже есть активный контроллер (значит это обновление, а не первая установка).
     * 
     * КРИТИЧНО: Снимает сам себя после достижения фазы 'installed' для предотвращения
     * утечек памяти и спама в лог при последующих переходах (activating → activated).
     * 
     * @param {ServiceWorker} installing - Worker в фазе установки.
     * @returns {function(Event): void} Обработчик statechange.
     */
    function createInstallingStateHandler(installing) {
      var handler = function onStateChange() {
        if (!installing) return;
        
        log('info', 'Worker state changed', { state: installing.state });
        
        if (installing.state === 'installed') {
          // Снимаем listener, чтобы не спамить при activating/activated
          installing.removeEventListener('statechange', handler);
          
          // Если есть активный контроллер — это обновление, а не первая установка
          if (navigator.serviceWorker.controller) {
            requestSkipWaiting(installing, 'update-installed');
          } else {
            log('info', 'First install completed, no skip needed');
            emit('sw:registered', { version: resolveAppVersion(), firstInstall: true });
          }
        }
      };
      return handler;
    }

    /**
     * Обработчик события updatefound на регистрации SW.
     * Подписывается на statechange нового worker'а (reg.installing).
     * 
     * @param {ServiceWorkerRegistration} reg - Активная регистрация.
     * @returns {function(): void} Обработчик updatefound.
     */
    function createUpdateFoundHandler(reg) {
      return function onUpdateFound() {
        var installing = reg.installing;
        if (!installing) {
          log('warn', 'updatefound fired but reg.installing is null');
          return;
        }
        
        log('info', 'New SW detected, state: ' + installing.state);
        installing.addEventListener('statechange', createInstallingStateHandler(installing));
      };
    }

    /**
     * Глобальный обработчик смены контроллера Service Worker.
     * Срабатывает, когда новый SW берёт контроль над клиентом.
     * Использует флаг refreshing для предотвращения цикла перезагрузок.
     * 
     * @returns {function(): void}
     */
    function onControllerChange() {
      if (refreshing) {
        log('warn', 'controllerchange ignored (already refreshing)');
        return;
      }
      
      refreshing = true;
      log('info', 'Controller changed, initiating reload sequence');
      emit('sw:updated', { timestamp: Date.now() });
      
      // Задержка 100мс, чтобы Bus успел доставить событие подписчикам
      // (например, Toast-уведомлению об обновлении) до beforeunload
      setTimeout(function() {
        window.location.reload();
      }, 100);
    }

    /**
     * Обработчик входящих сообщений от Service Worker.
     * Позволяет SW push'ить данные в UI (например, статус фоновой синхронизации).
     * 
     * @param {MessageEvent} event - Событие сообщения.
     * @returns {void}
     */
    function onServiceWorkerMessage(event) {
      if (!event.data) return;
      log('info', 'Message from SW', event.data);
      emit('sw:message', event.data);
    }

    /**
     * Устанавливает глобальные обработчики controllerchange и message.
     * Защищён от повторной регистрации через флаг globalListenersAttached.
     * 
     * @returns {void}
     */
    function attachGlobalListeners() {
      if (globalListenersAttached) {
        log('info', 'Global SW listeners already attached');
        return;
      }
      
      if (!navigator.serviceWorker || typeof navigator.serviceWorker.addEventListener !== 'function') {
        log('warn', 'navigator.serviceWorker.addEventListener not available');
        return;
      }
      
      try {
        navigator.serviceWorker.addEventListener('controllerchange', onControllerChange);
        navigator.serviceWorker.addEventListener('message', onServiceWorkerMessage);
        globalListenersAttached = true;
        log('info', 'Global SW listeners attached');
      } catch (err) {
        log('error', 'Failed to attach global SW listeners', err);
      }
    }

    /**
     * Обрабатывает успешную регистрацию Service Worker'а.
     * Проверяет наличие ожидающего worker'а, подписывается на обновления.
     * 
     * @param {ServiceWorkerRegistration} reg - Объект регистрации.
     * @param {string} appVersion - Версия приложения.
     * @returns {void}
     */
    function handleRegistrationSuccess(reg, appVersion) {
      registration = reg;
      log('info', 'Registered successfully', {
        version: appVersion,
        scope: reg.scope,
        updateViaCache: reg.updateViaCache
      });
      
      emit('sw:registered', {
        version: appVersion,
        scope: reg.scope,
        firstInstall: false
      });
      
      // Сценарий 1: Возврат на страницу, где уже есть ожидающий SW
      // (например, пользователь открыл новую вкладку)
      if (reg.waiting) {
        log('info', 'Found waiting SW on startup, requesting activation');
        requestSkipWaiting(reg.waiting, 'waiting-on-startup');
      }
      
      // Сценарий 2: Активный SW уже существует — ничего не делаем
      if (reg.active && !reg.waiting && !reg.installing) {
        log('info', 'Active SW is up-to-date');
      }
      
      // Подписываемся на обнаружение новых версий
      reg.addEventListener('updatefound', createUpdateFoundHandler(reg));
      log('info', 'updatefound listener attached');
    }

    /**
     * Обрабатывает ошибку регистрации Service Worker'а.
     * Не прерывает работу приложения — SW является опциональным компонентом.
     * 
     * @param {Error} err - Объект ошибки.
     * @returns {void}
     */
    function handleRegistrationError(err) {
      log('error', 'Registration failed', err && err.message ? err.message : err);
      emit('sw:error', {
        message: err && err.message ? err.message : String(err),
        timestamp: Date.now()
      });
    }

    /**
     * Главная точка входа модуля.
     * Инициирует регистрацию Service Worker'а с динамическим scope
     * и настраивает обработчики жизненного цикла. Безопасна для повторных вызовов.
     *
     * @returns {void}
     */
    function init() {
      // Проверка поддержки Service Worker
      if (!('serviceWorker' in navigator)) {
        log('warn', 'Service Worker API not supported by browser');
        return;
      }
      
      // Проверка безопасности: SW работает только в secure context
      if (window.location.protocol !== 'https:' && 
          window.location.hostname !== 'localhost' && 
          window.location.hostname !== '127.0.0.1') {
        log('warn', 'Service Worker requires HTTPS (current: ' + window.location.protocol + ')');
        return;
      }
      
      var appVersion = resolveAppVersion();
      log('info', 'Initializing SW registration', { version: appVersion });
      
      // Устанавливаем глобальные listener'ы до регистрации,
      // чтобы не пропустить событие, если SW активируется мгновенно
      attachGlobalListeners();
      
      // Формируем URL с версией для cache-busting самого sw.js
      var swUrl = './sw.js?v=' + encodeURIComponent(appVersion);
      
      // Вычисляем scope динамически для поддержки деплоя в подпапки
      // (например, github.io/noomium/ или domain.com/app/)
      var scopeUrl;
      try {
        scopeUrl = new URL('./', window.location.href).pathname;
      } catch (_) {
        scopeUrl = './';
      }
      
      // Регистрируем SW с updateViaCache: 'none' для предотвращения
      // кеширования браузером файла sw.js (иначе обновления могут
      // задерживаться до 24 часов согласно спецификации SW)
      navigator.serviceWorker.register(swUrl, {
        updateViaCache: 'none',
        scope: scopeUrl
      })
        .then(function(reg) {
          handleRegistrationSuccess(reg, appVersion);
        })
        .catch(handleRegistrationError);
    }

    /**
     * Публичный метод для принудительной проверки обновлений SW.
     * Может быть вызван из UI (например, кнопка "Проверить обновления").
     * 
     * @returns {Promise<boolean>} true если проверка инициирована.
     */
    function checkForUpdates() {
      if (!registration) {
        log('warn', 'Cannot check updates: no active registration');
        return Promise.resolve(false);
      }
      
      log('info', 'Manual update check requested');
      return registration.update()
        .then(function() {
          log('info', 'Manual update check completed');
          return true;
        })
        .catch(function(err) {
          log('warn', 'Manual update check failed', err);
          return false;
        });
    }

    /**
     * Возвращает текущую версию приложения (для UI).
     * 
     * @returns {string}
     */
    function getVersion() {
      return resolveAppVersion();
    }

    /**
     * Возвращает текущее состояние флага refreshing.
     * Полезно для отладки и UI-индикаторов.
     * 
     * @returns {boolean}
     */
    function isRefreshing() {
      return refreshing;
    }

    return {
      /**
       * Инициирует регистрацию SW и настройку обработчиков.
       * @returns {void}
       */
      init: init,
      
      /**
       * Принудительно проверяет наличие обновлений SW.
       * @returns {Promise<boolean>}
       */
      checkForUpdates: checkForUpdates,
      
      /**
       * Возвращает текущую версию приложения.
       * @returns {string}
       */
      getVersion: getVersion,
      
      /**
       * Возвращает флаг refreshing (идёт ли перезагрузка).
       * @returns {boolean}
       */
      isRefreshing: isRefreshing
    };
  }, ['Config', 'Logger', 'Bus']);
<!-- NOOMIUM_MODULE_END SW -->

})();
</script>
