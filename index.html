<!-- NOOMIUM_MODULE_START CSS -->
<style>
:root{
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bot:env(safe-area-inset-bottom,0px);
  --ease:cubic-bezier(.2,.7,.2,1);
  --gap:8px;
  --gap-sm:6px;
  --r:12px;--r-sm:8px;--r-xs:5px;
  --font:ui-sans-serif,-apple-system,'SF Pro Text','Inter','Segoe UI',Roboto,sans-serif;
  --mono:ui-monospace,'SF Mono',Menlo,Consolas,monospace;
  --hdr-h:48px;--btab-h:56px;
}
[data-theme="dark"]{
  --bg:#0b0b10;--bg-2:#121218;--surface:#16161e;--surface-2:#1c1c26;--surface-3:#242430;
  --text:#ececf1;--text-2:#a0a0ae;--text-3:#6c6c7a;--text-dim:#484855;
  --line:rgba(255,255,255,.06);--line-strong:rgba(255,255,255,.11);
  --brand:#8b7cff;--brand-glow:rgba(139,124,255,.14);
  --world:#38bdf8;--world-glow:rgba(56,189,248,.12);
  --seren:#4ade80;--seren-glow:rgba(74,222,128,.12);
  --danger:#ef4444;--danger-glow:rgba(239,68,68,.14);
  --warning:#eab308;--ok:#22c55e;
  color-scheme:dark;
}
[data-theme="light"]{
  --bg:#fafafa;--bg-2:#ffffff;--surface:#ffffff;--surface-2:#f4f4f6;--surface-3:#eaeaed;
  --text:#1a1a22;--text-2:#52525c;--text-3:#8a8a95;--text-dim:#b4b4be;
  --line:rgba(0,0,0,.06);--line-strong:rgba(0,0,0,.12);
  --brand:#6d5ef5;--brand-glow:rgba(109,94,245,.10);
  --world:#0284c7;--world-glow:rgba(2,132,199,.08);
  --seren:#16a34a;--seren-glow:rgba(22,163,74,.08);
  --danger:#dc2626;--danger-glow:rgba(220,38,38,.10);
  --warning:#ca8a04;--ok:#16a34a;
  color-scheme:light;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100vh;height:100dvh;overflow:hidden;background:var(--bg);color:var(--text);
  font:15px/1.5 var(--font);-webkit-font-smoothing:antialiased;
  -webkit-user-select:none;user-select:none;overscroll-behavior:none}
input,textarea{-webkit-user-select:text;user-select:text}
button{font:inherit;color:inherit;background:none;border:none;cursor:pointer;outline:none}
button[disabled]{opacity:.45;cursor:not-allowed}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--line-strong);border-radius:3px}
#app-root{height:100vh;height:100dvh;display:none;flex-direction:column;overflow:hidden;}
body.show-app #app-root{display:flex}
.hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;
  padding-top:calc(10px + var(--safe-top));padding-bottom:10px;background:var(--surface);
  border-bottom:1px solid var(--line);flex-shrink:0;min-height:var(--hdr-h);gap:12px}
.logo{display:flex;align-items:center;gap:8px;font-weight:700;font-size:16px;letter-spacing:-.01em;flex-shrink:0}
.logo-mark{display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;
  border-radius:6px;background:var(--brand);color:white;font-weight:800;font-size:12px}
.logo-dot{color:var(--brand);margin:0 .5px}
.hdr-status{display:flex;align-items:center;gap:10px;flex:1;min-width:0;justify-content:flex-end;
  font-size:11px;color:var(--text-3);font-family:var(--mono);letter-spacing:.02em;overflow:hidden}
.hdr-st-item{display:inline-flex;align-items:center;gap:5px;white-space:nowrap;flex-shrink:0}
.hdr-st-dot{width:6px;height:6px;border-radius:50%;background:var(--text-dim);flex-shrink:0}
.hdr-st-dot.ok{background:var(--ok)}
.hdr-st-dot.warn{background:var(--warning)}
.hdr-st-dot.err{background:var(--danger)}
.hdr-st-dot.load{background:var(--brand);animation:pulse 1.4s ease-in-out infinite}
@keyframes pulse{50%{opacity:.3}}
.hdr-st-sep{color:var(--line-strong);flex-shrink:0}
.burger{min-width:44px;min-height:44px;padding:10px;border-radius:10px;display:flex;
  flex-direction:column;align-items:center;justify-content:center;gap:4px;
  transition:background .15s var(--ease);flex-shrink:0}
.burger:active{background:var(--surface-2)}
.burger-line{width:16px;height:2px;background:var(--text-2);border-radius:1px}
.ws{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative;min-height:0;
  gap:var(--gap);padding-bottom:0;padding-top:var(--gap)}
.seg{display:flex;gap:2px;margin:0 12px;background:var(--surface);
  border:1px solid var(--line);border-radius:var(--r-sm);flex-shrink:0;padding:6px 3px;min-height:44px}
.seg-b{flex:1;padding:0 6px;border-radius:6px;font-size:13px;font-weight:500;color:var(--text-3);
  display:flex;align-items:center;justify-content:center;gap:6px;
  transition:background .15s var(--ease),color .15s var(--ease);min-width:0;min-height:32px}
.seg-b.on{background:var(--surface-2);color:var(--text)}
.seg-b .lbl{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.seg-b .cnt{font-size:10px;padding:1px 6px;border-radius:9px;background:var(--surface-3);
  font-family:var(--mono);font-variant-numeric:tabular-nums;font-weight:600;
  flex-shrink:0;min-width:16px;text-align:center}
.seg-b.on[data-k="local"] .cnt{background:var(--brand-glow);color:var(--brand)}
.seg-b.on[data-k="world"] .cnt{background:var(--world-glow);color:var(--world)}
.seg-b.on[data-k="seren"] .cnt{background:var(--seren-glow);color:var(--seren)}
.carousel-wrap{flex:1;display:flex;flex-direction:column;min-height:0;position:relative;margin:0;padding:0}
.carousel{flex:1;display:flex;overflow-x:auto;overflow-y:hidden;scroll-snap-type:x mandatory;
  scroll-behavior:smooth;scroll-padding:0 12px;gap:10px;padding:0 12px 0;min-height:0;
  -webkit-overflow-scrolling:touch;scrollbar-width:none;touch-action:pan-x}
.carousel::-webkit-scrollbar{display:none}
.carousel-item{flex:0 0 calc(100% - 4px);scroll-snap-align:center;scroll-snap-stop:always;
  display:flex;min-height:0;width:calc(100% - 4px);padding:2px 0;touch-action:pan-x}
.carousel-dots{display:flex;justify-content:center;align-items:center;gap:4px;
  flex-shrink:0;flex-wrap:wrap}
.carousel-dot{width:4px;height:4px;border-radius:50%;background:var(--line-strong);
  transition:background .2s var(--ease),transform .2s var(--ease),width .2s var(--ease)}
.carousel-dot.active{background:var(--brand);width:12px;border-radius:2px}
.carousel-counter{font-size:11px;color:var(--text-3);font-family:var(--mono);
  font-variant-numeric:tabular-nums;margin:0 4px}
.fi{background:var(--surface);border:1px solid var(--line);border-style:solid;border-radius:var(--r);
  padding:14px;display:flex;flex-direction:column;gap:10px;width:100%;height:100%;
  min-height:0;transition:border-color .2s var(--ease)}
.fi.active{border-color:var(--line-strong)}
.fi-h{display:flex;justify-content:space-between;align-items:center;gap:8px;
  font-size:11px;flex-shrink:0}
.fi-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:4px;
  font-size:10px;font-weight:600;letter-spacing:.03em;background:var(--surface-2);
  color:var(--text-3);border:1px solid var(--line);text-transform:uppercase;flex-shrink:0}
.fi.t-local .fi-badge{color:var(--brand);border-color:var(--brand-glow)}
.fi.t-world .fi-badge{color:var(--world);border-color:var(--world-glow)}
.fi.t-seren .fi-badge{color:var(--seren);border-color:var(--seren-glow)}
.fi-score{display:inline-flex;align-items:center;gap:4px;flex-shrink:0;
  font-family:var(--mono);font-variant-numeric:tabular-nums}
.fi-score-label{font-size:10px;color:var(--text-3);text-transform:lowercase}
.fi-score-value{font-size:11px;font-weight:600}
.fi.t-local .fi-score-value{color:var(--brand)}
.fi.t-world .fi-score-value{color:var(--world)}
.fi.t-seren .fi-score-value{color:var(--seren)}
.fi-body{flex:1;min-height:0;overflow-y:auto;overscroll-behavior:contain;font-size:15px;
  line-height:1.6;color:var(--text);white-space:pre-wrap;word-break:break-word;
  overflow-wrap:anywhere;scrollbar-width:thin;scrollbar-color:var(--line-strong) transparent;padding:2px;
  touch-action:pan-y pinch-zoom}
.fi-body::-webkit-scrollbar{width:4px}
.fi-body::-webkit-scrollbar-thumb{background:var(--line-strong);border-radius:2px}
.fi-body mark{background:var(--brand-glow);color:var(--brand);padding:0 3px;
  border-radius:2px;font-weight:600}
.fi-foot{display:flex;gap:6px;flex-wrap:wrap;padding-top:10px;border-top:1px solid var(--line);flex-shrink:0}
.fi-act{min-height:38px;padding:8px 14px;border-radius:8px;font-size:13px;font-weight:500;
  color:var(--text-2);transition:background .12s var(--ease),color .12s var(--ease),opacity .12s var(--ease);
  border:1px solid var(--line);background:transparent;display:inline-flex;
  align-items:center;gap:6px;white-space:nowrap}
.fi-act:active:not([disabled]){background:var(--surface-2)}
.fi-act.danger:active:not([disabled]){background:var(--danger-glow);color:var(--danger);border-color:rgba(239,68,68,.3)}
.fi-act.primary{background:var(--brand);color:white;border-color:transparent}
.fi-act.primary:active:not([disabled]){filter:brightness(1.1);color:white}
.fi-act[disabled]{opacity:.45;cursor:not-allowed}
.ed{background:var(--surface);margin:0 12px;border:1px solid var(--line);
  border-radius:var(--r);padding:10px 12px;flex-shrink:0;transition:border-color .15s var(--ease)}
.ed:focus-within{border-color:var(--brand)}
.ed-ta{width:100%;min-height:44px;max-height:110px;background:transparent;border:none;
  outline:none;resize:none;font:15px/1.5 var(--font);color:var(--text);padding:4px 0}
.ed-ta::placeholder{color:var(--text-dim)}
.ed-foot{display:flex;justify-content:space-between;align-items:center;margin-top:10px;
  padding-top:10px;border-top:1px solid var(--line);gap:8px}
.ed-cnt{font-size:11px;color:var(--text-3);font-family:var(--mono);font-variant-numeric:tabular-nums}
.ed-acts{display:flex;gap:8px;align-items:center;flex:1;justify-content:flex-end}
.tog-sw{display:inline-flex;align-items:center;background:var(--surface-2);
  border:1px solid var(--line);border-radius:999px;padding:3px;position:relative;
  height:40px;min-width:140px;user-select:none}
.tog-sw-opt{flex:1;display:flex;align-items:center;justify-content:center;gap:5px;
  height:100%;padding:0 12px;font-size:13px;font-weight:600;color:var(--text-3);
  border-radius:999px;z-index:2;position:relative;cursor:pointer;
  transition:color .2s var(--ease);white-space:nowrap;min-width:62px}
.tog-sw-opt.on{color:var(--text)}
.tog-sw-thumb{position:absolute;top:3px;bottom:3px;width:calc(50% - 3px);
  background:var(--surface-3);border-radius:999px;left:3px;
  transition:left .25s var(--ease),background .2s var(--ease);z-index:1;
  box-shadow:0 1px 3px rgba(0,0,0,.15)}
.tog-sw[data-mode="world"] .tog-sw-thumb{left:calc(50%);background:var(--world-glow)}
.tog-sw[data-mode="world"] .tog-sw-opt[data-v="world"]{color:var(--world)}
.tog-sw[data-mode="private"] .tog-sw-thumb{background:var(--brand-glow)}
.tog-sw[data-mode="private"] .tog-sw-opt[data-v="private"]{color:var(--brand)}
.btn-send{height:40px;min-width:44px;padding:0 16px;border-radius:999px;background:var(--brand);
  color:white;font-size:14px;font-weight:600;display:inline-flex;align-items:center;
  justify-content:center;gap:6px;box-shadow:0 2px 8px var(--brand-glow);
  transition:transform .1s var(--ease),filter .15s var(--ease),opacity .15s var(--ease)}
.btn-send:active:not([disabled]){transform:scale(.95)}
.btn-send:hover:not([disabled]){filter:brightness(1.08)}
.btn-send[disabled]{opacity:.5}
.btn-send.sending{pointer-events:none;opacity:.7}
.btn-send svg{width:16px;height:16px;flex-shrink:0}
.btn-send.sending svg{animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.md-btn{min-height:40px;padding:8px 16px;border-radius:8px;font-size:14px;font-weight:600;
  display:inline-flex;align-items:center;justify-content:center;gap:6px;
  transition:transform .1s var(--ease),filter .15s var(--ease),opacity .15s var(--ease);cursor:pointer}
.md-btn:active:not([disabled]){transform:scale(.95)}
.feed-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;padding:32px 24px;color:var(--text-3);margin:0 12px;
  background:var(--surface);border:1px dashed var(--line-strong);border-radius:var(--r)}
.feed-empty-ic{font-size:28px;margin-bottom:12px;opacity:.5;width:52px;height:52px;
  display:flex;align-items:center;justify-content:center;border:1px solid var(--line);border-radius:12px}
.feed-empty-t{font-size:14px;font-weight:600;color:var(--text-2);margin-bottom:4px}
.feed-empty-d{font-size:13px;max-width:280px;line-height:1.45}
.base{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0}
.base-h{padding:10px 12px 0;flex-shrink:0}
.base-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:8px}
.stat{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-sm);
  padding:8px;text-align:center;min-width:0}
.stat-v{font-size:20px;font-weight:700;font-family:var(--mono);font-variant-numeric:tabular-nums}
.stat-l{font-size:10px;color:var(--text-3);text-transform:uppercase;letter-spacing:.04em;
  margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.base-ctrls{display:flex;gap:6px;align-items:center}
.base-search{flex:1;min-width:0;background:var(--surface);border:1px solid var(--line);
  border-radius:var(--r-sm);padding:9px 12px;font:14px var(--font);color:var(--text);
  outline:none;transition:border-color .15s var(--ease);min-height:40px}
.base-search:focus{border-color:var(--brand)}
.base-search::placeholder{color:var(--text-dim)}
.base-sort{flex:0 0 auto;min-width:0;max-width:140px;background:var(--surface);
  border:1px solid var(--line);border-radius:var(--r-sm);padding:9px 28px 9px 12px;
  font:13px var(--font);color:var(--text-2);outline:none;cursor:pointer;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;appearance:none;
  -webkit-appearance:none;min-height:40px;
  background-image:url("data:image/svg+xml;charset=utf-8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'%3E%3Cpath fill='none' stroke='%23888' stroke-width='1.5' stroke-linecap='round' d='M1 1l4 4 4-4'/%3E%3C/svg%3E");
  background-repeat:no-repeat;background-position:right 10px center}
.base-sort option{background:var(--surface);color:var(--text)}
.base-list{flex:1;overflow-y:auto;overflow-x:hidden;padding:0 12px;
  position:relative;min-height:0;width:100%;
  -webkit-overflow-scrolling:touch}
.base-items{position:absolute;top:0;left:12px;right:12px}
.base-items .bi{position:absolute;top:0;left:0;width:100%}
.bi{width:100%;flex-shrink:0;height:100px;background:var(--surface);color:var(--text);
  border:1px solid var(--line);border-radius:var(--r);padding:12px;
  display:flex;flex-direction:column;gap:6px;position:relative;overflow:hidden;cursor:pointer;
  transition:border-color .15s var(--ease)}
.bi:active{border-color:var(--line-strong)}
.bi-t{font-size:14px;line-height:1.55;color:var(--text);white-space:pre-wrap;
  word-break:break-word;overflow-wrap:anywhere;flex:1;overflow:hidden;position:relative}
.bi-t.truncated::after{content:"";position:absolute;bottom:0;left:0;right:0;height:28px;
  background:linear-gradient(180deg,transparent,var(--surface));pointer-events:none}
.bi-f{display:flex;justify-content:space-between;align-items:center;gap:6px;
  flex-wrap:wrap;font-size:11px;flex-shrink:0;padding-top:4px;border-top:1px solid var(--line)}
.bi-meta{display:flex;align-items:center;gap:8px;color:var(--text-3);flex-wrap:wrap}
.bi-tag{padding:2px 7px;border-radius:4px;font-size:10px;font-weight:600;
  background:var(--brand-glow);color:var(--brand);text-transform:uppercase;letter-spacing:.03em}
.bi.shared .bi-tag{background:var(--world-glow);color:var(--world)}
.bi-date{font-family:var(--mono);font-variant-numeric:tabular-nums;font-size:10px}
.nv{position:fixed;inset:0;background:var(--bg);z-index:900;display:none;
  flex-direction:column;animation:fadeScale .2s var(--ease)}
.nv.on{display:flex}
@keyframes fadeScale{from{opacity:0;transform:scale(.98)}}
.nv-f{display:flex;justify-content:center;gap:var(--gap-sm);padding:10px 14px;
  padding-top:calc(10px + var(--safe-top));background:var(--surface);
  border-bottom:1px solid var(--line);flex-shrink:0;flex-wrap:wrap}
.nv-f .nv-act{min-width:80px}
.nv-b{flex:1;display:flex;flex-direction:column;overflow-y:auto;padding:16px;
  -webkit-overflow-scrolling:touch;overscroll-behavior:contain}
.nv-text{font-size:16px;line-height:1.7;color:var(--text);white-space:pre-wrap;
  word-break:break-word;overflow-wrap:anywhere}
.nv-ta{width:100%;flex:1;background:var(--surface-2);border:1px solid var(--line);
  border-radius:var(--r-sm);padding:12px;font:15px/1.6 var(--font);color:var(--text);
  outline:none;resize:vertical;transition:border-color .15s var(--ease)}
.nv-ta:focus{border-color:var(--brand)}
.nv-f-bottom{display:flex;justify-content:space-between;gap:var(--gap-sm);padding:10px 14px;
  padding-bottom:calc(10px + var(--safe-bot));background:var(--surface);
  border-top:1px solid var(--line);flex-shrink:0;flex-wrap:nowrap}
.nv-f-bottom .nv-act{flex:1;max-width:48%}
.nv-act{min-height:40px;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:500;
  color:var(--text-2);transition:background .12s var(--ease),color .12s var(--ease);
  border:1px solid var(--line);background:transparent;display:inline-flex;
  align-items:center;justify-content:center;text-align:center;gap:6px;white-space:nowrap}
.nv-act:active:not([disabled]){background:var(--surface-2)}
.nv-act.danger{color:var(--danger);border-color:rgba(239,68,68,.3)}
.nv-act.danger:active:not([disabled]){background:var(--danger-glow);color:var(--danger);border-color:rgba(239,68,68,.3)}
.nv-act.primary{background:var(--brand);color:white;border-color:transparent}
.nv-act.primary:active:not([disabled]){filter:brightness(1.1);color:white}
.nv-act[disabled]{opacity:.45;cursor:not-allowed}
.onb-row{display:flex;align-items:center;gap:10px;padding:12px 0 4px;
  font-size:13px;color:var(--text-2);cursor:pointer;user-select:none}
.onb-row input[type="checkbox"]{width:18px;height:18px;accent-color:var(--brand);cursor:pointer;flex-shrink:0}
.btab{position:sticky;bottom:0;left:0;right:0;display:flex;
  padding:4px 6px;padding-bottom:calc(4px + var(--safe-bot));z-index:50;flex-shrink:0;
  height:auto;min-height:var(--btab-h);margin-top:var(--gap);
  background:var(--surface);border-top:1px solid var(--line)}
.btab-b{flex:1;display:flex;align-items:center;justify-content:center;gap:8px;
  padding:10px 8px;color:var(--text-3);font-size:13px;font-weight:500;
  border-radius:var(--r-sm);transition:background .15s var(--ease),color .15s var(--ease);min-height:44px}
.btab-b:active{background:var(--surface-2)}
.btab-b.on{background:var(--surface-2);color:var(--text)}
.btab-ic{font-size:16px}
.mo{position:fixed;inset:0;background:rgba(0,0,0,.4);backdrop-filter:blur(4px);
  -webkit-backdrop-filter:blur(4px);display:none;z-index:1000}

/**
 * @typedef {number} SubscriptionID
 * @description Уникальный идентификатор подписки на событие.
 */

/**
 * @typedef {Object} SubscriptionRecord
 * @description Внутренняя запись о подписке.
 * @property {function(*): void} handler - Обработчик события.
 * @property {AbortSignal} [signal] - Опциональный сигнал для автоотписки.
 * @property {function(): void} [abortHandler] - Ссылка на обработчик abort для очистки.
 */

DI.register('Bus', function() {
  /**
   * Реестр подписчиков: event → Map<subscriptionId, SubscriptionRecord>.
   * Двухуровневая структура обеспечивает O(1) добавление/удаление по ID.
   * @type {Map<string, Map<SubscriptionID, SubscriptionRecord>>}
   */
  var map = new Map();
  
  /**
   * Глобальный счётчик для генерации уникальных ID подписок.
   * Инкрементируется при каждом вызове on() или subscribe().
   * @type {number}
   */
  var nextId = 1;

  /**
   * Подписывает обработчик на событие.
   * Возвращает уникальный ID подписки для последующей отписки через off().
   * 
   * @param {string} event - Имя события.
   * @param {function(*): void} handler - Обработчик (принимает payload).
   * @returns {SubscriptionID} Уникальный ID подписки.
   */
  function on(event, handler) {
    if (typeof handler !== 'function') {
      throw new Error('[Bus] handler must be a function');
    }
    
    if (!map.has(event)) {
      map.set(event, new Map());
    }
    
    var id = nextId++;
    map.get(event).set(id, { handler: handler });
    return id;
  }

  /**
   * Подписывает обработчик на событие с опциональной автоотпиской через AbortSignal.
   * Если signal передан и уже aborted, подписка не создаётся.
   * При срабатывании signal.abort автоматически вызывает off(id).
   * 
   * @param {string} event - Имя события.
   * @param {function(*): void} handler - Обработчик события.
   * @param {AbortSignal} [signal] - Опциональный сигнал для автоотписки.
   * @returns {SubscriptionID | null} ID подписки или null, если signal уже aborted.
   */
  function subscribe(event, handler, signal) {
    // Проверка: если signal уже aborted, не создаём подписку
    if (signal && signal.aborted) {
      return null;
    }
    
    var id = on(event, handler);
    
    // Если передан signal, регистрируем автоотписку
    if (signal) {
      var record = map.get(event).get(id);
      record.signal = signal;
      
      // Обработчик abort для автоотписки
      var onAbort = function() {
        off(id);
        signal.removeEventListener('abort', onAbort);
      };
      
      // 🔑 ИСПРАВЛЕНИЕ: сохраняем ссылку на обработчик для ручной очистки
      record.abortHandler = onAbort;
      
      signal.addEventListener('abort', onAbort, { once: true });
    }
    
    return id;
  }

  /**
   * Отписывает обработчик от события.
   * Поддерживает два режима:
   * 1. Передача subscriptionId (рекомендуется) — удаляет конкретную подписку.
   * 2. Передача функции (legacy, для обратной совместимости) — ищет и удаляет
   *    первую найденную подписку с этим handler.
   * 
   * Если после удаления в Map не остаётся подписчиков, ключ события удаляется
   * для предотвращения утечки памяти на неиспользуемых событиях.
   * 
   * @param {string | SubscriptionID} eventOrId - Имя события или ID подписки.
   * @param {function(*): void} [handler] - Обработчик (только если первый аргумент — event).
   * @returns {boolean} true, если подписка была найдена и удалена.
   */
  function off(eventOrId, handler) {
    // Режим 1: передан subscriptionId (число)
    if (typeof eventOrId === 'number') {
      var targetId = eventOrId;
      var found = false;
      
      // Ищем подписку по всем событиям
      map.forEach(function(subMap, event) {
        if (subMap.has(targetId)) {
          var record = subMap.get(targetId);
          
          // Очищаем listener abort, если был
          if (record.signal && record.abortHandler) {
            record.signal.removeEventListener('abort', record.abortHandler);
          }
          
          subMap.delete(targetId);
          found = true;
          
          // Удаляем пустую Map события
          if (subMap.size === 0) {
            map.delete(event);
          }
        }
      });
      
      return found;
    }
    
    // Режим 2: передан event + handler (legacy)
    var event = eventOrId;
    var subMap = map.get(event);
    
    if (!subMap) return false;
    
    var foundId = null;
    subMap.forEach(function(record, id) {
      if (record.handler === handler && !foundId) {
        foundId = id;
      }
    });
    
    if (foundId !== null) {
      var record = subMap.get(foundId);
      
      // Очищаем listener abort, если был
      if (record.signal && record.abortHandler) {
        record.signal.removeEventListener('abort', record.abortHandler);
      }
      
      subMap.delete(foundId);
      
      // Удаляем пустую Map события
      if (subMap.size === 0) {
        map.delete(event);
      }
      
      return true;
    }
    
    return false;
  }

  /**
   * Публикует событие всем подписчикам.
   * Создаёт массив-копию слушателей перед итерацией, чтобы удаление/добавление
   * подписок внутри самих обработчиков не ломало цикл итерации.
   * Ошибки в отдельных обработчиках перехватываются, чтобы один упавший
   * слушатель не прерывал уведомление остальных.
   * 
   * @param {string} event - Имя события.
   * @param {*} [payload] - Данные события.
   * @returns {void}
   */
  function emit(event, payload) {
    var subMap = map.get(event);
    if (!subMap) return;
    
    // Создаём копию для безопасной итерации
    var records = Array.from(subMap.values());
    
    for (var i = 0; i < records.length; i++) {
      try {
        records[i].handler(payload);
      } catch (err) {
        console.error('[Bus] Error in listener for "' + event + '":', err);
      }
    }
  }

  /**
   * Возвращает количество активных подписчиков на событие.
   * Полезно для отладки и мониторинга.
   * 
   * @param {string} event - Имя события.
   * @returns {number} Количество подписчиков.
   */
  function listenerCount(event) {
    var subMap = map.get(event);
    return subMap ? subMap.size : 0;
  }

  /**
   * Полностью очищает все подписки.
   * Вызывается при уничтожении приложения или глобальном reset.
   * 
   * @returns {void}
   */
  function clear() {
    // Очищаем все abort listeners
    map.forEach(function(subMap) {
      subMap.forEach(function(record) {
        if (record.signal && record.abortHandler) {
          record.signal.removeEventListener('abort', record.abortHandler);
        }
      });
    });
    
    map.clear();
  }

  return {
    on: on,
    off: off,
    emit: emit,
    subscribe: subscribe,
    listenerCount: listenerCount,
    clear: clear
  };
}, []);
<!-- NOOMIUM_MODULE_END Bus -->

  DI.register('Store', function() {

    /**
     * Префикс для всех ключей в localStorage, чтобы избежать коллизий
     * с другими приложениями на том же домене.
     * @type {string}
     */
    var prefix = 'noomium:';

    return {

      /**
       * Читает JSON-значение из localStorage.
       * При отсутствии ключа или ошибке парсинга JSON возвращает значение по умолчанию.
       * 
       * @param {string} key - Ключ (без префикса 'noomium:').
       * @param {*} [def] - Значение по умолчанию, если ключа нет или JSON некорректен.
       * @returns {*} Десериализованное значение или def.
       */
      get: function(key, def) {
        try {
          var r = localStorage.getItem(prefix + key);
          return r ? JSON.parse(r) : def;
        } catch (e) {
          return def;
        }
      },

      /**
       * Записывает значение в localStorage в виде JSON.
       * Игнорирует ошибки квоты или сериализации (например, циклические ссылки).
       * 
       * @param {string} key - Ключ (без префикса 'noomium:').
       * @param {*} val - Значение (должно быть сериализуемым в JSON).
       * @returns {void}
       */
      set: function(key, val) {
        try {
          localStorage.setItem(prefix + key, JSON.stringify(val));
        } catch (e) {
          /* ignore quota or serialization errors */
        }
      },

      /**
       * Удаляет ключ из localStorage.
       * Игнорирует ошибки доступа к хранилищу.
       * 
       * @param {string} key - Ключ (без префикса 'noomium:').
       * @returns {void}
       */
      remove: function(key) {
        try {
          localStorage.removeItem(prefix + key);
        } catch (e) {
          /* ignore */
        }
      }
    };
  }, []);

  /**
   * @typedef {Object<string, string>} I18nDict
   * @description Словарь переводов: ключ -> переведённая строка.
   */

  DI.register('I18n', function(store, bus) {

    /**
     * Ключ для сохранения выбранного языка в Store.
     * @type {string}
     */
    var KEY = 'lang';

    /**
     * Реестр словарей по языкам.
     * Используется Object.create(null) для защиты от прототипных ключей (hasOwnProperty).
     * @type {Object<string, I18nDict>}
     */
    var dicts = Object.create(null);

    /**
     * Текущий активный язык.
     * @type {string}
     */
    var current = 'ru';

    /**
     * Список подписчиков на смену языка.
     * @type {Array<function(string): void>}
     */
    var listeners = [];

    /**
     * Подставляет параметры в строку перевода по шаблону {key}.
     * 
     * @param {string} str - Строка с шаблонами.
     * @param {Object<string, *>} [params] - Объект параметров для подстановки.
     * @returns {string} Результирующая строка.
     */
    function format(str, params) {
      var s = String(str == null ? '' : str);
      if (!params) return s;
      return s.replace(/\{(\w+)\}/g, function(match, k) {
        return (params[k] !== undefined && params[k] !== null) ? String(params[k]) : match;
      });
    }

    /**
     * Устанавливает активный язык, сохраняет его в Store,
     * уведомляет подписчиков и публикует событие i18n:change.
     * 
     * @param {string} lang - Код языка ('ru' | 'en').
     * @returns {void}
     */
    function setLang(lang) {
      current = String(lang || 'ru');
      try {
        if (store) store.set(KEY, current);
      } catch (_) {
        /* ignore */
      }
      for (var i = 0; i < listeners.length; i++) {
        try {
          listeners[i](current);
        } catch (_) {
          /* ignore */
        }
      }
      if (bus && bus.emit) {
        try {
          bus.emit('i18n:change', { lang: current });
        } catch (_) {
          /* ignore */
        }
      }
    }

    /**
     * Возвращает код текущего активного языка.
     * @returns {string}
     */
    function getLang() {
      return current;
    }

    /**
     * Добавляет или расширяет словарь для указанного языка.
     * Используется Object.assign для мерджа новых ключей с существующими.
     * 
     * @param {string} lang - Код языка ('ru' | 'en').
     * @param {I18nDict} dict - Словарь переводов.
     * @returns {void}
     */
    function addDict(lang, dict) {
      dicts[String(lang)] = Object.assign(dicts[String(lang)] || {}, dict || {});
    }

    /**
     * Возвращает перевод по ключу с подстановкой параметров.
     * Если перевода нет в текущем языке, ищет в английском (fallback).
     * Если и там нет — возвращает fallback или сам ключ.
     * 
     * @param {string} key - Ключ перевода.
     * @param {Object<string, *>} [params] - Параметры для подстановки.
     * @param {string} [fallback] - Значение по умолчанию, если ключ не найден.
     * @returns {string} Переведённая строка.
     */
    function t(key, params, fallback) {
      var d = dicts[current] || {};
      var val = Object.prototype.hasOwnProperty.call(d, key) ? d[key] : undefined;
      if (val === undefined) {
        var en = dicts['en'] || {};
        val = Object.prototype.hasOwnProperty.call(en, key) ? en[key] : undefined;
      }
      var out = val !== undefined ? val : (fallback !== undefined ? fallback : String(key));
      return format(out, params);
    }

    /**
     * Регистрирует подписчика на смену языка.
     * 
     * @param {function(string): void} fn - Обработчик, принимающий новый код языка.
     * @returns {void}
     */
    function onChange(fn) {
      if (typeof fn === 'function') listeners.push(fn);
    }

    // Инициализация языка при старте модуля
    try {
      var saved = store ? store.get(KEY, null) : null;
      if (saved && (saved === 'ru' || saved === 'en')) {
        current = saved;
      } else {
        var pref = (navigator.language || 'ru').toLowerCase();
        current = pref.indexOf('ru') === 0 ? 'ru' : 'en';
      }
    } catch (_) {
      /* ignore */
    }

    return {
      t: t,
      setLang: setLang,
      getLang: getLang,
      addDict: addDict,
      onChange: onChange
    };
  }, ['Store', 'Bus']);

    var state = Object.assign({}, defaults);

       * Полезно для сброса отдельных параметров или UI-форм.
       * @returns {AppConfig} Клон defaults.

      defaults: function() {

       * случайную мутацию внутреннего состояния извне (защита от багов).
       * 
       * @template T
       * @param {keyof AppConfig} k - Имя параметра.
       * @param {T} [def] - Значение по умолчанию, если ключа нет в state.
       * @returns {AppConfig[keyof AppConfig] | T} Значение параметра или def.

      get: function(k, def) {

       * 
       * @param {keyof AppConfig} k - Имя параметра.
       * @param {*} v - Новое значение.
       * @returns {void}
       */
      set: function(k, v) {
        state[k] = v;
      },

      /**
       * Сохраняет текущее состояние конфигурации в Store (localStorage).
       * Игнорирует ошибки квоты или сериализации.
       * @returns {void}
       */
      save: function() {
        try {
          if (store) store.set(KEY, state);
        } catch (e) {
          if (log) log.warn('Config save failed', String(e));
        }
      }
    };
  }, ['Store', 'Logger']);

  /**
   * @typedef {Object} IDBMockRequest
   * @description Мок-объект запроса для fallback на Map при недоступности IndexedDB.
   * @property {*} result - Результат операции.
   * @property {function(): void} [onsuccess] - Колбэк успеха.
   * @property {function(*): void} [onerror] - Колбэк ошибки.
   */

  DI.register('DB', function(cfg, log, bus) {

    /**
     * Инстанс открытой IndexedDB (null, если IDB недоступен).
     * @type {IDBDatabase | null}
     */
    var db = null;

    /**
     * In-memory fallback-хранилище (используется, если IDB недоступен).
     * @type {Map<string, Note> | null}
     */
    var mem = null;

    /**
     * Максимальное количество заметок в in-memory fallback.
     * Предотвращает OOM при длительной работе без IDB.
     * @type {number}
     */
    var MAX_FALLBACK_NOTES = 10000;

    /**
     * Возвращает имя базы данных из конфигурации.
     * @returns {string}
     */
    function dbName() {
      return cfg.get('dbName', 'noomium_v8');
    }

    /**
     * Возвращает имя объектного хранилища из конфигурации.
     * @returns {string}
     */
    function storeName() {
      return cfg.get('storeName', 'notes');
    }

    /**
     * Публикует событие db:change через Bus после любой мутации данных.
     * Используется другими модулями для инвалидации кэшей.
     * @returns {void}
     */
    function emitChange() {
      if (bus && bus.emit) {
        try {
          bus.emit('db:change');
        } catch (_) {
          /* ignore */
        }
      }
    }

    /**
     * Открывает соединение с IndexedDB (или создаёт in-memory fallback).
     * Кэширует результат в переменной db для повторных вызовов.
     * 
     * @returns {Promise<IDBDatabase | null>} Разрешается инстансом IDB или null (fallback).
     */
    function open() {
      return new Promise(function(resolve, reject) {
        if (db) return resolve(db);
        if (!window.indexedDB) {
          mem = new Map();
          return resolve(null);
        }
        try {
          var req = indexedDB.open(dbName(), 1);
          req.onupgradeneeded = function(e) {
            var d = e.target.result;
            var s = storeName();
            if (!d.objectStoreNames.contains(s)) {
              d.createObjectStore(s, { keyPath: 'id' });
            }
          };
          req.onsuccess = function(e) {
            db = e.target.result;
            resolve(db);
          };
          req.onerror = function() {
            if (log) log.warn('IDB open error', String(req.error));
            mem = new Map();
            resolve(null);
          };
          req.onblocked = function() {
            mem = new Map();
            resolve(null);
          };
        } catch (err) {
          if (log) log.warn('IDB unsupported', String(err));
          mem = new Map();
          resolve(null);
        }
      });
    }

    /**
     * Выполняет операцию внутри IDB-транзакции (или в in-memory fallback).
     * Для fallback использует микро-таски (Promise.resolve().then) вместо setTimeout,
     * чтобы не блокировать event loop при массовых операциях.
     * 
     * @param {'readonly' | 'readwrite'} mode - Режим транзакции.
     * @param {function(IDBObjectStore | Object): IDBRequest | IDBMockRequest | *} fn -
     *   Функция, принимающая objectStore и возвращающая запрос или результат.
     * @returns {Promise<*>} Promise с результатом операции.
     */
    function tx(mode, fn) {
      return open().then(function(d) {
        return new Promise(function(resolve, reject) {
          try {
            if (!d) {
              // In-memory fallback
              var mockStore = {
                get: function(k) {
                  return { result: mem.get(k) };
                },
                put: function(v) {
                  mem.set(v.id, v);
                  // Ограничение размера Map для предотвращения OOM
                  if (mem.size > MAX_FALLBACK_NOTES) {
                    var oldest = mem.keys().next().value;
                    mem.delete(oldest);
                  }
                  return {};
                },
                delete: function(k) {
                  mem.delete(k);
                  return {};
                },
                getAll: function() {
                  return { result: Array.from(mem.values()) };
                }
              };
              var req = { result: null, onsuccess: null, onerror: null };
              try {
                var r = fn(mockStore);
                if (!r || typeof r.onsuccess !== 'function') {
                  resolve(r && r.result !== undefined ? r.result : r);
                  return;
                }
                req.result = r.result !== undefined ? r.result : r;
                req.onsuccess = function() { resolve(req.result); };
                req.onerror = function(e) { reject(e); };
                // Микро-таск для имитации асинхронности IDB
                Promise.resolve().then(function() {
                  if (req.onsuccess) req.onsuccess();
                });
              } catch (e) {
                req.onerror = function() { reject(e); };
                Promise.resolve().then(function() {
                  if (req.onerror) req.onerror();
                });
              }
              return;
            }
            // Реальная IDB транзакция
            var transaction = d.transaction(storeName(), mode);
            var store = transaction.objectStore(storeName());
            var r = fn(store);
            r.onsuccess = function() { resolve(r.result); };
            r.onerror = function() {
              if (log) log.warn('DB op error', String(r.error));
              reject(r.error);
            };
          } catch (err) {
            if (log) log.warn('DB tx error', String(err));
            reject(err);
          }
        });
      });
    }

    return {

      /**
       * Создаёт или обновляет заметку в хранилище.
       * Эмитит db:change после успешной записи.
       * 
       * @param {Note} note - Объект заметки с обязательным полем id.
       * @returns {Promise<*>} Promise, разрешающийся после записи.
       */
      put: function(note) {
        return tx('readwrite', function(s) {
          return s.put(note);
        }).then(function(res) {
          emitChange();
          return res;
        });
      },

      /**
       * Читает одну заметку по её идентификатору.
       * 
       * @param {string} id - Уникальный ID заметки.
       * @returns {Promise<Note | undefined>} Promise с заметкой или undefined.
       */
      get: function(id) {
        return tx('readonly', function(s) {
          return s.get(id);
        });
      },

      /**
       * Удаляет заметку по идентификатору.
       * Эмитит db:change после успешного удаления.
       * 
       * @param {string} id - Уникальный ID заметки.
       * @returns {Promise<*>} Promise, разрешающийся после удаления.
       */
      del: function(id) {
        return tx('readwrite', function(s) {
          return s.delete(id);
        }).then(function(res) {
          emitChange();
          return res;
        });
      },

      /**
       * Возвращает все заметки из хранилища.
       * Внимание: при большой базе может быть ресурсоёмким.
       * 
       * @returns {Promise<Note[]>} Promise с массивом всех заметок.
       */
      all: function() {
        return tx('readonly', function(s) {
          return s.getAll();
        });
      },

      /**
       * Возвращает порцию заметок через IDB-курсор (для экономии памяти).
       * В fallback-режиме использует slice на массиве.
       * 
       * @param {number} offset - Количество пропускаемых записей.
       * @param {number} limit - Макс. количество возвращаемых записей.
       * @returns {Promise<Note[]>} Promise с массивом заметок.
       */
      getAllPaginated: function(offset, limit) {
        return open().then(function(d) {
          return new Promise(function(resolve, reject) {
            if (!d) {
              var all = mem ? Array.from(mem.values()) : [];
              resolve(all.slice(offset, offset + limit));
              return;
            }
            var transaction = d.transaction(storeName(), 'readonly');
            var store = transaction.objectStore(storeName());
            var request = store.openCursor();
            var result = [];
            var advanced = false;

            request.onsuccess = function(event) {
              var cursor = event.target.result;
              if (!cursor) {
                resolve(result);
                return;
              }
              if (!advanced && offset > 0) {
                advanced = true;
                try {
                  cursor.advance(offset);
                } catch (e) {
                  resolve(result);
                }
                return;
              }
              result.push(cursor.value);
              if (result.length >= limit) {
                resolve(result);
                return;
              }
              cursor.continue();
            };

            request.onerror = function() {
              if (log) log.warn('DB cursor error', String(request.error));
              reject(request.error);
            };
          });
        });
      },

      /**
       * Массовая вставка/обновление заметок в одной транзакции.
       * Эмитит db:change только один раз после завершения всей операции.
       * 
       * @param {Note[]} notes - Массив заметок для записи.
       * @returns {Promise<number>} Promise с количеством записанных заметок.
       */
      bulkPut: function(notes) {
        return open().then(function(d) {
          return new Promise(function(resolve, reject) {
            try {
              if (!d) {
                for (var i = 0; i < notes.length; i++) {
                  mem.set(notes[i].id, notes[i]);
                  if (mem.size > MAX_FALLBACK_NOTES) {
                    var oldest = mem.keys().next().value;
                    mem.delete(oldest);
                  }
                }
                emitChange();
                return resolve(notes.length);
              }
              var transaction = d.transaction(storeName(), 'readwrite');
              var store = transaction.objectStore(storeName());
              for (var i = 0; i < notes.length; i++) {
                store.put(notes[i]);
              }
              transaction.oncomplete = function() {
                emitChange();
                resolve(notes.length);
              };
              transaction.onerror = function() {
                reject(transaction.error);
              };
            } catch (err) {
              reject(err);
            }
          });
        });
      },

      /**
       * Добавляет ID дочерней заметки в массив children родительской заметки.
       * Если parentId не найден в БД, операция игнорируется (родитель может быть сетевым).
       * 
       * @param {string} parentId - ID родительской заметки.
       * @param {string} childId - ID дочерней заметки.
       * @returns {Promise<void>}
       */
      addChild: function(parentId, childId) {
        return tx('readonly', function(s) {
          return s.get(parentId);
        }).then(function(parent) {
          if (!parent) return;
          if (!Array.isArray(parent.children)) parent.children = [];
          if (parent.children.indexOf(childId) === -1) {
            parent.children.push(childId);
            return tx('readwrite', function(s) {
              return s.put(parent);
            }).then(function() {
              emitChange();
            });
          }
        }).catch(function(e) {
          if (log) log.warn('DB.addChild fail', String(e));
        });
      },

      /**
       * Полностью удаляет базу данных и очищает in-memory fallback.
       * Используется для сброса всех данных пользователя.
       * 
       * @returns {Promise<void>} Promise, разрешающийся после удаления.
       */
      reset: function() {
        if (db) {
          try { db.close(); } catch (_) { /* ignore */ }
          db = null;
        }
        if (mem) mem.clear();
        return new Promise(function(resolve) {
          try {
            var req = indexedDB.deleteDatabase(dbName());
            req.onsuccess = req.onerror = req.onblocked = function() {
              emitChange();
              resolve();
            };
          } catch (_) {
            emitChange();
            resolve();
          }
        });
      }
    };
  }, ['Config', 'Logger', 'Bus']);

  /**
   * @typedef {'loading' | 'model' | 'demo'} AIMode
   * @description Состояние модуля AI: загрузка, готова модель или fallback на хеш.
   */

  /**
   * @typedef {Object} EmbedCallback
   * @description Внутренняя структура для отслеживания pending-запросов к Worker'у.
   * @property {function(Vector): void} resolve - Функция разрешения Promise.
   * @property {function(Error): void} reject - Функция отклонения Promise.
   * @property {string} text - Оригинальный текст (для fallback на хеш).
   * @property {number} timer - ID таймаута для принудительного завершения.
   */

  /**
   * @typedef {Object} BatchCallback
   * @description Внутренняя структура для отслеживания batch-запросов косинусного сходства.
   * @property {function(Array<{id: string, score: number}>): void} resolve - Разрешение Promise.
   * @property {function(Error): void} reject - Отклонение Promise.
   * @property {number} timer - ID таймаута.
   * @property {Vector} queryVector - Вектор запроса (для fallback).
   * @property {Array<{id: string, vector: Vector}>} items - Массив элементов (для fallback).
   */

  DI.register('AI', function(cfg, log, bus) {

    /**
     * Исходный код Web Worker'а для изолированной загрузки и выполнения ML-модели.
     * Worker импортирует @xenova/transformers из CDN и выполняет инференс.
     * @type {string}
     */
    var workerCode = [
      'let extractor = null;',
      'let ready = false;',
      '',
      'async function loadModel(modelName, options) {',
      '  const { pipeline, env } = await import("https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2");',
      '  if (env) {',
      '    env.allowLocalModels = false;',
      '    env.useBrowserCache = true;',
      '  }',
      '  extractor = await pipeline("feature-extraction", modelName, {',
      '    quantized: true,',
      '    progress_callback: function(p) {',
      '      if (p.status === "progress" && p.total > 0) {',
      '        const pct = p.loaded / p.total * 100;',
      '        self.postMessage({ type: "progress", pct: pct });',
      '      }',
      '    }',
      '  });',
      '  ready = true;',
      '  self.postMessage({ type: "ready" });',
      '}',
      '',
      'self.onmessage = async function(e) {',
      '  var msg = e.data;',
      '  if (msg.type === "load") {',
      '    try {',
      '      await loadModel(msg.modelName, msg.options);',
      '    } catch (err) {',
      '      self.postMessage({ type: "error", id: null, message: err.message || String(err) });',
      '    }',
      '    return;',
      '  }',
      '  if (!ready) {',
      '    self.postMessage({ type: "error", id: msg.id, message: "Model not loaded" });',
      '    return;',
      '  }',
      '  if (msg.type === "embed") {',
      '    try {',
      '      var output = await extractor(msg.text, { pooling: "mean", normalize: true });',
      '      var vec = Array.from(output.data);',
      '      self.postMessage({ type: "result", id: msg.id, vector: vec });',
      '    } catch (err) {',
      '      self.postMessage({ type: "error", id: msg.id, message: err.message || String(err) });',
      '    }',
      '  }',
      '  if (msg.type === "cosineBatch") {',
      '    try {',
      '      var scores = [];',
      '      var qv = msg.queryVector;',
      '      var vectors = msg.vectors;',
      '      for (var i = 0; i < vectors.length; i++) {',
      '        var item = vectors[i];',
      '        var v = item.vector;',
      '        var sum = 0;',
      '        var len = Math.min(qv.length, v.length);',
      '        for (var j = 0; j < len; j++) {',
      '          sum += qv[j] * v[j];',
      '        }',
      '        var score = Math.abs(sum) < 1e-8 ? 0 : sum;',
      '        scores.push({ id: item.id, score: score });',
      '      }',
      '      self.postMessage({ type: "cosineBatchResult", id: msg.id, scores: scores });',
      '    } catch (err) {',
      '      self.postMessage({ type: "error", id: msg.id, message: err.message || String(err) });',
      '    }',
      '  }',
      '};'
    ].join('\n');

    /** @type {Worker | null} */
    var worker = null;

    /** @type {string | null} */
    var workerUrl = null;

    /** @type {AIMode} */
    var mode = 'loading';

    /**
     * LRU-кэш вычисленных векторов.
     * При обращении ключ удаляется и добавляется заново (перемещение в конец).
     * @type {Map<string, Vector>}
     */
    var cache = new Map();

    /** @type {number} */
    var cacheLimit = cfg.get('aiCacheLimit', 300);

    /** @type {Array<function(number): void>} */
    var progressFns = [];

    /** @type {Promise<void> | null} */
    var loadPromise = null;

    /** @type {function(): void | null} */
    var loadResolve = null;

    /** @type {function(Error): void | null} */
    var loadReject = null;

    /** @type {Map<number, EmbedCallback>} */
    var embedCallbacks = new Map();

    /** @type {Map<number, BatchCallback>} */
    var batchCallbacks = new Map();

    /** @type {number} */
    var nextId = 0;

    /**
     * Генерирует псевдо-вектор (хеш-эмбеддинг) на основе FNV-1a.
     * Используется как быстрый fallback, если ML-модель недоступна.
     * Вектор нормализуется для корректного косинусного сходства.
     * 
     * @param {string} text - Входной текст.
     * @returns {Vector} Нормализованный вектор размерности `dim`.
     */
    function hashEmbed(text) {
      var DIM = cfg.get('dim', 384);
      var vec = new Float32Array(DIM);
      var tokens = (text || '').toLowerCase().match(/[a-zа-яё0-9]+/gi) || [];
      
      for (var t = 0; t < tokens.length; t++) {
        var tok = tokens[t];
        var h = 2166136261;
        for (var i = 0; i < tok.length; i++) {
          h ^= tok.charCodeAt(i);
          h = Math.imul(h, 16777619);
        }
        vec[Math.abs(h) % DIM] += 1;
        
        var h2 = Math.imul(h ^ 0x9e3779b9, 2654435761);
        vec[Math.abs(h2) % DIM] += 0.5;
      }
      
      var norm = 0;
      for (var i = 0; i < DIM; i++) norm += vec[i] * vec[i];
      norm = Math.sqrt(norm) || 1;
      
      for (var i = 0; i < DIM; i++) vec[i] /= norm;
      return Array.from(vec);
    }

    /**
     * Безопасно добавляет вектор в LRU-кэш, удаляя самый старый элемент при переполнении.
     * Если ключ уже существует, он удаляется и добавляется заново (LRU-стратегия).
     * 
     * @param {string} text - Ключ кэша (исходный текст).
     * @param {Vector} vector - Вектор для сохранения.
     * @returns {void}
     */
    function cacheSet(text, vector) {
      if (cache.has(text)) {
        cache.delete(text);
      }
      if (cache.size >= cacheLimit) {
        var oldestKey = cache.keys().next().value;
        cache.delete(oldestKey);
      }
      cache.set(text, vector);
    }

    /**
     * Очищает все pending-запросы (embed и batch) при падении Worker'а.
     * Для embed-запросов вычисляет fallback hashEmbed и разрешает промис.
     * Для batch-запросов разрешает пустым массивом.
     * 
     * @returns {void}
     */
    function rejectAllPending() {
      embedCallbacks.forEach(function(cb) {
        clearTimeout(cb.timer);
        var hashVec = hashEmbed(cb.text);

            if (cb) {
              clearTimeout(cb.timer);

    }

    /**
     * Шифрует hex-ключ паролем с использованием AES-GCM.
     * @param {string} hexKey - Секретный ключ в hex-формате.
     * @param {string} password - Пароль.
     * @returns {Promise<string>} Base64-строка (salt + iv + ciphertext).
     */
    function encryptKey(hexKey, password) {
      var salt = crypto.getRandomValues(new Uint8Array(16));
      var iv = crypto.getRandomValues(new Uint8Array(12));
      return deriveKey(password, salt).then(function(key) {
        var enc = new TextEncoder();
        return crypto.subtle.encrypt({ name: 'AES-GCM', iv: iv }, key, enc.encode(hexKey)).then(function(ciphertext) {
          var combined = new Uint8Array(salt.length + iv.length + ciphertext.byteLength);
          combined.set(salt, 0);
          combined.set(iv, salt.length);
          combined.set(new Uint8Array(ciphertext), salt.length + iv.length);
          return btoa(String.fromCharCode.apply(null, combined));
        });
      });
    }

    /**
     * Расшифровывает hex-ключ из Base64-строки с использованием пароля.
     * @param {string} base64Str - Зашифрованная строка.
     * @param {string} password - Пароль.
     * @returns {Promise<string>} Расшифрованный hex-ключ.
     */
    function decryptKey(base64Str, password) {
      var combined = Uint8Array.from(atob(base64Str), function(c) { return c.charCodeAt(0); });
      var salt = combined.slice(0, 16);
      var iv = combined.slice(16, 28);
      var ciphertext = combined.slice(28);
      return deriveKey(password, salt).then(function(key) {
        return crypto.subtle.decrypt({ name: 'AES-GCM', iv: iv }, key, ciphertext).then(function(dec) {
          return new TextDecoder().decode(dec);
        });
      });
    }

    /**
     * Устанавливает статус сети и публикует событие net:status.
     * @param {'disconnected' | 'connecting' | 'connected' | 'reconnecting' | 'failed'} s
     * @returns {void}
     */
    function setStatus(s) {
      var wasDisconnected = (netStatus !== 'connected');
      netStatus = s;
      if (bus && bus.emit) {
        try { bus.emit('net:status', { status: s }); } catch (_) {}
      }
      if (s === 'connected' && wasDisconnected) flushOutbox();
    }

    /**
     * Уведомляет всех подписчиков об изменении количества пиров.
     * @returns {void}
     */
    function notifyPeers() {
      var count = peers.size;
      for (var i = 0; i < peerListeners.length; i++) {
        try { peerListeners[i](count); } catch (_) {}
      }
      if (bus && bus.emit) {
        try { bus.emit('net:peers', { count: count }); } catch (_) {}
      }
    }

    /**
     * Проверяет валидность структуры Nostr-события.
     * @param {NostrEvent} ev
     * @returns {boolean}
     */
    function isValidEvent(ev) {
      if (!ev || typeof ev !== 'object') return false;
      if (typeof ev.id !== 'string' || ev.id.length !== 64) return false;
      if (typeof ev.pubkey !== 'string' || ev.pubkey.length !== 64) return false;
      if (typeof ev.kind !== 'number') return false;
      if (!Array.isArray(ev.tags)) return false;
      return true;
    }

    /**
     * Проверяет, является ли событие дубликатом.
     * @param {NostrEvent} ev
     * @returns {boolean}
     */
    function isDuplicate(ev) {
      if (!ev || !ev.id) return true;
      if (seen.has(ev.id)) return true;
      seen.add(ev.id);
      if (seen.size > cfg.get('seenMaxSize', 1000)) {
        var arr = Array.from(seen);
        seen.clear();
        for (var i = arr.length - cfg.get('seenKeepSize', 500); i < arr.length; i++) {
          seen.add(arr[i]);
        }
      }
      return false;
    }

    /**
     * Инвалидирует кэш shared-векторов при изменении базы.
     * @returns {void}
     */
    function invalidateSharedCache() {
      /* reserved for future shared cache logic */
    }
    if (bus && bus.on) bus.on('db:change', invalidateSharedCache);

    /**
     * Эмитит текущий размер outbox в шину событий.
     * @returns {void}
     */
    function emitOutboxCount() {
      if (bus && bus.emit) {
        try { bus.emit('net:outbox', { count: outbox.size }); } catch (_) {}
      }
    }

    /**
     * Добавляет событие в offline-очередь с дедупликацией по ID.
     * @param {NostrEvent} ev
     * @returns {void}
     */
    function addToOutbox(ev) {
      if (!ev || !ev.id) return;
      if (outbox.has(ev.id)) return;
      if (outbox.size >= cfg.get('offlineQueueMaxSize', 100)) {
        var oldestKey = outbox.keys().next().value;
        outbox.delete(oldestKey);
      }
      outbox.set(ev.id, ev);
      emitOutboxCount();
    }

    /**
     * Отправляет порцию событий из outbox через доступные релеи.
     * @returns {void}
     */
    function flushOutbox() {
      if (outbox.size === 0 || !pool) return;
      var limit = Math.min(cfg.get('outboxBatchSize', 2), outbox.size);
      var keys = Array.from(outbox.keys()).slice(0, limit);
      var toSend = [];
      for (var i = 0; i < keys.length; i++) {
        var id = keys[i];
        toSend.push(outbox.get(id));
        outbox.delete(id);
      }
      toSend.forEach(function(ev) { safePublish(ev); });
      emitOutboxCount();
    }

    /**
     * Безопасно публикует событие, обходя rate-limited релеи.
     * @param {NostrEvent} ev
     * @returns {Promise<void>}
     */
    function safePublish(ev) {
      var relays = cfg.get('relays', []);
      var now = Date.now();
      var goodRelays = [];
      for (var i = 0; i < relays.length; i++) {
        var until = rateLimitedUntil.get(relays[i]) || 0;
        if (until <= now) goodRelays.push(relays[i]);
      }
      if (goodRelays.length === 0) {
        addToOutbox(ev);
        return Promise.resolve();
      }
      try {
        var pubs = pool.publish(goodRelays, ev);
        for (var i = 0; i < goodRelays.length; i++) {
          var relay = goodRelays[i];
          var p = (pubs && typeof pubs.get === 'function') ? pubs.get(relay) : (Array.isArray(pubs) ? pubs[i] : null);
          if (p && p.then) {
            (function(promise, relayUrl) {
              promise.then(function() {
                relayErrors.delete(relayUrl);
              }).catch(function(err) {
                var count = (relayErrors.get(relayUrl) || 0) + 1;
                relayErrors.set(relayUrl, count);
                if (count >= cfg.get('relayErrorThreshold', 5)) {
                  rateLimitedUntil.set(relayUrl, Date.now() + cfg.get('relayCircuitBreakTime', 120000));
                  relayErrors.set(relayUrl, 0);
                  if (log) log.warn('Relay ' + relayUrl + ' circuit broken, 2m backoff');
                } else {
                  var backoff = count === 1 ? cfg.get('relayBackoff1', 15000) : cfg.get('relayBackoff2', 30000);
                  rateLimitedUntil.set(relayUrl, Date.now() + backoff);
                }
                if (!outbox.has(ev.id)) {
                  outbox.set(ev.id, ev);
                  emitOutboxCount();
                }
              });
            })(p, relay);
          }
        }
      } catch (err) {
        if (log) log.warn('publish throw', String(err));
        addToOutbox(ev);
      }
      return Promise.resolve();
    }

    /**
     * 🔑 НОВАЯ ФУНКЦИЯ: Валидация и нормализация входящего запроса.
     * 
     * Поддерживает как старый формат v1 `{vector}`, так и новый v2
     * `{vector, threshold, serendipity, protocol_version}`.
     * При невалидных данных делает fallback на локальные пороги из Config.
     * 
     * @param {Object} raw - Сырой распарсенный объект запроса.
     * @returns {{vector: Vector, threshold: number, serendipity: number, version: number} | null}
     */
    function normalizeQuery(raw) {
      if (!raw || typeof raw !== 'object' || Array.isArray(raw)) return null;
      if (!Array.isArray(raw.vector) || raw.vector.length === 0) return null;

      var version = 1;
      if (typeof raw.protocol_version === 'number' && 
          Number.isInteger(raw.protocol_version) && 
          raw.protocol_version >= 2) {
        version = 2;
      }

      var localThreshold = cfg.get('threshold', 0.7);
      var localSerendipity = cfg.get('serendipity', 0.3);

      var threshold, serendipity;
      if (version === 2) {
        if (typeof raw.threshold === 'number' && 
            isFinite(raw.threshold) && 
            raw.threshold >= 0 && raw.threshold <= 1) {
          threshold = raw.threshold;
        } else {
          threshold = localThreshold;
        }

        if (typeof raw.serendipity === 'number' && 
            isFinite(raw.serendipity) && 
            raw.serendipity >= 0 && raw.serendipity <= 1) {
          serendipity = raw.serendipity;
        } else {
          serendipity = localSerendipity;
        }
      } else {
        threshold = localThreshold;
        serendipity = localSerendipity;
      }

      return {
        vector: raw.vector,
        threshold: threshold,
        serendipity: serendipity,
        version: version
      };
    }

    /**
     * 🔑 НОВАЯ ФУНКЦИЯ: Построение ответа на входящий запрос.
     * 
     * @param {Vector} queryVector - Вектор запроса.
     * @param {Note[]} sharedNotes - Массив shared-заметок локальной БД.
     * @param {number} threshold - Порог схожести.
     * @param {number} serendipity - Дельта озарений.
     * @param {number} version - Версия протокола (1 или 2).
     * @returns {Array<Object>} Массив кандидатов для ответа.
     */
    function buildAnswerCandidates(queryVector, sharedNotes, threshold, serendipity, version) {
      var maxAnswers = cfg.get('maxAnswersPerQuery', 5);

      if (version === 2) {
        var minScore = threshold - serendipity;
        var filtered = [];

        for (var i = 0; i < sharedNotes.length; i++) {
          var score = AI.cosineSimilarity(queryVector, sharedNotes[i].vector);
          if (score >= minScore) {
            filtered.push({
              id: sharedNotes[i].id,
              text: sharedNotes[i].text,
              vector: sharedNotes[i].vector,
              score: score
            });
          }
        }

        if (filtered.length === 0) return [];

        var count = filtered.length;
        var mean = 0;
        for (var i = 0; i < count; i++) mean += filtered[i].score;
        mean /= count;

        var stddev = 0;
        if (count > 1) {
          var sumSq = 0;
          for (var i = 0; i < count; i++) {
            var diff = filtered[i].score - mean;
            sumSq += diff * diff;
          }
          stddev = Math.sqrt(sumSq / (count - 1));
        }

        for (var i = 0; i < count; i++) {
          var raw = filtered[i].score;
          filtered[i].z_score = stddev > 0 ? (raw - mean) / stddev : 0;
        }

        filtered.sort(function(a, b) { return b.score - a.score; });
        return filtered.slice(0, maxAnswers);
      }

      var rawScores = [];
      for (var i = 0; i < sharedNotes.length; i++) {
        rawScores.push(AI.cosineSimilarity(queryVector, sharedNotes[i].vector));
      }

      var count = rawScores.length;
      if (count === 0) return [];

      var mean = 0;
      for (var i = 0; i < count; i++) mean += rawScores[i];
      mean /= count;

      var stddev = 0;
      if (count > 1) {
        var sumSq = 0;
        for (var i = 0; i < count; i++) {
          var diff = rawScores[i] - mean;
          sumSq += diff * diff;
        }
        stddev = Math.sqrt(sumSq / (count - 1));
      }

      var candidates = [];
      for (var i = 0; i < count; i++) {
        var raw = rawScores[i];
        var z = stddev > 0 ? (raw - mean) / stddev : 0;
        if (z >= 1) {
          candidates.push({
            id: sharedNotes[i].id,
            text: sharedNotes[i].text,
            vector: sharedNotes[i].vector,
            score: raw,
            z_score: z
          });
        }
      }

      candidates.sort(function(a, b) { return b.score - a.score; });
      return candidates.slice(0, maxAnswers);
    }

    /**
     * Обрабатывает входящее Nostr-событие.
     * 
     * 🔑 ИЗМЕНЕНИЯ v1.4.18:
     * - Добавлена обработка Kind 21002 (удаление заметок) с эмитом `net:deletion`.
     * - В ответах (Kind 21001) сохраняется `queryId` для последующей фильтрации.
     * - Проверка `expectedDim` оставлена как защита, добавлено логирование.
     * - Удалена избыточная проверка `peers.has` для KA.
     * 
     * @param {NostrEvent} ev
     * @returns {void}
     */
    function onEvent(ev) {
      try {
        // 1. Быстрая структурная проверка
        if (!ev || typeof ev !== 'object' || !Array.isArray(ev.tags)) return;

        // 2. Проверка подписи ДО кэширования
        if (nostr && typeof nostr.verifyEvent === 'function') {
          if (!nostr.verifyEvent(ev)) return;
        }

        // 3. Полная структурная валидация
        if (!isValidEvent(ev)) return;

        // 4. Дедупликация
        if (isDuplicate(ev)) return;

        // 5. Игнорирование собственных событий
        if (pk && ev.pubkey === pk) return;

        var had = peers.has(ev.pubkey);
        peers.set(ev.pubkey, Date.now());
        if (!had) notifyPeers();
        setStatus('connected');
        connAttempts = 0;
        flushOutbox();

        var KQ = cfg.get('kQuery', 21000);
        var KA = cfg.get('kAnswer', 21001);
        var room = cfg.get('room', 'noomium-main');

        // Извлечение parentId из тега ['e', parentId, '', 'reply']
        var parentId = null;
        for (var t = 0; t < ev.tags.length; t++) {
          var tag = ev.tags[t];
          if (Array.isArray(tag) && tag[0] === 'e' && tag[3] === 'reply') {
            parentId = tag[1];
            break;
          }
        }

        // 🔑 ОБРАБОТКА УДАЛЕНИЙ (Kind 21002)
        if (ev.kind === K_DELETION) {
          var delId = null;
          for (var i = 0; i < ev.tags.length; i++) {
            if (Array.isArray(ev.tags[i]) && ev.tags[i][0] === 'e') {
              delId = ev.tags[i][1];
              break;
            }
          }
          if (delId) {
            // Удаляем из answers
            for (var j = answers.length - 1; j >= 0; j--) {
              if (answers[j].id === delId) {
                answers.splice(j, 1);
              }
            }
            // Эмитим событие для LiveStreamStrategy и других слушателей
            if (bus && bus.emit) {
              try { bus.emit('net:deletion', { id: delId, peer: ev.pubkey.slice(0, 6) }); } catch (_) {}
            }
            if (typeof onUpdate === 'function') {
              try { onUpdate(); } catch (_) {}
            }
          }
          return;
        }

        // Обработка поисковых запросов (Kind Query)
        if (ev.kind === KQ) {
          if (!sk) return;
          var q;
          try { q = JSON.parse(ev.content); } catch (_) { return; }

          var normalized = normalizeQuery(q);
          if (!normalized) return;

          DB.all().then(function(allNotes) {
            var checkRelays = cfg.get('relays', []);
            var nowCheck = Date.now();
            var hasActiveRelay = false;
            for (var r = 0; r < checkRelays.length; r++) {
              var until = rateLimitedUntil.get(checkRelays[r]) || 0;
              if (until <= nowCheck) { hasActiveRelay = true; break; }
            }
            if (!hasActiveRelay) return;

            var sharedNotes = [];
            for (var i = 0; i < allNotes.length; i++) {
              var n = allNotes[i];
              if (n && n.shared && n.vector) sharedNotes.push(n);
            }
            if (sharedNotes.length === 0) return;

            var limited = buildAnswerCandidates(
              normalized.vector,
              sharedNotes,
              normalized.threshold,
              normalized.serendipity,
              normalized.version
            );

            if (limited.length === 0) return;

            for (var j = 0; j < limited.length; j++) {
              try {
                var ans = nostr.finalizeEvent({
                  kind: KA,
                  created_at: Math.floor(Date.now() / 1000),
                  tags: [['t', room], ['e', ev.id]],
                  content: JSON.stringify({
                    text: limited[j].text,
                    vector: limited[j].vector,
                    score: limited[j].score,
                    z_score: limited[j].z_score
                  })
                }, sk);
                (function(answer, delay) {
                  setTimeout(function() { safePublish(answer); }, delay);
                })(ans, j * cfg.get('answerStaggerDelay', 500));
              } catch (e) {}
            }
          }).catch(function(e) {
            if (log) log.warn('DB.all fail', String(e));
          });
        }

        // Обработка ответов (Kind Answer)
        if (ev.kind === KA) {
          var eTag = null;
          for (var i = 0; i < ev.tags.length; i++) {
            var tg = ev.tags[i];
            if (Array.isArray(tg) && tg[0] === 'e' && !tg[3]) {
              eTag = tg[1];
              break;
            }
          }
          var data;
          try { data = JSON.parse(ev.content); } catch (_) { return; }
          if (!data || typeof data !== 'object' || Array.isArray(data)) return;
          if (typeof data.text !== 'string' || !data.text || data.text.length > MAX_P2P_TEXT_LENGTH) return;
          if (!Array.isArray(data.vector) || typeof data.score !== 'number') return;

          // 🔑 ПРОВЕРКА РАЗМЕРНОСТИ ВЕКТОРА (оставлена как защита)
          var expectedDim = cfg.get('dim', 384);
          if (data.vector.length !== expectedDim) {
            if (log) log.warn('Answer rejected: incompatible vector dimension', { 
              expected: expectedDim, 
              got: data.vector.length,
              eventId: ev.id,
              peer: ev.pubkey.slice(0, 6)
            });
            return;
          }

          // 🔑 ИЗМЕНЕНИЕ: Убрана избыточная проверка `peers.has(ev.pubkey)` —
          // пир уже добавлен выше в этой функции (peers.set)

          // Сохранение как ответ на наш запрос
          if (eTag && eTag === queryId) {
            var isDupAnswer = false;
            for (var j = 0; j < answers.length; j++) {
              if (answers[j].id === ev.id) { isDupAnswer = true; break; }
            }
            if (!isDupAnswer) {
              if (answers.length >= cfg.get('maxAnswersCache', 100)) answers.shift();
              answers.push({
                id: ev.id,
                text: data.text,
                vector: data.vector,
                score: data.score,
                z_score: data.z_score,
                peer: ev.pubkey.slice(0, 6),
                fullPubkey: ev.pubkey,
                createdAt: Date.now(),
                parentId: parentId,
                queryId: eTag  // 🔑 НОВОЕ: сохраняем queryId для фильтрации
              });
              if (typeof onUpdate === 'function') {
                try { onUpdate(); } catch (_) {}
              }
            }
          }

          // Эмит в Live Stream (эфемерность)
          if (Array.isArray(data.vector) && typeof data.text === 'string') {
            var netNote = {
              id: ev.id,
              text: data.text,
              vector: data.vector,
              peer: ev.pubkey.slice(0, 6),
              fullPubkey: ev.pubkey,
              createdAt: Date.now(),
              parentId: parentId,
              children: []
            };

            if (parentId) {
              DB.addChild(parentId, ev.id);
            }

            if (!eTag || eTag !== queryId) {
              if (bus && bus.emit) {
                try { bus.emit('net:stream-event', { note: netNote }); } catch (_) {}
              }
            }
          }
        }
      } catch (err) {
        if (log) log.warn('onEvent', String(err));
      }
    }

    /**
     * Запускает heartbeat для очистки устаревших пиров и ответов.
     * @returns {void}
     */
    function startHeartbeat() {
      if (hbTimer) clearInterval(hbTimer);
      hbTimer = setInterval(function() {
        var now = Date.now();
        var removedPeers = [];
        
        peers.forEach(function(ts, pubkey) {
          if (now - ts > cfg.get('peerTTL', 60000)) {
            peers.delete(pubkey);
            removedPeers.push(pubkey);
          }
        });
        
        if (removedPeers.length > 0) {
          notifyPeers();
          
          for (var i = 0; i < removedPeers.length; i++) {
            if (bus && bus.emit) {
              try { 
                bus.emit('net:peer-offline', { pubkey: removedPeers[i] }); 
              } catch (_) {}
            }
          }
          
          if (typeof onUpdate === 'function') {
            try { onUpdate(); } catch (_) {}
          }
        }
        
        var cutoff = now - cfg.get('answersTTL', 300000);
        for (var i = answers.length - 1; i >= 0; i--) {
          if (!peers.has(answers[i].fullPubkey) || answers[i].createdAt < cutoff) {
            answers.splice(i, 1);
          }
        }
      }, cfg.get('heartbeat', 30000));

      if (flushTimer) clearInterval(flushTimer);
      flushTimer = setInterval(function() {
        if (netStatus === 'connected') flushOutbox();
      }, cfg.get('offlineFlushInterval', 30000));
    }

    /**
     * Планирует попытку переподключения с экспоненциальным backoff.
     * @returns {void}
     */
    function scheduleReconnect() {
      if (reconnecting || !started) return;
      if (connAttempts >= cfg.get('reconnectMaxAttempts', 10)) {
        setStatus('failed');
        return;
      }
      reconnecting = true;
      var delay = Math.min(cfg.get('reconnectMaxDelay', 60000), cfg.get('reconnectBaseDelay', 1000) * Math.pow(2, connAttempts));
      connAttempts++;
      setStatus('reconnecting');
      reconnectTimer = setTimeout(function() {
        try {
          if (subscription && typeof subscription.close === 'function') {
            try { subscription.close(); } catch (_) {}
          }
          subscription = null;
          var room = cfg.get('room', 'noomium-main');
          var KQ = cfg.get('kQuery', 21000);
          var KA = cfg.get('kAnswer', 21001);
          var subWindow = cfg.get('subWindow', 300);
          var nowSec = Math.floor(Date.now() / 1000);
          if (pool) {
            subscription = pool.subscribeMany(cfg.get('relays', []),
              [{ kinds: [KQ, KA, K_DELETION], '#t': [room], since: nowSec - subWindow }],
              { onevent: onEvent, onclose: function() { scheduleReconnect(); } });
            reconnecting = false;
          } else {
            throw new Error('Pool not available');
          }
        } catch (err) {
          if (log) log.warn('Reconnect fail', String(err));
          if (started && connAttempts < cfg.get('reconnectMaxAttempts', 10)) {
            scheduleReconnect();
          } else {
            reconnecting = false;
            setStatus('failed');
          }
        }
      }, delay);
    }

    /**
     * Инициализирует сеть: загружает или создаёт ключ, подключается к релеям.
     * @param {function(): void} callback - Колбэк обновления UI.
     * @param {string} password - Пароль для дешифрования ключа.
     * @returns {Promise<void>}
     */
    function init(callback, password) {
      if (started) return Promise.resolve();
      onUpdate = callback;
      connAttempts = 0;

      var loadAndDecrypt = function() {

     */
    function ensureDOM() {
      if (overlay) return;
      overlay = document.createElement('div');
      overlay.className = 'mo';
      container = document.createElement('div');
      container.className = 'md';

        footer.className = 'md-f';
        opts.buttons.forEach(function(btn) {
          var el = document.createElement('button');
          if (btn.primary) {

          }

/**
 * Конечный автомат состояний UI.
 * 
 * @typedef {'idle' | 'focus' | 'search'} UIMode
 * @description Активный режим интерфейса:
 * - `idle`: редактор пуст, фокус выключен → Live Stream, сегменты скрыты
 * - `focus`: закреплена заметка, редактор пуст → поиск по вектору закрепа, сегменты скрыты
 * - `search`: текст в редакторе → текстовый поиск, сегменты видны (если нет закрепа)
 */

/**
 * @typedef {'to-idle' | 'to-focus' | 'to-search' | 'update-lists' | 'switch-segment' | 'update-stream'} TransitionType
 * @description Типы переходов state machine.
 */

/**
 * @typedef {Object} TransitionPayload
 * @description Payload для переходов state machine.
 * @property {FocusedItem} [item] - Заметка для фокуса (для to-focus).
 * @property {string} [seg] - Ключ сегмента (для switch-segment).
 * @property {Object} [lists] - Новые списки результатов (для update-lists).
 * @property {SearchResult[]} [streamData] - Данные Live Stream (для update-stream).
 * @property {boolean} [streamActive] - Флаг активности Live Stream (для update-stream).
 */

/**
 * @typedef {Object} AppState
 * @description Глобальное состояние приложения (единый источник истины).
 * @property {UIMode} uiMode - Текущий режим UI (основное состояние state machine).
 * @property {boolean} showSegments - Вычисляемый флаг: показывать ли плашку сегментов.
 * @property {ViewName} view - Текущая активная вкладка.
 * @property {Segment} seg - Активный сегмент карусели (актуален только в uiMode='search').
 * @property {SendMode} sendMode - Текущий режим отправки.
 * @property {boolean} sendLock - Флаг блокировки кнопки отправки.
 * @property {Vector | null} lastVec - Вектор последнего поискового запроса.
 * @property {number} lastQuery - Timestamp последнего запроса.
 * @property {boolean} netAuthorized - Флаг успешной авторизации в сети.
 * @property {function(function(): void): void | null} requestNetworkAuth - Колбэк для запроса авторизации.
 * @property {Object<string, SearchResult[]>} lists - Результаты поиска по сегментам.
 * @property {SearchResult[]} lists.local - Локальные совпадения.
 * @property {SearchResult[]} lists.world - Совпадения из сети.
 * @property {SearchResult[]} lists.seren - Озарения.
 * @property {SearchResult[]} lists.focus - Результаты поиска в режиме фокуса.
 * @property {boolean} focusMode - Активен ли режим фокуса (дублирует uiMode='focus' для совместимости).
 * @property {FocusedItem | null} focusedItem - Данные закреплённой заметки.

 * 
 * 1. **Переход `to-search` больше не сбрасывает `focusedItem`.**
 *    Это позволяет пользователю иметь активный закреп и одновременно
 *    вводить текст в редактор. Поиск в этом случае идёт по тексту
 *    (обрабатывается в EditorComponent.onInput и SearchCoordinator),

 *    и плашки сегментов друг на друга.

    showSegments: false,
    view: 'stream',
    seg: 'local',
    sendMode: 'private',
    sendLock: false,
    lastVec: null,
    lastQuery: 0,

   * 
   * 🔑 ИЗМЕНЕНИЕ v1.4.18:
   * - `showSegments` теперь учитывает `focusedItem`: плашка видна только
   *   когда мы в режиме search И нет активного закрепа.

  /**

   * 
   * @param {Partial<AppState>} partial - Объект с изменяемыми полями.

      console.warn('[StateManager] Direct uiMode mutation via setState is deprecated. Use dispatch() instead.');
      delete partial.uiMode;

    syncDerivedFields();

    for (var i = 0; i < listeners.length; i++) {

      } catch (e) {

  /**
   * Конечный автомат: выполняет валидный переход с применением payload.
   * 
   * 🔑 ИЗМЕНЕНИЯ v1.4.18:
   * 
   * **Переход `to-search`:**
   * - Больше НЕ сбрасывает `focusedItem` (убрана строка `partial.focusedItem = null`)

   *   (появился или исчез), переход всё равно выполняется для обновления showSegments

   * 
   * @param {TransitionType} transition - Тип перехода.
   * @param {TransitionPayload} [payload] - Данные для перехода.
