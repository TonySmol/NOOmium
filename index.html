  DI.register('SearchService', function(AI, DB, Net, Config, Bus, StateManager, I18n, Toast, Logger, Utils) {

    /** @type {Vector | null} Вектор последнего выполненного поискового запроса */
    var lastVec = null;

    /** @type {number} Timestamp последнего поискового запроса */
    var lastQuery = 0;

    /** @type {AbortController | null} Контроллер для отмены предыдущего поиска */
    var searchAbortController = null;

    /** @type {Note[] | null} Кэш всех локальных заметок */
    var allNotesCache = null;

    /** @type {number} Timestamp последнего обновления кэша заметок */
    var allNotesCacheTime = 0;

    /** @type {number} Время жизни кэша всех заметок (5 минут) */
    var ALL_NOTES_TTL = 5 * 60 * 1000;

    /**
     * Возвращает все заметки из базы, используя кэш для оптимизации.
     * Если кэш истёк, запрашивает свежие данные из DB.
     * @returns {Promise<Note[]>} Promise с массивом всех заметок.
     */
    function getAllNotesCached() {
      var now = Date.now();
      if (allNotesCache && (now - allNotesCacheTime < ALL_NOTES_TTL)) {
        return Promise.resolve(allNotesCache);
      }
      return DB.all().then(function(notes) {
        allNotesCache = notes;
        allNotesCacheTime = now;
        return notes;
      });
    }

    /**
     * Принудительно сбрасывает кэш всех заметок.
     * Вызывается после редактирования/удаления для гарантии актуальности данных.
     * @returns {void}
     */
    function invalidateNotesCache() {
      allNotesCache = null;
    }

    /**
     * Возвращает текущий режим отправки (Личное/Мир) из StateManager.
     * @returns {SendMode}
     */
    function getSendMode() {
      return StateManager.getState().sendMode;
    }

    /**
     * Устанавливает режим отправки в StateManager.
     * @param {SendMode} mode - Новый режим.
     * @returns {void}
     */
    function setSendMode(mode) {
      StateManager.setState({ sendMode: mode });
    }

    /**
     * Проверяет, заблокирована ли сейчас кнопка отправки (идёт ли процесс сохранения).
     * @returns {boolean}
     */
    function isSending() {
      return StateManager.getState().sendLock;
    }

    /**
     * Выполняет семантический поиск по локальной базе и ответам из сети.
     * Делегирует вычисление косинусного сходства в Web Worker для избежания блокировки UI.
     * @param {string} text - Поисковый запрос (текст из редактора).
     * @param {boolean} [force=false] - Принудительная отправка запроса в сеть, даже если вектор не изменился.
     * @returns {Promise<void>}
     */
    function search(text, force) {
      if (!text || !AI.ready()) {
        StateManager.setState({ lists: { local: [], world: [], seren: [] } });
        if (Bus && Bus.emit) {
          try { Bus.emit('state:lists-changed'); } catch (_) {}
        }
        return Promise.resolve();
      }

      if (searchAbortController) {
        searchAbortController.abort();
      }
      var controller = new AbortController();
      searchAbortController = controller;
      var signal = controller.signal;

      return AI.embed(text).then(function(vec) {
        if (signal.aborted) return;
        if (!vec) return;

        var shouldSendToNet = false;
        if (!lastVec || AI.cosine(vec, lastVec) < Config.get('vectorSimilarityThreshold', 0.98) || force) {
          lastVec = vec;
          lastQuery = Date.now();
          shouldSendToNet = true;
        }

        if (shouldSendToNet && AI.getMode() === 'model') {
          var state = StateManager.getState();
          if (state.netAuthorized && Net && typeof Net.send === 'function') {
            Net.send(vec);
          }
        }

        return getAllNotesCached().then(function(notes) {
          if (signal.aborted) return;

          var localCandidates = [];
          var localDataMap = new Map();

          for (var i = 0; i < notes.length; i++) {
            var note = notes[i];
            if (note && note.vector) {
              localCandidates.push({ id: note.id, vector: note.vector });
              localDataMap.set(note.id, note);
            }
          }

          var state = StateManager.getState();
          var worldAnswers = state.netAuthorized ? Net.activeAnswers() : [];

          var processLocal = localCandidates.length > 0 
            ? AI.cosineBatch(vec, localCandidates, signal) 
            : Promise.resolve([]);

          return processLocal.then(function(localScores) {
            if (signal.aborted) return;

            var localScored = [];
            for (var k = 0; k < localScores.length; k++) {
              var s = localScores[k];
              var note = localDataMap.get(s.id);
              if (note) {
                localScored.push({
                  id: note.id,
                  text: note.text,
                  vector: note.vector,
                  score: s.score,
                  shared: note.shared,
                  createdAt: note.createdAt
                });
              }
            }

            var worldScored = [];
            for (var j = 0; j < worldAnswers.length; j++) {
              var answer = worldAnswers[j];
              if (answer && typeof answer.score === 'number') {
                worldScored.push({
                  id: answer.id,
                  text: answer.text,
                  vector: answer.vector,
                  score: answer.score,
                  shared: true,
                  peer: answer.peer,
                  createdAt: answer.createdAt
                });
              }
            }

            var threshold = Config.get('threshold', 0.7);
            var serendipityDelta = Config.get('serendipity', 0.3);
            var serenMin = threshold - serendipityDelta;

            var newLists = {
              local: localScored.filter(function(n) { return n.score >= threshold; })
                .sort(function(a, b) { return b.score - a.score; }),
              world: worldScored.filter(function(n) { return n.score >= threshold; })
                .sort(function(a, b) { return b.score - a.score; }),
              seren: localScored.concat(worldScored)
                .filter(function(n) { return n.score >= serenMin && n.score < threshold; })
                .sort(function(a, b) { return b.score - a.score; })
            };

            StateManager.setState({ lists: newLists });
            if (Bus && Bus.emit) {
              try { Bus.emit('state:lists-changed'); } catch (_) {}
            }
          });
        });
      }).catch(function(err) {
        if (signal.aborted) return;
        Toast.show('err', String(err && err.message || err) || 'Search failed');
        Logger.warn('SearchService.search error', String(err && err.message || err));
      }).finally(function() {
        searchAbortController = null;
      });
    }

    /**
     * Сохраняет новую мысль в локальную базу и опционально публикует в сеть.
     * Блокирует повторные вызовы через sendLock.
     * @param {string} text - Текст мысли.
     * @param {SendMode} mode - Режим отправки ('private' или 'world').
     * @returns {Promise<void>}
     */
    function send(text, mode) {
      if (StateManager.getState().sendLock) return Promise.resolve();

      var trimmedText = (text || '').trim();
      if (!trimmedText) {
        Toast.show('warn', I18n.t('toast.empty'));
        return Promise.resolve();
      }

      if (!AI.ready()) {
        Toast.show('err', I18n.t('toast.ai.notready'));
        return Promise.resolve();
      }

      var state = StateManager.getState();
      if (mode === 'world' && !state.netAuthorized) {
        if (state.requestNetworkAuth) {
          state.requestNetworkAuth(function() {
            send(trimmedText, mode);
          });
        }
        return Promise.resolve();
      }

      var isWorld = mode === 'world';
      StateManager.setState({ sendLock: true });

      return AI.embed(trimmedText)
        .then(function(vector) {
          return DB.put({
            id: 'n' + Date.now().toString(36) + Math.random().toString(36).slice(2, 6),
            text: trimmedText,
            vector: vector,
            shared: !!isWorld,
            createdAt: Date.now()
          });
        })
        .then(function() {
          lastVec = null;
          Toast.show('ok', isWorld ? I18n.t('toast.saved.public') : I18n.t('toast.saved.private'));
        })
        .catch(function(err) {
          Toast.show('err', String(err && err.message || err) || 'Send failed');
        })
        .finally(function() {
          StateManager.setState({ sendLock: false });
        });
    }

    /**
     * Инициализирует сервис: подписывается на изменения базы для сброса кэша.
     * @returns {void}
     */
    function init() {
      Bus.on('db:change', function() {
        allNotesCache = null;
      });
    }

    return {
      search: search,
      send: send,
      getSendMode: getSendMode,
      setSendMode: setSendMode,
      isSending: isSending,
      getAllNotesCached: getAllNotesCached,
      invalidateNotesCache: invalidateNotesCache,
      init: init
    };
  }, ['AI', 'DB', 'Net', 'Config', 'Bus', 'StateManager', 'I18n', 'Toast', 'Logger', 'Utils']);
<!-- NOOMIUM_MODULE_END SearchService -->

  DI.register('EditorComponent', function(Bus, I18n, Utils, SearchService, Config, StateManager) {

    /** @type {HTMLTextAreaElement | null} */
    var editor = null;

    /** @type {HTMLElement | null} */
    var counter = null;

    /** @type {HTMLButtonElement | null} */
    var sendBtn = null;

    /** @type {HTMLElement | null} */
    var modeToggle = null;

    /** @type {number | null} ID таймера debounce для поиска */
    var searchTimer = null;

    /** @type {function(): void | null} Обработчик смены языка */
    var i18nHandler = null;

    /** @type {function(): void | null} Ссылка на обработчик ввода текста */
    var onInput = null;

    /** @type {function(): void | null} Ссылка на обработчик клика по кнопке отправки */
    var onSendClick = null;

    /** @type {function(MouseEvent): void | null} Ссылка на обработчик переключения режима */
    var onModeClick = null;

    /**
     * Обновляет ссылки на DOM-элементы.
     * Вызывается при каждом обращении, так как DOM может быть пересоздан после refreshUI.
     * @returns {void}
     */
    function refreshDOM() {
      editor = document.getElementById('ed-ta');
      counter = document.getElementById('ed-cnt');
      sendBtn = document.getElementById('btn-send');
      modeToggle = document.getElementById('mode-toggle');
    }

    /**
     * Возвращает текущий текст из поля ввода.
     * @returns {string}
     */
    function getValue() {
      if (!editor) refreshDOM();
      return editor ? editor.value : '';
    }

    /**
     * Устанавливает текст в поле ввода и обновляет счётчик символов.
     * @param {string} val - Новый текст.
     * @returns {void}
     */
    function setValue(val) {
      if (!editor) refreshDOM();
      if (editor) {
        editor.value = val;
        updateCounter();
      }
    }

    /**
     * Очищает поле ввода.
     * @returns {void}
     */
    function clear() {
      setValue('');
    }

    /**
     * Пересчитывает и отображает количество символов в UI.
     * @returns {void}
     */
    function updateCounter() {
      if (!counter) refreshDOM();
      if (counter) {
        var value = getValue();
        counter.textContent = Utils.word('symbols', value.length, I18n.getLang());
      }
    }

    /**
     * Обновляет визуальное состояние переключателя режима отправки (Личное/Мир).
     * @param {SendMode} mode - Активный режим.
     * @returns {void}
     */
    function updateSendMode(mode) {
      SearchService.setSendMode(mode);
      if (!modeToggle) refreshDOM();
      if (!modeToggle) return;
      
      modeToggle.setAttribute('data-mode', mode);
      var opts = modeToggle.querySelectorAll('.tog-sw-opt');
      for (var i = 0; i < opts.length; i++) {
        var opt = opts[i];
        if (opt.getAttribute('data-v') === mode) {
          opt.classList.add('on');
        } else {
          opt.classList.remove('on');
        }
      }
    }

    /**
     * Переключает визуальное состояние кнопки отправки (обычное / спиннер).
     * @param {boolean} isSending - true, если идёт процесс отправки.
     * @returns {void}
     */
    function setSendingState(isSending) {
      if (!sendBtn) refreshDOM();
      if (!sendBtn) return;
      
      if (isSending) {
        sendBtn.classList.add('sending');
        sendBtn.disabled = true;
        sendBtn.innerHTML = SPINNER_SVG;
      } else {
        sendBtn.classList.remove('sending');
        sendBtn.disabled = false;
        sendBtn.innerHTML = PAPER_PLANE_SVG;
      }
    }

    /**
     * Применяет переводы к элементам редактора (placeholder, кнопки).
     * @returns {void}
     */
    function applyI18n() {
      if (!editor) refreshDOM();
      if (editor) {
        editor.placeholder = I18n.t('ed.placeholder');
      }
      updateCounter();
      
      if (!modeToggle) refreshDOM();
      if (modeToggle) {
        var opts = modeToggle.querySelectorAll('.tog-sw-opt');
        for (var i = 0; i < opts.length; i++) {
          var opt = opts[i];
          var v = opt.getAttribute('data-v');
          if (v === 'private') opt.textContent = I18n.t('btn.private');
          else if (v === 'world') opt.textContent = I18n.t('btn.public');
        }
      }
      
      if (sendBtn) {
        sendBtn.setAttribute('aria-label', I18n.t('btn.send'));
      }
    }

    /**
     * Обрабатывает клик по кнопке отправки: запускает сохранение и очистку поля.
     * @returns {void}
     */
    function handleSend() {
      var text = getValue().trim();
      var mode = SearchService.getSendMode();

      setSendingState(true);

      SearchService.send(text, mode)
        .then(function() {
          clear();
          if (Bus && Bus.emit) {
            try { Bus.emit('editor:send-complete'); } catch (_) { /* ignore */ }
          }
        })
        .catch(function() {
          /* Ошибки уже обработаны в SearchService через Toast */
        })
        .finally(function() {
          setSendingState(false);
        });
    }

    /**
     * Навешивает обработчики событий на DOM-элементы редактора.
     * @returns {void}
     */
    function bindDOMEvents() {
      refreshDOM();

      if (editor) {
        onInput = function() {
          updateCounter();
          if (searchTimer) clearTimeout(searchTimer);
          searchTimer = setTimeout(function() {
            if (Bus && Bus.emit) {
              try { Bus.emit('editor:search-request', { force: false }); } catch (_) { /* ignore */ }
            }
          }, Config.get('debounce', 800));
        };
        editor.addEventListener('input', onInput);
      }

      if (sendBtn) {
        onSendClick = function() { handleSend(); };
        sendBtn.addEventListener('click', onSendClick);
      }

      if (modeToggle) {
        onModeClick = function(e) {
          var opt = e.target.closest('.tog-sw-opt');
          if (opt) {
            var value = opt.getAttribute('data-v');
            if (value) updateSendMode(value);
          }
        };
        modeToggle.addEventListener('click', onModeClick);
      }
    }

    /**
     * Снимает обработчики событий и обнуляет ссылки на DOM.
     * @returns {void}
     */
    function unbindDOMEvents() {
      if (editor && onInput) {
        try { editor.removeEventListener('input', onInput); } catch (_) { /* ignore */ }
      }
      if (sendBtn && onSendClick) {
        try { sendBtn.removeEventListener('click', onSendClick); } catch (_) { /* ignore */ }
      }
      if (modeToggle && onModeClick) {
        try { modeToggle.removeEventListener('click', onModeClick); } catch (_) { /* ignore */ }
      }
      editor = counter = sendBtn = modeToggle = null;
      onInput = onSendClick = onModeClick = null;
      if (searchTimer) {
        clearTimeout(searchTimer);
        searchTimer = null;
      }
    }

    /**
     * Инициализирует компонент: привязывает события и применяет начальные переводы.
     * @returns {void}
     */
    function init() {
      bindDOMEvents();

      i18nHandler = function() { applyI18n(); };
      Bus.on('i18n:change', i18nHandler);

      var currentMode = SearchService.getSendMode();
      updateSendMode(currentMode);
      applyI18n();
    }

    /**
     * Уничтожает компонент: отвязывает события и отписывается от шины.
     * @returns {void}
     */
    function destroy() {
      unbindDOMEvents();
      if (i18nHandler) {
        try { Bus.off('i18n:change', i18nHandler); } catch (_) { /* ignore */ }
        i18nHandler = null;
      }
    }

    return {
      init: init,
      destroy: destroy,
      getValue: getValue,
      setValue: setValue,
      clear: clear,
      updateCounter: updateCounter,
      updateSendMode: updateSendMode,
      setSendingState: setSendingState
    };
  }, ['Bus', 'I18n', 'Utils', 'SearchService', 'Config', 'StateManager']);
<!-- NOOMIUM_MODULE_END EditorComponent -->

  DI.register('AuthService', function(Config, Logger, Bus, DB) {

    /** @type {string} Ключ для хранения секретного ключа Nostr */
    var SK_KEY = 'noomium:sk';

    /** @type {string} Ключ для хранения конфигурации */
    var CFG_KEY = 'noomium:cfg';

    /** @type {string} Ключ для хранения версии приложения */
    var VER_KEY = 'noomium:appVersion';

    /** @type {string} Ключ для хранения выбранного языка */
    var LANG_KEY = 'noomium:lang';

    /** @type {number} Максимально допустимое количество попыток ввода пароля */
    var maxAttempts = Config.get('maxPasswordAttempts', 3);

    /** @type {number} Текущий счётчик неудачных попыток */
    var currentAttempts = 0;

    /**
     * Выводит ключ AES-GCM из пароля через PBKDF2 (100k итераций, SHA-256).
     * @param {string} password - Пароль пользователя.
     * @param {Uint8Array} salt - Соль для PBKDF2.
     * @returns {Promise<CryptoKey>}
     */
    function deriveKey(password, salt) {
      var enc = new TextEncoder();
      return crypto.subtle.importKey('raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']).then(function(keyMaterial) {
        return crypto.subtle.deriveKey(
          { name: 'PBKDF2', salt: salt, iterations: 100000, hash: 'SHA-256' },
          keyMaterial,
          { name: 'AES-GCM', length: 256 },
          false,
          ['encrypt', 'decrypt']
        );
      });
    }

    /**
     * Шифрует hex-ключ паролем с использованием AES-GCM.
     * @param {string} hexKey - Секретный ключ в hex-формате.
     * @param {string} password - Пароль.
     * @returns {Promise<string>} Base64-строка (salt + iv + ciphertext).
     */
    function encryptKey(hexKey, password) {
      var salt = crypto.getRandomValues(new Uint8Array(16));
      var iv = crypto.getRandomValues(new Uint8Array(12));
      return deriveKey(password, salt).then(function(key) {
        var enc = new TextEncoder();
        return crypto.subtle.encrypt({ name: 'AES-GCM', iv: iv }, key, enc.encode(hexKey)).then(function(ciphertext) {
          var combined = new Uint8Array(salt.length + iv.length + ciphertext.byteLength);
          combined.set(salt, 0);
          combined.set(iv, salt.length);
          combined.set(new Uint8Array(ciphertext), salt.length + iv.length);
          return btoa(String.fromCharCode.apply(null, combined));
        });
      });
    }

    /**
     * Расшифровывает hex-ключ из Base64-строки с использованием пароля.
     * @param {string} base64Str - Зашифрованная строка.
     * @param {string} password - Пароль.
     * @returns {Promise<string>} Расшифрованный hex-ключ.
     */
    function decryptKey(base64Str, password) {
      var combined = Uint8Array.from(atob(base64Str), function(c) { return c.charCodeAt(0); });
      var salt = combined.slice(0, 16);
      var iv = combined.slice(16, 28);
      var ciphertext = combined.slice(28);
      return deriveKey(password, salt).then(function(key) {
        return crypto.subtle.decrypt({ name: 'AES-GCM', iv: iv }, key, ciphertext).then(function(dec) {
          return new TextDecoder().decode(dec);
        });
      });
    }

    /**
     * Читает сырое значение секретного ключа из localStorage.
     * @returns {string | null}
     */
    function getStoredKey() {
      try { return localStorage.getItem(SK_KEY); } catch (e) { return null; }
    }

    /**
     * Проверяет, существует ли ключ и зашифрован ли он (не в сыром hex-формате).
     * @returns {boolean}
     */
    function hasEncryptedKey() {
      var stored = getStoredKey();
      return !!(stored && !/^[0-9a-f]{64}$/i.test(stored));
    }

    /**
     * Проверяет, отсутствует ли ключ вообще (первый запуск приложения).
     * @returns {boolean}
     */
    function needsNewKey() {
      return !getStoredKey();
    }

    /**
     * Сбрасывает счётчик неудачных попыток ввода пароля.
     * @returns {void}
     */
    function resetAttempts() {
      currentAttempts = 0;
    }

    /**
     * Пытается расшифровать существующий ключ с помощью введённого пароля.
     * @param {string} password - Введённый пароль.
     * @param {function(): void} onSuccess - Вызывается при успешной расшифровке.
     * @param {function(Error): void} onWrongPassword - Вызывается при неверном пароле (пока есть попытки).
     * @param {function(): void} onMaxAttempts - Вызывается при превышении лимита попыток.
     * @returns {void}
     */
    function unlock(password, onSuccess, onWrongPassword, onMaxAttempts) {
      var stored = getStoredKey();
      if (!stored) {
        if (typeof onWrongPassword === 'function') onWrongPassword(new Error('NO_KEY'));
        return;
      }

      if (/^[0-9a-f]{64}$/i.test(stored)) {
        resetAttempts();
        if (typeof onSuccess === 'function') onSuccess();
        return;
      }

      decryptKey(stored, password).then(function() {
        resetAttempts();
        if (typeof onSuccess === 'function') onSuccess();
      }).catch(function(err) {
        currentAttempts++;
        if (Logger) Logger.warn('AuthService: wrong password attempt ' + currentAttempts + '/' + maxAttempts);

        if (currentAttempts >= maxAttempts) {
          if (Bus && Bus.emit) { try { Bus.emit('auth:locked'); } catch (_) { /* ignore */ } }
          if (typeof onMaxAttempts === 'function') onMaxAttempts();
        } else {
          if (typeof onWrongPassword === 'function') onWrongPassword(err);
        }
      });
    }

    /**
     * Генерирует новый секретный ключ Nostr и сохраняет его в зашифрованном виде.
     * @param {string} password - Пароль для шифрования.
     * @param {function(): void} onSuccess - Вызывается после успешного сохранения.
     * @returns {void}
     */
    function createNew(password, onSuccess) {
      var raw = crypto.getRandomValues(new Uint8Array(32));
      var keyHex = Array.from(raw).map(function(b) { return b.toString(16).padStart(2, '0'); }).join('');

      encryptKey(keyHex, password).then(function(encrypted) {
        try { localStorage.setItem(SK_KEY, encrypted); } catch (e) {
          if (Logger) Logger.warn('AuthService: failed to save key', String(e));
        }
        resetAttempts();
        if (typeof onSuccess === 'function') onSuccess();
      }).catch(function(err) {
        if (Logger) Logger.error('AuthService: createNew failed', String(err && err.message || err));
      });
    }

    /**
     * Полностью сбрасывает хранилище: удаляет ключи, конфиг и очищает IndexedDB.
     * @returns {Promise<void>}
     */
    function resetStorage() {
      try {
        localStorage.removeItem(SK_KEY);
        localStorage.removeItem(CFG_KEY);
        localStorage.removeItem(VER_KEY);
        localStorage.removeItem(LANG_KEY);
      } catch (e) {
        if (Logger) Logger.warn('AuthService: localStorage cleanup failed', String(e));
      }

      resetAttempts();

      return DB.reset().catch(function(err) {
        if (Logger) Logger.warn('AuthService: DB reset failed', String(err && err.message || err));
      });
    }

    return {
      hasEncryptedKey: hasEncryptedKey,
      needsNewKey: needsNewKey,
      unlock: unlock,
      createNew: createNew,
      resetStorage: resetStorage,

      /**
       * Возвращает текущее количество неудачных попыток ввода пароля.
       * @returns {number}
       */
      getAttempts: function() { return currentAttempts; },

      /**
       * Возвращает максимальное допустимое количество попыток.
       * @returns {number}
       */
      getMaxAttempts: function() { return maxAttempts; }
    };
  }, ['Config', 'Logger', 'Bus', 'DB']);

     * @param {string} text - Текст статуса.

     */
    function updateNet(cls, text) {

      if (dot) dot.className = 'hdr-st-dot ' + (cls || '');
      if (txt) txt.textContent = text || '';
    }

    /**
     * Обновляет индикатор AI в хедере.
     * @param {string} cls - CSS-класс для точки.

     * @returns {void}
     */
    function updateAi(cls, text) {
      var dot = document.getElementById('st-ai-dot');

      if (txt) txt.textContent = text || '';

     */
    function init() {
      netStatusHandler = function(payload) {

        var text = I18n.t('st.net');
        var cls = 'load';
        
        if (status === 'connected') {
          text = I18n.t('st.net.online') + ' · ' + Utils.word('peers', Net.peerCount(), I18n.getLang());

          text = I18n.t('st.net.failed');

        }

      }

      if (i18nHandler) {
        try { Bus.off('i18n:change', i18nHandler); } catch (_) { /* ignore */ }

  }, ['Bus', 'I18n', 'Net', 'AI', 'Utils']);

  /**
   * @typedef {Object} NetStatusPayload

  /**
   * @typedef {Object} NetOutboxPayload
   * @description Payload события net:outbox.
   * @property {number} count - Количество событий в очереди.
   */

  DI.register('OfflineBarComponent', function(Bus, I18n, Net) {

    /** @type {function(NetStatusPayload): void | null} */
    var netStatusHandler = null;

    /** @type {function(NetOutboxPayload): void | null} */
    var netOutboxHandler = null;

    /** @type {function(): void | null} */
    var i18nHandler = null;

    /**
     * Обновляет видимость и текст офлайн-бара с учётом состояния сети и outbox.
     * Логика отображения:
     * - disconnected: плашка скрыта (нет соединения — нет смысла показывать очередь).
     * - connected + outbox > 0: показывается как «Офлайн-очередь» с количеством.
     * - connected + outbox = 0: плашка скрыта.
     * - reconnecting/failed: показывается как «Нет сети», с количеством очереди если есть.
     * DOM-элементы берутся при каждом вызове для корректной работы после refreshUI.
     * @returns {void}
     */
    function update() {
      var bar = document.getElementById('offline-bar');
      var textEl = document.getElementById('offline-text');
      var queueEl = document.getElementById('offline-queue');

      if (!bar || !textEl || !queueEl) return;

      var status = Net ? Net.getStatus() : 'disconnected';
      var outboxLength = Net ? Net.getOutboxLength() : 0;

      // Если disconnected – полностью скрываем плашку
      if (status === 'disconnected') {
        bar.style.display = 'none';
        return;
      }

      // Если connected – показываем только при наличии очереди
      if (status === 'connected') {
        if (outboxLength > 0) {
          bar.style.display = 'block';
          textEl.textContent = I18n.t('offline.bar');
          queueEl.style.display = 'inline';
          queueEl.textContent = '(' + I18n.t('offline.queue', { count: outboxLength }) + ')';
        } else {
          bar.style.display = 'none';
        }
        return;
      }

      // Остальные статусы (connecting, reconnecting, failed) – нет сети
      bar.style.display = 'block';
      textEl.textContent = I18n.t('offline.disconnected');
      if (outboxLength > 0) {
        queueEl.style.display = 'inline';
        queueEl.textContent = '(' + I18n.t('offline.queue', { count: outboxLength }) + ')';
      } else {
        queueEl.style.display = 'none';
      }
    }

    /**
     * Инициализирует компонент: подписывается на события сети и смены языка.
     * Отображает начальное состояние.
     * @returns {void}
     */
    function init() {
      netStatusHandler = function() { update(); };
      netOutboxHandler = function() { update(); };
      i18nHandler = function() { update(); };

      Bus.on('net:status', netStatusHandler);
      Bus.on('net:outbox', netOutboxHandler);
      Bus.on('i18n:change', i18nHandler);

      update();
    }

    /**
     * Уничтожает компонент: отписывается от всех событий.
     * @returns {void}
     */
    function destroy() {
      if (netStatusHandler) {
        try { Bus.off('net:status', netStatusHandler); } catch (_) { /* ignore */ }
      }
      if (netOutboxHandler) {
        try { Bus.off('net:outbox', netOutboxHandler); } catch (_) { /* ignore */ }
      }
      if (i18nHandler) {
        try { Bus.off('i18n:change', i18nHandler); } catch (_) { /* ignore */ }
      }
      netStatusHandler = netOutboxHandler = i18nHandler = null;
    }

    return {
      init: init,
      destroy: destroy
    };
  }, ['Bus', 'I18n', 'Net']);

  /**
   * @typedef {Object} CarouselUIState
   * @description Внутреннее состояние компонента карусели.
   * @property {number} currentPage - Текущая страница (0-based).
   * @property {Array<SearchResult[]>} pages - Двумерный массив страниц.
   * @property {number} totalPages - Общее количество страниц.
   * @property {number} activeIndex - Индекс активной карточки на текущей странице.
   * @property {HTMLElement | null} carouselEl - DOM-элемент карусели.
   * @property {HTMLElement | null} dotsContainer - Контейнер с точками пагинации.
   * @property {HTMLElement | null} counterEl - Элемент счётчика (X / Y).
   * @property {HTMLButtonElement | null} prevBtn - Кнопка предыдущей страницы.
   * @property {HTMLButtonElement | null} nextBtn - Кнопка следующей страницы.
   * @property {number | null} scrollRAF - ID requestAnimationFrame для скролла.
   */

  DI.register('StreamViewComponent', function(Bus, I18n, Utils, StateManager, Config, DB, Toast, EditorComponent) {

    /** @type {number} Количество карточек на одной странице */
    var PAGE_SIZE = 10;

    /** @type {CarouselUIState} */
    var uiState = {
      currentPage: 0,
      pages: [],
      totalPages: 0,
      activeIndex: 0,
      carouselEl: null,
      dotsContainer: null,
      counterEl: null,
      prevBtn: null,
      nextBtn: null,
      scrollRAF: null
    };

    /** @type {string | null} Кэшированный поисковый запрос для подсветки */
    var cachedQuery = null;

    /** @type {RegExp | null} Скомпилированное RegExp для подсветки */
    var cachedRegex = null;

    /** @type {function(): void | null} */
    var i18nHandler = null;

    /** @type {function(): void | null} */
    var listsChangedHandler = null;

    /**
     * Создаёт DocumentFragment с подсвеченными совпадениями поискового запроса.
     * @param {string} text - Исходный текст карточки.
     * @param {string} query - Поисковый запрос из редактора.
     * @returns {DocumentFragment} Фрагмент с текстовыми узлами и тегами <mark>.
     */
    function highlightText(text, query) {
      var fragment = document.createDocumentFragment();
      if (!text) return fragment;
      
      if (!query) {
        fragment.appendChild(document.createTextNode(String(text)));
        return fragment;
      }
      
      if (query !== cachedQuery) {
        var words = query.toLowerCase().split(/\s+/).filter(function(w) { return w.length > 2; });
        if (words.length === 0) {
          cachedRegex = null;
        } else {
          var escapedWords = words.map(function(w) { return Utils.escRe(w); });
          cachedRegex = new RegExp('(' + escapedWords.join('|') + ')', 'gi');
        }
        cachedQuery = query;
      }
      
      if (!cachedRegex) {
        fragment.appendChild(document.createTextNode(String(text)));
        return fragment;
      }
      
      var parts = String(text).split(cachedRegex);
      for (var i = 0; i < parts.length; i++) {
        if (parts[i] === '') continue;
        if (i % 2 === 1) {
          var mark = document.createElement('mark');
          mark.textContent = parts[i];
          fragment.appendChild(mark);
        } else {
          fragment.appendChild(document.createTextNode(parts[i]));
        }
      }
      return fragment;
    }

    /**
     * Проверяет, принадлежит ли заметка текущему пользователю.
     * @param {SearchResult} item - Объект карточки.
     * @returns {boolean} true, если это локальная заметка (нет поля peer).
     */
    function isOwnItem(item) {
      return !item.peer;
    }

    /**
     * Генерирует DOM-структуру карточки (fi) для переданного элемента.
     * @param {SearchResult} item - Данные для отрисовки.
     * @returns {HTMLDivElement} Корневой элемент карточки.
     */
    function renderItemHTML(item) {
      if (!item) return document.createElement('div');
      
      var state = StateManager.getState();
      var seg = state.seg;
      var own = isOwnItem(item);
      
      var card = document.createElement('div');
      card.className = 'fi t-' + seg;
      card.setAttribute('data-id', item.id);

      var header = document.createElement('div');
      header.className = 'fi-h';
      
      var badge = document.createElement('span');
      badge.className = 'fi-badge';
      var typeLabel = own
        ? (item.shared ? I18n.t('base.tag.shared') : I18n.t('base.tag.private'))
        : ('· ' + item.peer);
      badge.textContent = typeLabel;
      header.appendChild(badge);

      var scoreNum = typeof item.score === 'number' ? Math.round(item.score * 100) : null;
      if (scoreNum !== null) {
        var scoreWrap = document.createElement('span');
        scoreWrap.className = 'fi-score';
        
        var scoreLabel = document.createElement('span');
        scoreLabel.className = 'fi-score-label';
        scoreLabel.textContent = I18n.t('sim.score');
        scoreWrap.appendChild(scoreLabel);
        
        var scoreValue = document.createElement('span');
        scoreValue.className = 'fi-score-value';
        scoreValue.textContent = String(scoreNum) + '%';
        scoreWrap.appendChild(scoreValue);
        
        header.appendChild(scoreWrap);
      }
      card.appendChild(header);

      var body = document.createElement('div');
      body.className = 'fi-body';
      body.appendChild(highlightText(item.text, EditorComponent.getValue()));
      card.appendChild(body);

      var footer = document.createElement('div');
      footer.className = 'fi-foot';
      
      if (own) {
        var btnEdit = document.createElement('button');
        btnEdit.className = 'fi-act primary';
        btnEdit.setAttribute('data-act', 'edit');
        btnEdit.setAttribute('data-id', item.id);
        btnEdit.setAttribute('aria-label', I18n.t('btn.edit'));
        btnEdit.textContent = I18n.t('btn.edit');
        footer.appendChild(btnEdit);

        var btnToggle = document.createElement('button');
        btnToggle.className = 'fi-act';
        btnToggle.setAttribute('data-act', 'toggle');
        btnToggle.setAttribute('data-id', item.id);
        btnToggle.setAttribute('aria-label', item.shared ? I18n.t('btn.toggle.priv') : I18n.t('btn.toggle.pub'));
        btnToggle.textContent = item.shared ? I18n.t('btn.toggle.priv') : I18n.t('btn.toggle.pub');
        footer.appendChild(btnToggle);

        var btnCopy = document.createElement('button');
        btnCopy.className = 'fi-act';
        btnCopy.setAttribute('data-act', 'copy');
        btnCopy.setAttribute('data-id', item.id);
        btnCopy.setAttribute('aria-label', I18n.t('btn.copy'));
        btnCopy.textContent = I18n.t('btn.copy');
        footer.appendChild(btnCopy);

        var btnDel = document.createElement('button');
        btnDel.className = 'fi-act danger';
        btnDel.setAttribute('data-act', 'del');
        btnDel.setAttribute('data-id', item.id);
        btnDel.setAttribute('aria-label', I18n.t('btn.del'));
        btnDel.textContent = I18n.t('btn.del');
        footer.appendChild(btnDel);
      }
      card.appendChild(footer);
      return card;
    }

    /**
     * Разбивает плоский массив результатов на страницы по PAGE_SIZE.
     * @param {SearchResult[]} list - Массив результатов поиска.
     * @returns {void}
     */
    function paginate(list) {
      uiState.pages = [];
      if (!list || list.length === 0) {
        uiState.totalPages = 0;
        return;
      }
      for (var i = 0; i < list.length; i += PAGE_SIZE) {
        uiState.pages.push(list.slice(i, i + PAGE_SIZE));
      }
      uiState.totalPages = uiState.pages.length;
    }

    /**
     * Обновляет disabled-статус кнопок пагинации в зависимости от текущей страницы.
     * @returns {void}
     */
    function updatePaginationButtons() {
      if (uiState.prevBtn) uiState.prevBtn.disabled = (uiState.currentPage === 0);
      if (uiState.nextBtn) uiState.nextBtn.disabled = (uiState.currentPage >= uiState.totalPages - 1);
    }

    /**
     * Полностью перерисовывает карусель для указанной страницы.
     * @param {number} pageIndex - Индекс страницы для отображения.
     * @returns {void}
     */
    function renderPage(pageIndex) {
      if (!uiState.carouselEl || !uiState.dotsContainer || !uiState.counterEl) return;

      while (uiState.carouselEl.firstChild) {
        uiState.carouselEl.removeChild(uiState.carouselEl.firstChild);
      }

      var pageItems = uiState.pages[pageIndex] || [];

      if (pageItems.length === 0) {
        while (uiState.dotsContainer.firstChild) {
          uiState.dotsContainer.removeChild(uiState.dotsContainer.firstChild);
        }
        uiState.counterEl.textContent = '0 / 0';
        updatePaginationButtons();
        return;
      }

      for (var i = 0; i < pageItems.length; i++) {
        var itemEl = document.createElement('div');
        itemEl.className = 'carousel-item';
        itemEl.appendChild(renderItemHTML(pageItems[i]));
        uiState.carouselEl.appendChild(itemEl);
      }

      while (uiState.dotsContainer.firstChild) {
        uiState.dotsContainer.removeChild(uiState.dotsContainer.firstChild);
      }
      for (var j = 0; j < pageItems.length; j++) {
        var dot = document.createElement('span');
        dot.className = 'carousel-dot' + (j === 0 ? ' active' : '');
        uiState.dotsContainer.appendChild(dot);
      }

      uiState.counterEl.textContent = '1 / ' + pageItems.length;
      uiState.activeIndex = 0;
      uiState.carouselEl.scrollLeft = 0;

      updatePaginationButtons();
    }

    /**
     * Обработчик скролла карусели (тролтлится через requestAnimationFrame).
     * Вычисляет активную карточку и обновляет точки/счётчик.
     * @returns {void}
     */
    function onCarouselScroll() {
      if (uiState.scrollRAF) return;
      uiState.scrollRAF = requestAnimationFrame(function() {
        uiState.scrollRAF = null;
        if (!uiState.carouselEl) return;
        
        var itemWidth = uiState.carouselEl.clientWidth;
        if (itemWidth <= 0) return;
        
        var idx = Math.round(uiState.carouselEl.scrollLeft / itemWidth);
        var pageItems = uiState.pages[uiState.currentPage] || [];
        var maxIdx = Math.max(0, pageItems.length - 1);
        
        if (idx < 0) idx = 0;
        if (idx > maxIdx) idx = maxIdx;
        
        if (idx !== uiState.activeIndex) {
          uiState.activeIndex = idx;
          var dots = uiState.dotsContainer.querySelectorAll('.carousel-dot');
          for (var i = 0; i < dots.length; i++) {
            dots[i].classList.toggle('active', i === idx);
          }
          if (uiState.counterEl) {
            uiState.counterEl.textContent = (idx + 1) + ' / ' + pageItems.length;
          }
        }
      });
    }

    /**
     * Плавно прокручивает карусель к карточке с указанным индексом.
     * @param {number} idx - Индекс карточки.
     * @returns {void}
     */
    function scrollToIndex(idx) {
      if (!uiState.carouselEl) return;
      var itemWidth = uiState.carouselEl.clientWidth;
      uiState.carouselEl.scrollTo({
        left: idx * itemWidth,
        behavior: 'smooth'
      });
    }

    /**
     * Инициализирует или пересобирает карусель на основе текущего состояния StateManager.
     * Показывает empty-state, если данных нет.
     * @returns {void}
     */
    function initCarousel() {
      uiState.carouselEl = document.getElementById('carousel');
      uiState.dotsContainer = document.getElementById('carousel-dots');
      uiState.counterEl = document.getElementById('carousel-counter');
      uiState.prevBtn = document.getElementById('pagination-prev');
      uiState.nextBtn = document.getElementById('pagination-next');
      var controls = document.getElementById('pagination-controls');

      var state = StateManager.getState();
      var list = state.lists[state.seg];

      paginate(list);

      if (uiState.totalPages === 0) {
        if (uiState.carouselEl) uiState.carouselEl.style.display = 'none';
        if (controls) controls.style.display = 'none';

        var wrap = document.getElementById('carousel-wrap');
        if (wrap) {
          var existingEmpty = wrap.querySelector('.feed-empty');
          if (existingEmpty) existingEmpty.remove();

          var emptyMessages = {
            local: { t: I18n.t('empty.local.t'), d: I18n.t('empty.local.d') },
            world: { t: I18n.t('empty.world.t'), d: I18n.t('empty.world.d') },
            seren: { t: I18n.t('empty.seren.t'), d: I18n.t('empty.seren.d') }
          };
          var msg = emptyMessages[state.seg];
          
          var emptyDiv = document.createElement('div');
          emptyDiv.className = 'feed-empty';
          
          var emptyIc = document.createElement('div');
          emptyIc.className = 'feed-empty-ic';
          emptyIc.textContent = '◇';
          emptyDiv.appendChild(emptyIc);
          
          var emptyT = document.createElement('div');
          emptyT.className = 'feed-empty-t';
          emptyT.textContent = msg.t;
          emptyDiv.appendChild(emptyT);
          
          var emptyD = document.createElement('div');
          emptyD.className = 'feed-empty-d';
          emptyD.textContent = msg.d;
          emptyDiv.appendChild(emptyD);
          
          wrap.appendChild(emptyDiv);
        }

        updatePaginationButtons();
        return;
      }

      if (uiState.carouselEl) uiState.carouselEl.style.display = '';
      if (controls) controls.style.display = '';

      var wrap = document.getElementById('carousel-wrap');
      if (wrap) {
        var existingEmpty = wrap.querySelector('.feed-empty');
        if (existingEmpty) existingEmpty.remove();
      }

      if (uiState.currentPage >= uiState.totalPages) {
        uiState.currentPage = Math.max(0, uiState.totalPages - 1);
      }

      renderPage(uiState.currentPage);
    }

    /**
     * Обновляет счётчики (бейджи) над сегментами карусели.
     * @returns {void}
     */
    function updateCounts() {
      var state = StateManager.getState();
      ['local', 'world', 'seren'].forEach(function(key) {
        var el = document.getElementById('c-' + key);
        if (el) el.textContent = state.lists[key].length;
      });
    }

    /**
     * Переключает активный сегмент (local/world/seren) и перерисовывает карусель.
     * @param {Segment} segKey - Ключ сегмента.
     * @returns {void}
     */
    function setSegment(segKey) {
      StateManager.setState({ seg: segKey });
      document.querySelectorAll('.seg-b').forEach(function(b) {
        b.classList.toggle('on', b.getAttribute('data-k') === segKey);
      });
      cachedQuery = null;
      cachedRegex = null;
      uiState.currentPage = 0;
      initCarousel();
    }

    /**
     * Копирует текст в буфер обмена с фоллбэком на execCommand.
     * @param {string} text - Текст для копирования.
     * @returns {void}
     */
    function copyToClipboard(text) {
      try {
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(text).then(
            function() { Toast.show('ok', I18n.t('toast.copied')); },
            function() { Toast.show('err', I18n.t('toast.copy.fail')); }
          );
        } else {
          var ta = document.createElement('textarea');
          ta.value = text;
          ta.style.position = 'fixed';
          ta.style.top = '-9999px';
          document.body.appendChild(ta);
          ta.select();
          try {
            document.execCommand('copy');
            Toast.show('ok', I18n.t('toast.copied'));
          } catch (err) {
            Toast.show('err', I18n.t('toast.copy.fail'));
          }
          document.body.removeChild(ta);
        }
      } catch (err) {
        Toast.show('err', I18n.t('toast.copy.fail'));
      }
    }

    /**
     * Ищет элемент в массиве по его ID.
     * @param {string} id - Идентификатор.
     * @param {SearchResult[]} list - Массив для поиска.
     * @returns {SearchResult | null}
     */
    function findItemById(id, list) {
      for (var i = 0; i < list.length; i++) {
        if (list[i].id === id) return list[i];
      }
      return null;
    }

    /**
     * Обрабатывает клики по действиям внутри карточки (edit, copy, del, toggle).
     * @param {string} action - Имя действия (из data-act).
     * @param {HTMLElement} element - DOM-элемент кнопки.
     * @returns {void}
     */
    function handleItemAction(action, element) {
      if (!element) return;
      var id = element.getAttribute('data-id');
      var state = StateManager.getState();

      if (action === 'edit') {
        try { Bus.emit('editor:edit-note', { id: id }); } catch (_) { /* ignore */ }
        return;
      }
      
      if (action === 'copy') {
        var item = findItemById(id, state.lists[state.seg]);
        if (item) copyToClipboard(item.text);
        return;
      }
      
      if (action === 'del') {
        if (!confirm(I18n.t('del.confirm'))) return;
        DB.del(id).then(function() {
          Toast.show('ok', I18n.t('toast.deleted'));
          try { Bus.emit('editor:search-request', { force: true }); } catch (_) { /* ignore */ }
        }).catch(function(err) {
          Toast.show('err', String(err && err.message || err) || 'Delete failed');
        });
        return;
      }
      
      if (action === 'toggle') {
        DB.get(id).then(function(record) {
          if (!record) return;
          record.shared = !record.shared;
          return DB.put(record).then(function() {
            Toast.show('ok', record.shared ? I18n.t('toast.saved.public') : I18n.t('toast.saved.private'));
            try { Bus.emit('editor:search-request', { force: true }); } catch (_) { /* ignore */ }
          });
        }).catch(function(err) {
          Toast.show('err', String(err && err.message || err) || 'Toggle failed');
        });
        return;
      }
    }

    /**
     * Делегированный обработчик кликов по обёртке карусели (стрелки и действия карточек).
     * @param {MouseEvent} e - Событие клика.
     * @returns {void}
     */
    function handleWrapClick(e) {
      var prevBtn = e.target.closest('#pagination-prev');
      if (prevBtn && !prevBtn.disabled) {
        if (uiState.currentPage > 0) {
          uiState.currentPage--;
          renderPage(uiState.currentPage);
        }
        return;
      }
      
      var nextBtn = e.target.closest('#pagination-next');
      if (nextBtn && !nextBtn.disabled) {
        if (uiState.currentPage < uiState.totalPages - 1) {
          uiState.currentPage++;
          renderPage(uiState.currentPage);
        }
        return;
      }
      
      var actionEl = e.target.closest('[data-act]');
      if (actionEl) {
        handleItemAction(actionEl.getAttribute('data-act'), actionEl);
      }
    }

    /**
     * Привязывает первичные DOM-события (клики по сегментам и обёртке).
     * @returns {void}
     */
    function bindDOMEvents() {
      document.querySelectorAll('.seg-b').forEach(function(b) {
        b.onclick = function() { setSegment(b.getAttribute('data-k')); };
      });

      var wrap = document.getElementById('carousel-wrap');
      if (wrap) {
        wrap.addEventListener('click', handleWrapClick);
      }
    }

    /**
     * Инициализирует компонент: привязывает события, подписывается на шину, рендерит UI.
     * @returns {void}
     */
    function init() {
      bindDOMEvents();

      var state = StateManager.getState();
      document.querySelectorAll('.seg-b').forEach(function(b) {
        b.classList.toggle('on', b.getAttribute('data-k') === state.seg);
      });

      var carouselEl = document.getElementById('carousel');
      if (carouselEl) {
        carouselEl.addEventListener('scroll', onCarouselScroll, { passive: true });
        carouselEl.addEventListener('keydown', function(e) {
          var currentList = uiState.pages[uiState.currentPage] || [];
          if (!currentList || currentList.length === 0) return;
          if (e.key === 'ArrowRight') {
            e.preventDefault();
            var nextIdx = Math.min(uiState.activeIndex + 1, currentList.length - 1);
            scrollToIndex(nextIdx);
          } else if (e.key === 'ArrowLeft') {
            e.preventDefault();
            var prevIdx = Math.max(uiState.activeIndex - 1, 0);
            scrollToIndex(prevIdx);
          }
        });
      }

      i18nHandler = function() {
        var s = StateManager.getState();
        document.querySelectorAll('.seg-b').forEach(function(b) {
          var lbl = b.querySelector('.lbl');
          var k = b.getAttribute('data-k');
          if (lbl && k === 'local') lbl.textContent = I18n.t('seg.local');
          else if (lbl && k === 'world') lbl.textContent = I18n.t('seg.world');
          else if (lbl && k === 'seren') lbl.textContent = I18n.t('seg.seren');
        });
        updateCounts();
        cachedQuery = null;
        cachedRegex = null;
        initCarousel();
      };
      Bus.on('i18n:change', i18nHandler);

      listsChangedHandler = function() {
        updateCounts();
        cachedQuery = null;
        cachedRegex = null;
        uiState.currentPage = 0;
        initCarousel();
      };
      Bus.on('state:lists-changed', listsChangedHandler);

      updateCounts();
      initCarousel();
    }

    /**
     * Уничтожает компонент: очищает таймеры, снимает обработчики, отписывается от шины.
     * @returns {void}
     */
    function destroy() {
      if (uiState.scrollRAF) {
        cancelAnimationFrame(uiState.scrollRAF);
        uiState.scrollRAF = null;
      }
      var carouselEl = document.getElementById('carousel');
      if (carouselEl) {
        carouselEl.removeEventListener('scroll', onCarouselScroll);
      }
      var wrap = document.getElementById('carousel-wrap');
      if (wrap) {
        wrap.removeEventListener('click', handleWrapClick);
      }
      uiState.carouselEl = null;
      uiState.dotsContainer = null;
      uiState.counterEl = null;
      uiState.prevBtn = null;
      uiState.nextBtn = null;
      uiState.pages = [];
      
      if (i18nHandler) {
        try { Bus.off('i18n:change', i18nHandler); } catch (_) { /* ignore */ }
        i18nHandler = null;
      }
      if (listsChangedHandler) {
        try { Bus.off('state:lists-changed', listsChangedHandler); } catch (_) { /* ignore */ }
        listsChangedHandler = null;
      }
    }

    return {
      init: init,
      destroy: destroy
    };
  }, ['Bus', 'I18n', 'Utils', 'StateManager', 'Config', 'DB', 'Toast', 'EditorComponent']);
<!-- NOOMIUM_MODULE_END StreamViewComponent -->

<!-- NOOMIUM_MODULE_START BaseViewComponent -->
DI.register('BaseViewComponent', function(Bus, I18n, Utils, StateManager, Config, DB, AI, Toast, SearchService) {
  var ITEM_HEIGHT = 100;
  var ITEM_GAP = 8;
  var ROW_SIZE = ITEM_HEIGHT + ITEM_GAP;
  var POOL_SIZE = 15;

  var noteViewEscHandler = null;
  var scrollRAF = null;
  var filteredNotes = [];
  var poolItems = [];
  var listContainer = null;

  var i18nHandler = null;
  var listsChangedHandler = null;
  var viewChangedHandler = null;
  var editNoteHandler = null;

  /**
   * Создаёт DOM-элемент карточки статистики.
   * @param {number|string} value - Значение.
   * @param {string} label - Подпись.
   * @returns {HTMLDivElement}
   */
  function buildStatCard(value, label) {
    var card = document.createElement('div');
    card.className = 'stat';
    var valueEl = document.createElement('div');
    valueEl.className = 'stat-v';
    valueEl.textContent = String(value);
    card.appendChild(valueEl);
    var labelEl = document.createElement('div');
    labelEl.className = 'stat-l';
    labelEl.textContent = label;
    card.appendChild(labelEl);
    return card;
  }

  /**
   * Создаёт DOM-структуру пустого состояния (empty state).
   * @param {string} icon - Символ иконки.
   * @param {string} title - Заголовок.
   * @param {string} description - Описание.
   * @returns {HTMLDivElement}
   */
  function buildEmptyState(icon, title, description) {
    var emptyDiv = document.createElement('div');
    emptyDiv.className = 'feed-empty';
    var icEl = document.createElement('div');
    icEl.className = 'feed-empty-ic';
    icEl.textContent = icon;
    emptyDiv.appendChild(icEl);
    var titleEl = document.createElement('div');
    titleEl.className = 'feed-empty-t';
    titleEl.textContent = title;
    emptyDiv.appendChild(titleEl);
    var descEl = document.createElement('div');
    descEl.className = 'feed-empty-d';
    descEl.textContent = description;
    emptyDiv.appendChild(descEl);
    return emptyDiv;
  }

  /**
   * Заполняет DOM-элемент пула данными конкретной заметки.
   * @param {HTMLDivElement} element - Целевой DOM-узел.
   * @param {Note} note - Данные заметки.
   * @returns {void}
   */
  function fillBaseItem(element, note) {
    while (element.firstChild) element.removeChild(element.firstChild);
    element.className = 'bi' + (note.shared ? ' shared' : '');
    element.setAttribute('data-id', note.id);

    var truncateLength = Config.get('truncateTextLength', 120);
    var textEl = document.createElement('div');
    textEl.className = 'bi-t' + (note.text && note.text.length > truncateLength ? ' truncated' : '');
    textEl.textContent = note.text || '';
    element.appendChild(textEl);

    var foot = document.createElement('div');
    foot.className = 'bi-f';
    var meta = document.createElement('div');
    meta.className = 'bi-meta';
    var tagEl = document.createElement('span');
    tagEl.className = 'bi-tag';
    tagEl.textContent = note.shared ? I18n.t('base.tag.shared') : I18n.t('base.tag.private');
    meta.appendChild(tagEl);
    var dateEl = document.createElement('span');
    dateEl.className = 'bi-date';
    var lang = I18n.getLang();
    if (note.updatedAt && note.updatedAt > note.createdAt) {
      dateEl.textContent = (lang === 'ru' ? 'Ред. ' : 'Edit. ') + 
        Utils.fmtTime(note.updatedAt, lang) + ' ' + Utils.fmtDate(note.updatedAt, lang);
    } else {
      dateEl.textContent = Utils.fmtTime(note.createdAt, lang) + ' ' + Utils.fmtDate(note.createdAt, lang);
    }
    meta.appendChild(dateEl);
    foot.appendChild(meta);
    element.appendChild(foot);
  }

  /**
   * Вычисляет видимую область и обновляет содержимое/позицию элементов пула.
   * @returns {void}
   */
  function updateVisibleItems() {
    if (!listContainer || poolItems.length === 0) return;
    var scrollTop = listContainer.scrollTop;
    var startIdx = Math.floor(scrollTop / ROW_SIZE);
    var maxStart = Math.max(0, filteredNotes.length - POOL_SIZE);
    if (startIdx > maxStart) startIdx = maxStart;

    for (var i = 0; i < poolItems.length; i++) {
      var poolItem = poolItems[i];
      var dataIdx = startIdx + i;

      if (dataIdx >= 0 && dataIdx < filteredNotes.length) {
        if (poolItem.dataIndex !== dataIdx) {
          fillBaseItem(poolItem.element, filteredNotes[dataIdx]);
          poolItem.dataIndex = dataIdx;
        }
        poolItem.element.style.transform = 'translateY(' + (dataIdx * ROW_SIZE) + 'px)';
      } else {
        if (poolItem.dataIndex !== -1) {
          while (poolItem.element.firstChild) poolItem.element.removeChild(poolItem.element.firstChild);
          poolItem.element.className = 'bi';
          poolItem.element.removeAttribute('data-id');
          poolItem.dataIndex = -1;
        }
        poolItem.element.style.transform = 'translateY(-9999px)';
      }
    }
  }

  /**
   * Обработчик скролла списка (троллится через requestAnimationFrame).
   * @returns {void}
   */
  function onListScroll() {
    if (scrollRAF) return;
    scrollRAF = requestAnimationFrame(function() {
      updateVisibleItems();
      scrollRAF = null;
    });
  }

  /**
   * Полностью перерисовывает вкладку "База": статистику, фильтры и виртуальный список.
   * @returns {void}
   */
  function renderBase() {
    listContainer = document.getElementById('base-list');
    if (!listContainer) return;

    listContainer.removeEventListener('scroll', onListScroll);
    if (scrollRAF) { cancelAnimationFrame(scrollRAF); scrollRAF = null; }

    var queryInput = document.getElementById('base-q');
    var sortSelect = document.getElementById('base-sort');
    var queryValue = queryInput ? queryInput.value.trim().toLowerCase() : '';
    var sortValue = sortSelect ? sortSelect.value : 'new';

    SearchService.getAllNotesCached().then(function(allNotes) {
      var statsEl = document.getElementById('base-stats');
      if (statsEl) {
        while (statsEl.firstChild) statsEl.removeChild(statsEl.firstChild);
        var sharedCount = 0;
        for (var i = 0; i < allNotes.length; i++) {
          if (allNotes[i] && allNotes[i].shared) sharedCount++;
        }
        statsEl.appendChild(buildStatCard(allNotes.length, I18n.t('base.stat.total')));
        statsEl.appendChild(buildStatCard(sharedCount, I18n.t('base.stat.open')));
        statsEl.appendChild(buildStatCard(allNotes.length - sharedCount, I18n.t('base.stat.priv')));
      }

      filteredNotes = allNotes.slice();
      if (queryValue) {
        filteredNotes = filteredNotes.filter(function(n) {
          return n.text && n.text.toLowerCase().indexOf(queryValue) >= 0;
        });
      }
      if (sortValue === 'old') {
        filteredNotes.sort(function(a, b) { return (a.createdAt || 0) - (b.createdAt || 0); });
      } else if (sortValue === 'az') {
        filteredNotes.sort(function(a, b) {
          return (a.text || '').localeCompare(b.text || '', I18n.getLang() === 'en' ? 'en' : 'ru');
        });
      } else {
        filteredNotes.sort(function(a, b) { return (b.createdAt || 0) - (a.createdAt || 0); });
      }

      while (listContainer.firstChild) listContainer.removeChild(listContainer.firstChild);

      if (filteredNotes.length === 0) {
        var emptyTitle = I18n.t('empty.base.t');
        var emptyDesc = allNotes.length === 0 ? I18n.t('empty.base.d') : I18n.t('empty.base.empty');
        listContainer.appendChild(buildEmptyState('▤', emptyTitle, emptyDesc));
        poolItems = [];
        return;
      }

      var spacer = document.createElement('div');
      spacer.className = 'base-spacer';
      spacer.style.height = (filteredNotes.length * ROW_SIZE) + 'px';
      listContainer.appendChild(spacer);

      var itemsContainer = document.createElement('div');
      itemsContainer.className = 'base-items';
      listContainer.appendChild(itemsContainer);
      itemsContainer.style.height = (filteredNotes.length * ROW_SIZE) + 'px';

      poolItems = [];
      for (var i = 0; i < POOL_SIZE; i++) {
        var item = document.createElement('div');
        item.className = 'bi';
        itemsContainer.appendChild(item);
        poolItems.push({ element: item, dataIndex: -1 });
      }

      listContainer.addEventListener('scroll', onListScroll, { passive: true });
      listContainer.scrollTop = 0;
      updateVisibleItems();
    }).catch(function(err) {
      Toast.show('err', String(err && err.message || err) || 'Base load failed');
    });
  }

  /**
   * Копирует текст в буфер обмена с фоллбэком на execCommand.
   * @param {string} text - Текст для копирования.
   * @returns {void}
   */
  function copyToClipboard(text) {
    try {
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).then(
          function() { Toast.show('ok', I18n.t('toast.copied')); },
          function() { Toast.show('err', I18n.t('toast.copy.fail')); }
        );
      } else {
        var ta = document.createElement('textarea');
        ta.value = text;
        ta.style.position = 'fixed';
        ta.style.top = '-9999px';
        document.body.appendChild(ta);
        ta.select();
        try { document.execCommand('copy'); Toast.show('ok', I18n.t('toast.copied')); }
        catch (err) { Toast.show('err', I18n.t('toast.copy.fail')); }
        document.body.removeChild(ta);
      }
    } catch (err) {
      Toast.show('err', I18n.t('toast.copy.fail'));
    }
  }

  /**
   * Обрабатывает удаление заметки из NoteView.
   * @param {string} id - ID заметки.
   * @param {HTMLDivElement} nvOverlay - Оверлей NoteView.
   * @returns {void}
   */
  function handleDelete(id, nvOverlay) {
    if (!confirm(I18n.t('nv.delete.confirm'))) return;
    DB.del(id).then(function() {
      Toast.show('ok', I18n.t('toast.deleted'));
      closeNoteView(nvOverlay);
      renderBase();
      try { Bus.emit('editor:search-request', { force: true }); } catch (_) {}
      try { Bus.emit('state:lists-changed'); } catch (_) {}
    }).catch(function(err) {
      Toast.show('err', String(err && err.message || err) || 'Delete failed');
    });
  }

  /**
   * Обрабатывает переключение видимости заметки (личное/открытое).
   * @param {string} id - ID заметки.
   * @param {Note} record - Объект заметки.
   * @param {HTMLButtonElement} toggleBtn - Кнопка переключения.
   * @returns {void}
   */
  function handleToggle(id, record, toggleBtn) {
    record.shared = !record.shared;
    DB.put(record).then(function() {
      Toast.show('ok', record.shared ? I18n.t('toast.saved.public') : I18n.t('toast.saved.private'));
      toggleBtn.setAttribute('aria-label', record.shared ? I18n.t('btn.toggle.priv') : I18n.t('btn.toggle.pub'));
      toggleBtn.textContent = record.shared ? I18n.t('btn.toggle.priv') : I18n.t('btn.toggle.pub');
      renderBase();
      try { Bus.emit('editor:search-request', { force: true }); } catch (_) {}
      try { Bus.emit('state:lists-changed'); } catch (_) {}
    }).catch(function(err) {
      Toast.show('err', String(err && err.message || err) || 'Toggle failed');
    });
  }

  /**
   * Обрабатывает сохранение изменений заметки из NoteView.
   * @param {string} id - ID заметки.
   * @param {Note} record - Объект заметки.
   * @param {HTMLTextAreaElement} ta - Текстовое поле с новым содержимым.
   * @param {HTMLDivElement} nvOverlay - Оверлей NoteView.
   * @returns {void}
   */
  function handleSave(id, record, ta, nvOverlay) {
    var newText = ta.value.trim();
    if (!newText) {
      Toast.show('err', I18n.t('toast.empty'));
      return;
    }
    record.text = newText;
    record.updatedAt = Date.now();
    AI.embed(newText).then(function(v) {
      record.vector = v;
      return DB.put(record);
    }).then(function() {
      Toast.show('ok', I18n.t('toast.edit.saved'));
      closeNoteView(nvOverlay);
      renderBase();
      try { Bus.emit('editor:search-request', { force: true }); } catch (_) {}
      try { Bus.emit('state:lists-changed'); } catch (_) {}
    }).catch(function(err) {
      Toast.show('err', String(err && err.message || err) || 'Edit failed');
    });

   * @param {HTMLDivElement} nvOverlay - Оверлей NoteView.

  function closeNoteView(nvOverlay) {
    if (noteViewEscHandler) {
      document.removeEventListener('keydown', noteViewEscHandler);
      noteViewEscHandler = null;
    }
    if (nvOverlay) {
      nvOverlay.classList.remove('on');
      setTimeout(function() {

  /**
   * Открывает полноэкранное модальное окно редактирования заметки (NoteView).
   * NoteView всегда открывается в режиме редактирования: пользователь сразу видит
   * текстовое поле с содержимым заметки и может редактировать его.
   * 
   * Структура NoteView:
   * - Верхний бар: тег (личное/открыто), дата, кнопки действий (Удалить, Копировать, Переключить)
   * - Центральная область: текстовое поле для редактирования
   * - Нижний бар: кнопки "Отмена" и "Сохранить"
   * 
   * @param {string} id - ID заметки для открытия.
   * @returns {void}
   */
  function openNoteView(id) {
    DB.get(id).then(function(record) {

      if (noteViewEscHandler) {

      var copyBtn = document.createElement('button');

      copyBtn.id = 'nv-copy';
      copyBtn.setAttribute('aria-label', I18n.t('btn.copy'));
      copyBtn.textContent = I18n.t('btn.copy');
      copyBtn.onclick = function() { copyToClipboard(record.text); };
      topFooter.appendChild(copyBtn);

      var toggleBtn = document.createElement('button');
      toggleBtn.className = 'nv-act';
      toggleBtn.id = 'nv-toggle';
      toggleBtn.setAttribute('aria-label', record.shared ? I18n.t('btn.toggle.priv') : I18n.t('btn.toggle.pub'));
      toggleBtn.textContent = record.shared ? I18n.t('btn.toggle.priv') : I18n.t('btn.toggle.pub');
      toggleBtn.onclick = function() { handleToggle(id, record, toggleBtn); };
      topFooter.appendChild(toggleBtn);

      nvOverlay.appendChild(topFooter);

      // Центральная область с информацией и текстовым полем
      var body = document.createElement('div');
      body.className = 'nv-b';

      var infoRow = document.createElement('div');
      infoRow.className = 'info-row';

      var tagEl = document.createElement('span');
      tagEl.className = 'bi-tag';
      tagEl.textContent = record.shared ? I18n.t('base.tag.shared') : I18n.t('base.tag.private');
      infoRow.appendChild(tagEl);

      var dateEl = document.createElement('span');
      dateEl.className = 'note-date';
      var lang = I18n.getLang();
      if (record.updatedAt && record.updatedAt > record.createdAt) {
        dateEl.textContent = (lang === 'ru' ? 'Ред. ' : 'Edit. ') + 
          Utils.fmtTime(record.updatedAt, lang) + ' ' + Utils.fmtDate(record.updatedAt, lang);
      } else {
        dateEl.textContent = Utils.fmtTime(record.createdAt, lang) + ' ' + Utils.fmtDate(record.createdAt, lang);
      }
      infoRow.appendChild(dateEl);

      body.appendChild(infoRow);

      var ta = document.createElement('textarea');
      ta.className = 'nv-ta';
      ta.id = 'nv-ta';
      ta.value = record.text || '';
      body.appendChild(ta);

      nvOverlay.appendChild(body);

      // Нижний бар с кнопками управления
      var bottomFooter = document.createElement('div');
      bottomFooter.className = 'nv-f-bottom';

      cancelBtn.className = 'nv-act';

      cancelBtn.setAttribute('aria-label', I18n.t('btn.cancel'));
      cancelBtn.textContent = I18n.t('btn.cancel');
      cancelBtn.onclick = function() { closeNoteView(nvOverlay); };
      bottomFooter.appendChild(cancelBtn);

      var saveBtn = document.createElement('button');
      saveBtn.className = 'nv-act primary';
      saveBtn.id = 'nv-save';
      saveBtn.textContent = I18n.t('btn.save');
      saveBtn.onclick = function() { handleSave(id, record, ta, nvOverlay); };
      bottomFooter.appendChild(saveBtn);

      nvOverlay.appendChild(bottomFooter);

      // Обработчик Escape
      noteViewEscHandler = function(e) {
        if (e.key === 'Escape') closeNoteView(nvOverlay);
      };

    }).catch(function(err) {
      Toast.show('err', String(err && err.message || err) || 'Load note failed');
    });
  }

  /**
   * Экспортирует все заметки в JSON-файл и инициирует скачивание.
   * @returns {void}
   */
  function exportData() {
    DB.all().then(function(notes) {
      if (!notes || notes.length === 0) { Toast.show('err', '0'); return; }
      var capsule = { app: 'noomium', format: 'v1', version: 1, exportedAt: Date.now(), notes: notes };
      var blob = new Blob([JSON.stringify(capsule, null, 2)], { type: 'application/json' });
      var url = URL.createObjectURL(blob);
      var anchor = document.createElement('a');
      anchor.href = url;
      anchor.download = 'noomium-' + new Date().toISOString().slice(0, 10) + '.json';
      document.body.appendChild(anchor);
      anchor.click();
      URL.revokeObjectURL(url);
      anchor.remove();
      Toast.show('ok', '✓ ' + notes.length);
    }).catch(function(err) {
      Toast.show('err', String(err && err.message || err) || 'Export failed');
    });
  }

  /**
   * Открывает диалог выбора файла, парсит JSON и импортирует заметки в базу.
   * @returns {void}
   */
  function importData() {
    var input = document.createElement('input');
    input.type = 'file';
    input.accept = 'application/json,.json';
    input.onchange = function() {
      var file = input.files && input.files[0];
      if (!file) return;
      var reader = new FileReader();
      reader.onload = function() {
        try {
          var data = JSON.parse(String(reader.result || '{}'));
          var notes = Array.isArray(data) ? data : (data.notes || []);
          if (!Array.isArray(notes)) throw new Error('bad format');
          var clean = [];
          for (var i = 0; i < notes.length; i++) {
            var note = notes[i];
            if (!note || typeof note.text !== 'string' || !note.text.trim()) continue;
            clean.push({
              id: note.id || ('i' + Math.random().toString(36).slice(2, 10)),
              text: note.text.trim(),
              vector: Array.isArray(note.vector) ? note.vector : null,
              shared: !!note.shared,
              createdAt: typeof note.createdAt === 'number' ? note.createdAt : Date.now()
            });
          }
          DB.bulkPut(clean).then(function() {
            Toast.show('ok', '✓ ' + clean.length);
            if (StateManager.getState().view === 'base') renderBase();
            try { Bus.emit('editor:search-request', { force: true }); } catch (_) {}
            try { Bus.emit('state:lists-changed'); } catch (_) {}
          }).catch(function(err) {
            Toast.show('err', String(err && err.message || err) || 'Import failed');
          });
        } catch (err) {
          Toast.show('err', String(err && err.message || err) || 'Import parse failed');
        }
      };
      reader.readAsText(file);
    };
    input.click();
  }

  /**
   * Привязывает события к элементам вкладки "База" (клики по строкам, поиск, сортировка).

  function bindDOMEvents() {
    var baseContainer = document.getElementById('ws-base');
    if (baseContainer) {
      baseContainer.addEventListener('click', function(e) {
        var bi = e.target.closest('.bi');
        if (bi) {
          var id = bi.getAttribute('data-id');
          if (id) openNoteView(id);
        }
      });
    }
    var baseSearchInput = document.getElementById('base-q');
    if (baseSearchInput) {
      baseSearchInput.addEventListener('input', function() {
        renderBase();
      });
    }
    var baseSortSelect = document.getElementById('base-sort');
    if (baseSortSelect) baseSortSelect.onchange = renderBase;
  }

  /**
   * Инициализирует компонент: привязывает события, подписывается на шину.
   * @returns {void}
   */
  function init() {
    bindDOMEvents();

    i18nHandler = function() {
      var baseSearch = document.getElementById('base-q');
      if (baseSearch) baseSearch.placeholder = I18n.t('base.search');
      var sort = document.getElementById('base-sort');
      if (sort) {
        var opts = sort.querySelectorAll('option');
        if (opts[0]) opts[0].textContent = I18n.t('base.sort.new');
        if (opts[1]) opts[1].textContent = I18n.t('base.sort.old');
        if (opts[2]) opts[2].textContent = I18n.t('base.sort.az');
      }
      if (StateManager.getState().view === 'base') renderBase();
    };
    Bus.on('i18n:change', i18nHandler);

    listsChangedHandler = function() {
      if (StateManager.getState().view === 'base') renderBase();
    };
    Bus.on('state:lists-changed', listsChangedHandler);

    viewChangedHandler = function(payload) {
      if (payload && payload.view === 'base') renderBase();
    };
    Bus.on('view:changed', viewChangedHandler);

    editNoteHandler = function(payload) {
      if (payload && payload.id) openNoteView(payload.id);
    };
    Bus.on('editor:edit-note', editNoteHandler);

    if (StateManager.getState().view === 'base') renderBase();
  }

  /**
   * Уничтожает компонент: очищает таймеры, снимает обработчики, отписывается от шины.
   * @returns {void}
   */
  function destroy() {
    if (noteViewEscHandler) {
      document.removeEventListener('keydown', noteViewEscHandler);
      noteViewEscHandler = null;
    }
    if (scrollRAF) { cancelAnimationFrame(scrollRAF); scrollRAF = null; }
    if (listContainer) {
      listContainer.removeEventListener('scroll', onListScroll);
      listContainer = null;
    }
    poolItems = [];
    filteredNotes = [];
    if (i18nHandler) { try { Bus.off('i18n:change', i18nHandler); } catch (_) {} i18nHandler = null; }
    if (listsChangedHandler) { try { Bus.off('state:lists-changed', listsChangedHandler); } catch (_) {} listsChangedHandler = null; }
    if (viewChangedHandler) { try { Bus.off('view:changed', viewChangedHandler); } catch (_) {} viewChangedHandler = null; }
    if (editNoteHandler) { try { Bus.off('editor:edit-note', editNoteHandler); } catch (_) {} editNoteHandler = null; }
  }

  return {
    init: init,
    destroy: destroy,
    renderBase: renderBase,
    exportData: exportData,
    importData: importData
  };
}, ['Bus', 'I18n', 'Utils', 'StateManager', 'Config', 'DB', 'AI', 'Toast', 'SearchService']);

  /**
   * @typedef {Object} BusHandlerRecord
   * @description Запись о зарегистрированном обработчике шины для последующей отписки.
   * @property {string} event - Имя события.
   * @property {function(*): void} fn - Ссылка на функцию-обработчик.
   */

  /**
   * Массив всех обработчиков шины, зарегистрированных в App.Events,
   * для массового удаления при cleanup().
   * @type {BusHandlerRecord[]}
   */
  var busHandlers = [];

  /**
   * Привязывает первичные DOM-события и глобальные горячие клавиши,
   * подписывается на ключевые события шины (i18n:change, ai:progress,
   * editor:search-request, editor:send-complete).
   * @returns {void}
   */
  function bindEvents() {
    document.querySelectorAll('.btab-b').forEach(function(b) {
      b.onclick = function() { switchView(b.getAttribute('data-v')); };
    });

    var menuBtn = document.getElementById('btn-menu');
    if (menuBtn) menuBtn.onclick = openMenu;

    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') Modal.close();
      if (e.key === '/') {
        var editor = document.getElementById('ed-ta');
        if (editor && document.activeElement !== editor) {
          e.preventDefault();
          editor.focus();
        }
      }
    });

    var i18nHandler = function() { refreshUI(); };
    Bus.on('i18n:change', i18nHandler);
    busHandlers.push({ event: 'i18n:change', fn: i18nHandler });

    var aiProgressHandler = function(payload) {
      if (Progress && payload && typeof payload.pct === 'number') {
        Progress.update(payload.pct);
      }
    };
    Bus.on('ai:progress', aiProgressHandler);
    busHandlers.push({ event: 'ai:progress', fn: aiProgressHandler });

    uiState.editorSearchHandler = function(payload) {
      var force = payload && payload.force === true;
      executeSearch(force);
    };
    Bus.on('editor:search-request', uiState.editorSearchHandler);
    busHandlers.push({ event: 'editor:search-request', fn: uiState.editorSearchHandler });

    uiState.editorSendHandler = function() {
      executeSearch();
    };
    Bus.on('editor:send-complete', uiState.editorSendHandler);
    busHandlers.push({ event: 'editor:send-complete', fn: uiState.editorSendHandler });
  }

  /**
   * Устанавливает глобальные обработчики окна:
   * resize, focusin, focusout, orientationchange (для корректной высоты vh на мобильных)
   * и beforeunload (предупреждение при закрытии с несохранённым текстом).
   * Предварительно снимает старые обработчики для избежания дублирования.
   * @returns {void}
   */
  function setupWindowListeners() {
    var handlers = uiState.windowHandlers;

    if (handlers.resize) window.removeEventListener('resize', handlers.resize);
    if (handlers.focusin) window.removeEventListener('focusin', handlers.focusin);
    if (handlers.focusout) window.removeEventListener('focusout', handlers.focusout);
    if (handlers.orientationchange) window.removeEventListener('orientationchange', handlers.orientationchange);
    if (handlers.beforeunload) window.removeEventListener('beforeunload', handlers.beforeunload);

    var setVH = function() {
      var vh = window.innerHeight * 0.01;
      document.documentElement.style.setProperty('--vh', vh + 'px');
    };

    handlers.resize = setVH;
    handlers.focusin = setVH;
    handlers.focusout = setVH;
    handlers.orientationchange = function() { setTimeout(setVH, 100); };

    handlers.beforeunload = function(e) {
      try {
        var EC = DI.resolve('EditorComponent');
        var text = EC.getValue();
        if (text && text.trim().length > 0) {
          e.preventDefault();
          e.returnValue = '';
        }
      } catch (_) { /* ignore */ }
    };

    window.addEventListener('resize', handlers.resize);
    window.addEventListener('focusin', handlers.focusin);
    window.addEventListener('focusout', handlers.focusout);
    window.addEventListener('orientationchange', handlers.orientationchange);
    window.addEventListener('beforeunload', handlers.beforeunload);

    setVH();
  }

  /**
   * Снимает все глобальные обработчики окна и шины событий.
   * Вызывается перед refreshUI() или при уничтожении приложения.
   * @returns {void}
   */
  function cleanup() {
    if (uiState.progressHandler) {
      AI.offProgress(uiState.progressHandler);
      uiState.progressHandler = null;
    }
    var handlers = uiState.windowHandlers;
    if (handlers.resize) window.removeEventListener('resize', handlers.resize);
    if (handlers.focusin) window.removeEventListener('focusin', handlers.focusin);
    if (handlers.focusout) window.removeEventListener('focusout', handlers.focusout);
    if (handlers.orientationchange) window.removeEventListener('orientationchange', handlers.orientationchange);
    if (handlers.beforeunload) window.removeEventListener('beforeunload', handlers.beforeunload);

    handlers.resize = null;
    handlers.focusin = null;
    handlers.focusout = null;
    handlers.orientationchange = null;
    handlers.beforeunload = null;

    for (var i = 0; i < busHandlers.length; i++) {
      Bus.off(busHandlers[i].event, busHandlers[i].fn);
    }
    busHandlers = [];
    uiState.editorSearchHandler = null;
    uiState.editorSendHandler = null;
  }
<!-- NOOMIUM_MODULE_END App.Events -->
