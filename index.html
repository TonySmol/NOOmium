   * 
   * @param {string} text - Исходный текст карточки.
   * @param {string} query - Поисковый запрос из редактора.
   * @returns {DocumentFragment} Фрагмент с текстовыми узлами и тегами <mark>.
   */
  function highlightText(text, query) {
    var fragment = document.createDocumentFragment();
    if (!text) return fragment;
    
    if (!query) { 
      fragment.appendChild(document.createTextNode(String(text))); 
      return fragment; 
    }
    
    if (query !== cachedQuery) {
      var words = query.toLowerCase().split(/\s+/).filter(function(w) { return w.length > 2; });
      if (words.length === 0) {
        cachedRegex = null;
      } else {
        var escapedWords = words.map(function(w) { return Utils.escRe(w); });
        cachedRegex = new RegExp('(' + escapedWords.join('|') + ')', 'gi');
      }
      cachedQuery = query;
    }
    
    if (!cachedRegex) { 
      fragment.appendChild(document.createTextNode(String(text))); 
      return fragment; 
    }
    
    var parts = String(text).split(cachedRegex);
    for (var i = 0; i < parts.length; i++) {
      if (parts[i] === '') continue;
      if (i % 2 === 1) { 
        var mark = document.createElement('mark'); 
        mark.textContent = parts[i]; 
        fragment.appendChild(mark); 
      } else { 
        fragment.appendChild(document.createTextNode(parts[i])); 
      }
    }
    return fragment;
  }

  /**
   * Генерирует DOM-структуру карточки (fi) для переданного элемента.
   * Отображает бейджи, связи parent/child, score и кнопки действий.
   * 
   * 🔑 ИЗМЕНЕНИЕ v1.4.18: Родительская ссылка проходит асинхронную проверку статуса.
   * Если родитель отсутствует в локальной БД (сетевая заметка ушла в офлайн
   * или была удалена), ссылке добавляется класс `fi-parent-dead` и обработчик
   * клика меняется на показ модалки с объяснением. Связь остаётся видимой
   * как часть генеалогического древа.
   * 
   * Безопасность: все элементы создаются через createElement, текстовые данные
   * вставляются через textContent (XSS-safe).
   * 
   * @param {SearchResult} item - Данные для отрисовки.
   * @param {string} mode - Текущий режим ('local', 'world', 'seren', 'focus').
   * @returns {HTMLDivElement} Корневой элемент карточки.
   */
  function renderItemHTML(item, mode) {
    if (!item) return document.createElement('div');
    
    var seg = mode || StateManager.getState().seg;
    var own = !item.peer;
    
    var card = document.createElement('div');
    card.className = 'fi t-' + seg; 
    card.setAttribute('data-id', item.id);

    var header = document.createElement('div'); 
    header.className = 'fi-h';
    
    var badge = document.createElement('span'); 
    badge.className = 'fi-badge';
    var typeLabel = own 
      ? (item.shared ? I18n.t('base.tag.shared') : I18n.t('base.tag.private')) 
      : ('· ' + item.peer);
    
    badge.textContent = typeLabel; 
    header.appendChild(badge);

    // 🔑 Отображение связи с родителем (Parent/Child) с асинхронной проверкой статуса
    if (item.parentId) {
      var parentLink = document.createElement('a');
      parentLink.href = '#'; 
      parentLink.className = 'fi-parent';
      parentLink.setAttribute('data-parent-id', item.parentId);
      parentLink.textContent = '↳ ' + I18n.t('note.parent');
      
      // Оптимистичный обработчик: по умолчанию считаем, что родитель жив
      parentLink.onclick = function(e) { 
        e.preventDefault(); 
        e.stopPropagation(); 
        try { Bus.emit('editor:edit-note', { id: item.parentId }); } catch(_){} 
      };
      
      header.appendChild(parentLink);
      
      // Асинхронная проверка статуса родителя через DB.get
      // Не блокируем рендеринг карусели, обновляем ссылку после получения результата
      (function(link, parentId) {
        DB.get(parentId).then(function(parent) {
          // Защита от race condition: проверяем, что ссылка ещё в DOM
          // и её data-parent-id не изменился (актуально при переиспользовании нод)
          if (!link.parentNode) return;
          if (link.getAttribute('data-parent-id') !== parentId) return;
          
          if (!parent) {
            // Родитель недоступен (офлайн/удалён) — помечаем ссылку как «мёртвую»
            link.classList.add('fi-parent-dead');
            link.onclick = function(e) {
              e.preventDefault();
              e.stopPropagation();
              try {
                Modal.open({
                  title: I18n.t('note.parent.unavailable.title', null, 'Связь недоступна'),
                  body: I18n.t('note.parent.unavailable.body', null, 'Автор этой мысли больше не в сети или удалил её. Связь сохранена как часть истории.'),
                  buttons: [
                    {
                      text: I18n.t('btn.close', null, 'Закрыть'),
                      primary: true,
                      onClick: function() { Modal.close(); }
                    }
                  ]
                });
              } catch(_) {
                Toast.show('warn', 'Parent unavailable');
              }
            };
          }
        }).catch(function() {
          // При ошибке БД не трогаем ссылку — оставляем оптимистичное поведение
        });
      })(parentLink, item.parentId);
    }

    // Отображение количества дочерних ответов
    if (item.children && item.children.length > 0) {
      var childCount = document.createElement('span');
      childCount.className = 'fi-children';
      childCount.textContent = '💬 ' + item.children.length;
      header.appendChild(childCount);
    }

    // Отображение score (процента совпадения)
    var scoreNum = typeof item.score === 'number' ? Math.round(item.score * 100) : null;
    if (scoreNum !== null) {
      var scoreWrap = document.createElement('span'); 
      scoreWrap.className = 'fi-score';
      var scoreLabel = document.createElement('span'); 
      scoreLabel.className = 'fi-score-label'; 
      scoreLabel.textContent = I18n.t('sim.score'); 
      scoreWrap.appendChild(scoreLabel);
      var scoreValue = document.createElement('span'); 
      scoreValue.className = 'fi-score-value'; 
      scoreValue.textContent = String(scoreNum) + '%'; 
      scoreWrap.appendChild(scoreValue);
      header.appendChild(scoreWrap);
    }
    card.appendChild(header);

    var body = document.createElement('div'); 
    body.className = 'fi-body';
    body.appendChild(highlightText(item.text, EditorComponent.getValue()));
    card.appendChild(body);

    var footer = document.createElement('div'); 
    footer.className = 'fi-foot';
    
    // Кнопка "Фокус" для сетевых заметок с вектором
    if (!own && item.vector) {
      var btnFocus = document.createElement('button');
      btnFocus.className = 'fi-act primary'; 
      btnFocus.setAttribute('data-act', 'focus'); 
      btnFocus.setAttribute('data-id', item.id);
      btnFocus.textContent = '◎ ' + I18n.t('btn.focus');
      footer.appendChild(btnFocus);
    }

    // Кнопки управления для собственных заметок
    if (own) {
      var btnEdit = document.createElement('button'); 
      btnEdit.className = 'fi-act primary'; 
      btnEdit.setAttribute('data-act', 'edit'); 
      btnEdit.setAttribute('data-id', item.id); 
      btnEdit.textContent = I18n.t('btn.edit'); 
      footer.appendChild(btnEdit);
      
      var btnToggle = document.createElement('button'); 
      btnToggle.className = 'fi-act'; 
      btnToggle.setAttribute('data-act', 'toggle'); 
      btnToggle.setAttribute('data-id', item.id); 
      btnToggle.textContent = item.shared ? I18n.t('btn.toggle.priv') : I18n.t('btn.toggle.pub'); 
      footer.appendChild(btnToggle);
      
      var btnCopy = document.createElement('button'); 
      btnCopy.className = 'fi-act'; 
      btnCopy.setAttribute('data-act', 'copy'); 
      btnCopy.setAttribute('data-id', item.id); 
      btnCopy.textContent = I18n.t('btn.copy'); 
      footer.appendChild(btnCopy);
      
      var btnDel = document.createElement('button'); 
      btnDel.className = 'fi-act danger'; 
      btnDel.setAttribute('data-act', 'del'); 
      btnDel.setAttribute('data-id', item.id); 
      btnDel.textContent = I18n.t('btn.del'); 
      footer.appendChild(btnDel);
    }
    card.appendChild(footer);
    return card;
  }

  /**
   * Разбивает плоский массив результатов на страницы по PAGE_SIZE.
   * @param {SearchResult[]} list - Массив результатов поиска.
   * @returns {void}
   */
  function paginate(list) {
    uiState.pages = [];
    if (!list || list.length === 0) { 
      uiState.totalPages = 0; 
      return; 
    }
    for (var i = 0; i < list.length; i += PAGE_SIZE) {
      uiState.pages.push(list.slice(i, i + PAGE_SIZE));
    }
    uiState.totalPages = uiState.pages.length;
  }

  /**
   * Обновляет disabled-статус кнопок пагинации в зависимости от текущей страницы.
   * @returns {void}
   */
  function updatePaginationButtons() {
    if (uiState.prevBtn) uiState.prevBtn.disabled = (uiState.currentPage === 0);
    if (uiState.nextBtn) uiState.nextBtn.disabled = (uiState.currentPage >= uiState.totalPages - 1);
  }

  /**
   * Полностью перерисовывает карусель для указанной страницы.
   * Вычисляет точный snapStep через getBoundingClientRect для учета CSS gap и padding.
   * 
   * @param {number} pageIndex - Индекс страницы для отображения.
   * @returns {void}
   */
  function renderPage(pageIndex) {
    // Обновляем DOM-ссылки при каждом рендере (защита от refreshUI)
    uiState.carouselEl = document.getElementById('carousel');
    uiState.dotsContainer = document.getElementById('carousel-dots');
    uiState.counterEl = document.getElementById('carousel-counter');
    
    if (!uiState.carouselEl || !uiState.dotsContainer || !uiState.counterEl) return;
    
    while (uiState.carouselEl.firstChild) {
      uiState.carouselEl.removeChild(uiState.carouselEl.firstChild);
    }
    
    var pageItems = uiState.pages[pageIndex] || [];
    var state = StateManager.getState();
    
    // Режим определяется через uiMode
    var mode;
    switch (state.uiMode) {
      case 'idle':
        mode = 'world'; // Live Stream отображается как "мир"
        break;
      case 'focus':
        mode = 'focus';
        break;
      case 'search':
      default:
        mode = state.seg;
        break;
    }

    if (pageItems.length === 0) {
      while (uiState.dotsContainer.firstChild) {
        uiState.dotsContainer.removeChild(uiState.dotsContainer.firstChild);
      }
      uiState.counterEl.textContent = '0 / 0'; 
      updatePaginationButtons(); 
      return;
    }
    
    for (var i = 0; i < pageItems.length; i++) {
      var itemEl = document.createElement('div'); 
      itemEl.className = 'carousel-item';
      itemEl.appendChild(renderItemHTML(pageItems[i], mode));
      uiState.carouselEl.appendChild(itemEl);
    }
    
    // Точное вычисление шага скролла (ширина элемента + CSS gap 10px)
    var firstItem = uiState.carouselEl.querySelector('.carousel-item');
    if (firstItem) {
      uiState.snapStep = firstItem.getBoundingClientRect().width + 10;
    } else {
      uiState.snapStep = uiState.carouselEl.clientWidth;
    }

    while (uiState.dotsContainer.firstChild) {
      uiState.dotsContainer.removeChild(uiState.dotsContainer.firstChild);
    }
    for (var j = 0; j < pageItems.length; j++) {
      var dot = document.createElement('span'); 
      dot.className = 'carousel-dot' + (j === 0 ? ' active' : ''); 
      uiState.dotsContainer.appendChild(dot);
    }
    
    uiState.counterEl.textContent = '1 / ' + pageItems.length;
    uiState.activeIndex = 0; 
    uiState.carouselEl.scrollLeft = 0; 
    updatePaginationButtons();
  }

  /**
   * Обработчик скролла карусели (троллится через requestAnimationFrame).
   * Вычисляет активную карточку, используя точный snapStep.
   * 
   * @returns {void}
   */
  function onCarouselScroll() {
    if (uiState.scrollRAF) return;
    uiState.scrollRAF = requestAnimationFrame(function() {
      uiState.scrollRAF = null; 
      if (!uiState.carouselEl) return;
      
      var step = uiState.snapStep; 
      if (!step || step <= 0) return; // Защита от деления на ноль / NaN
      
      var idx = Math.round(uiState.carouselEl.scrollLeft / step);
      var pageItems = uiState.pages[uiState.currentPage] || [];
      var maxIdx = Math.max(0, pageItems.length - 1);
      
      idx = Math.min(maxIdx, Math.max(0, idx));
      
      if (idx !== uiState.activeIndex) {
        uiState.activeIndex = idx;
        var dots = uiState.dotsContainer.querySelectorAll('.carousel-dot');
        for (var i = 0; i < dots.length; i++) {
          dots[i].classList.toggle('active', i === idx);
        }
        if (uiState.counterEl) {
          uiState.counterEl.textContent = (idx + 1) + ' / ' + pageItems.length;
        }
      }
    });
  }

  /**
   * Плавно прокручивает карусель к карточке с указанным индексом.
   * @param {number} idx - Индекс карточки.
   * @returns {void}
   */
  function scrollToIndex(idx) {
    if (!uiState.carouselEl || !uiState.snapStep) return;
    uiState.carouselEl.scrollTo({ 
      left: idx * uiState.snapStep, 
      behavior: 'smooth' 
    });
  }

  /**
   * Пересчитывает snapStep при изменении размера окна.
   * Критично для корректной работы точек пагинации на мобильных устройствах
   * при повороте экрана или изменшении размера окна.
   * 
   * @returns {void}
   */
  function recalculateSnapStep() {
    if (uiState.carouselEl && uiState.pages.length > 0) {
      var firstItem = uiState.carouselEl.querySelector('.carousel-item');
      if (firstItem) {
        uiState.snapStep = firstItem.getBoundingClientRect().width + 10;
      }
    }
  }

  /**
   * Инициализирует или пересобирает карусель на основе текущего state machine.
   * Показывает empty-state, если данных нет.
   * 
   * 🔑 ИЗМЕНЕНИЕ v1.4.18:
   * - Видимость плашки сегментов теперь берётся из `state.showSegments`,
   *   которая вычисляется в StateManager с учётом focusedItem.
   * - Когда focusedItem активен в режиме search (пользователь вводит текст),
   *   сегменты корректно скрыты, а FocusBar отображает закреп.
   * 
   * @returns {void}
   */
  function initCarousel() {
    uiState.carouselEl = document.getElementById('carousel');
    uiState.dotsContainer = document.getElementById('carousel-dots');
    uiState.counterEl = document.getElementById('carousel-counter');
    uiState.prevBtn = document.getElementById('pagination-prev');
    uiState.nextBtn = document.getElementById('pagination-next');
    var controls = document.getElementById('pagination-controls');
    
    var state = StateManager.getState();
    var list = [];
    
    // Выбор источника данных через state machine (uiMode)
    switch (state.uiMode) {
      case 'idle':
        list = state.streamData || [];
        break;
      case 'focus':
        list = state.lists.focus || [];
        break;
      case 'search':
      default:
        list = state.lists[state.seg] || [];
        break;
    }

    // 🔑 ИЗМЕНЕНИЕ v1.4.18: видимость плашки сегментов берётся из state.showSegments
    // (который теперь учитывает focusedItem в StateManager.syncDerivedFields)
    var segBlock = document.querySelector('.seg');
    if (segBlock) {
      segBlock.style.display = state.showSegments ? '' : 'none';
    }

    paginate(list);
    
    if (uiState.totalPages === 0) {
      if (uiState.carouselEl) uiState.carouselEl.style.display = 'none';
      if (controls) controls.style.display = 'none';

      var wrap = document.getElementById('carousel-wrap');
      if (wrap) {
        var existingEmpty = wrap.querySelector('.feed-empty'); 
        if (existingEmpty) existingEmpty.remove();

        var emptyDiv = document.createElement('div'); 
        emptyDiv.className = 'feed-empty';
        var emptyT = document.createElement('div'); 
        emptyT.className = 'feed-empty-t'; 
        
        // Текст empty-state зависит от текущего режима
        if (state.uiMode === 'idle') {
          emptyT.textContent = I18n.t('stream.live');
        } else if (state.uiMode === 'focus') {
          emptyT.textContent = 'No focus results';
        } else {
          emptyT.textContent = I18n.t('empty.local.t');
        }
        
        emptyDiv.appendChild(emptyT);
        wrap.appendChild(emptyDiv);
      }
      updatePaginationButtons(); 
      return;
    }
    
    if (uiState.carouselEl) uiState.carouselEl.style.display = '';
    if (controls) controls.style.display = '';
    
    var wrap = document.getElementById('carousel-wrap');
    if (wrap) { 
      var existingEmpty = wrap.querySelector('.feed-empty'); 
      if (existingEmpty) existingEmpty.remove(); 
    }
    
    if (uiState.currentPage >= uiState.totalPages) {
      uiState.currentPage = Math.max(0, uiState.totalPages - 1);
    }
    renderPage(uiState.currentPage);
  }

  /**
   * Обновляет счётчики (бейджи) над сегментами карусели.
   * @returns {void}
   */
  function updateCounts() {
    var state = StateManager.getState();
    ['local', 'world', 'seren'].forEach(function(key) {
      var el = document.getElementById('c-' + key); 
      if (el) el.textContent = (state.lists[key] || []).length;
    });
  }

  /**
   * Переключает активный сегмент (local/world/seren) и перерисовывает карусель.
   * Использует dispatch для строгого перехода state machine.
   * 
   * @param {Segment} segKey - Ключ сегмента.
   * @returns {void}
   */
  function setSegment(segKey) {
    StateManager.dispatch('switch-segment', { seg: segKey });
    
    // Обновляем визуальное состояние кнопок
    document.querySelectorAll('.seg-b').forEach(function(b) { 
      b.classList.toggle('on', b.getAttribute('data-k') === segKey); 
    });
    
    cachedQuery = null; 
    cachedRegex = null; 
    uiState.currentPage = 0; 
    initCarousel();
  }

  /**
   * Копирует текст в буфер обмена с фоллбэком на execCommand.
   * @param {string} text - Текст для копирования.
   * @returns {void}
   */
  function copyToClipboard(text) {
    try {
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).then(
          function() { Toast.show('ok', I18n.t('toast.copied')); }, 
          function() { Toast.show('err', I18n.t('toast.copy.fail')); }
        );
      } else {
        var ta = document.createElement('textarea'); 
        ta.value = text; 
        ta.style.position = 'fixed'; 
        ta.style.top = '-9999px';
        document.body.appendChild(ta); 
        ta.select();
        try { 
          document.execCommand('copy'); 
          Toast.show('ok', I18n.t('toast.copied')); 
        } catch (err) { 
          Toast.show('err', I18n.t('toast.copy.fail')); 
        }
        document.body.removeChild(ta);
      }
    } catch (err) { 
      Toast.show('err', I18n.t('toast.copy.fail')); 
    }
  }

  /**
   * Обрабатывает клики по действиям внутри карточки (focus, edit, copy, del, toggle).
   * 
   * 🔑 ИЗМЕНЕНИЕ v1.4.18:
   * - При удалении shared-заметки вызывается `Net.publishDeletion(id)` для
   *   уведомления сети об отзыве заметки (Kind 21002). Это обеспечивает
   *   синхронизацию эфемерной ленты между пирами.
   * 
   * @param {string} action - Имя действия (из data-act).
   * @param {HTMLElement} element - DOM-элемент кнопки.
   * @returns {void}
   */
  function handleItemAction(action, element) {
    if (!element) return;
    var id = element.getAttribute('data-id');
    var state = StateManager.getState();
    
    if (action === 'focus') {
      var item = null;
      
      // Ищем заметку в текущем активном списке в зависимости от uiMode
      if (state.uiMode === 'idle') {
        for (var i = 0; i < state.streamData.length; i++) {
          if (state.streamData[i].id === id) { item = state.streamData[i]; break; }
        }
      } else if (state.uiMode === 'focus') {
        for (var i = 0; i < state.lists.focus.length; i++) {
          if (state.lists.focus[i].id === id) { item = state.lists.focus[i]; break; }
        }
      } else {
        var segList = state.lists[state.seg] || [];
        for (var i = 0; i < segList.length; i++) {
          if (segList[i].id === id) { item = segList[i]; break; }
        }
      }
      
      if (item && item.vector) {
        StateManager.dispatch('to-focus', {
          item: {
            id: item.id,
            text: item.text,
            vector: item.vector,
            peer: item.peer
          }
        });
        SearchService.searchByVector(item.vector);
      }
      return;
    }
    
    if (action === 'edit') { 
      try { Bus.emit('editor:edit-note', { id: id }); } catch (_) {} 
      return; 
    }
    
    if (action === 'copy') {
      var copyItem = null;
      
      if (state.uiMode === 'idle') {
        for (var i = 0; i < state.streamData.length; i++) {
          if (state.streamData[i].id === id) { copyItem = state.streamData[i]; break; }
        }
      } else if (state.uiMode === 'focus') {
        for (var i = 0; i < state.lists.focus.length; i++) {
          if (state.lists.focus[i].id === id) { copyItem = state.lists.focus[i]; break; }
        }
      } else {
        var segList = state.lists[state.seg] || [];
        for (var i = 0; i < segList.length; i++) {
          if (segList[i].id === id) { copyItem = segList[i]; break; }
        }
      }
      
      if (copyItem) copyToClipboard(copyItem.text); 
      return;
    }
    
    if (action === 'del') {
      if (!confirm(I18n.t('del.confirm'))) return;
      
      // 🔑 НОВОЕ v1.4.18: получаем информацию о заметке ПЕРЕД удалением,
      // чтобы знать, была ли она shared (для publishDeletion)
      var itemToDelete = null;
      if (state.uiMode === 'idle') {
        for (var i = 0; i < state.streamData.length; i++) {
          if (state.streamData[i].id === id) { itemToDelete = state.streamData[i]; break; }
        }
      } else if (state.uiMode === 'focus') {
        for (var i = 0; i < state.lists.focus.length; i++) {
          if (state.lists.focus[i].id === id) { itemToDelete = state.lists.focus[i]; break; }
        }
      } else {
        var segList = state.lists[state.seg] || [];
        for (var i = 0; i < segList.length; i++) {
          if (segList[i].id === id) { itemToDelete = segList[i]; break; }
        }
      }
      
      DB.del(id).then(function() { 
        // 🔑 НОВОЕ v1.4.18: публикуем удаление в сеть, если заметка была shared
        if (itemToDelete && itemToDelete.shared && Net && typeof Net.publishDeletion === 'function') {
          Net.publishDeletion(id);
        }
        
        Toast.show('ok', I18n.t('toast.deleted')); 
        try { Bus.emit('editor:search-request', { force: true }); } catch (_) {} 
      }).catch(function(err) {
        Toast.show('err', String(err && err.message || err) || 'Delete failed');
      });
      return;
    }
    
    if (action === 'toggle') {
      DB.get(id).then(function(record) {
        if (!record) return; 
        var wasShared = record.shared;
        record.shared = !record.shared;
        return DB.put(record).then(function() { 
          Toast.show('ok', record.shared ? I18n.t('toast.saved.public') : I18n.t('toast.saved.private'));
          
          // 🔑 НОВОЕ v1.4.18: если заметка была shared и стала private —
          // уведомляем сеть об отзыве (другие пиры удалят её из своих лент)
          if (wasShared && !record.shared && Net && typeof Net.publishDeletion === 'function') {
            Net.publishDeletion(id);
          }
          
          try { Bus.emit('editor:search-request', { force: true }); } catch (_) {} 
        });
      }).catch(function(err) {
        Toast.show('err', String(err && err.message || err) || 'Toggle failed');
      });
      return;
    }
  }

  /**
   * Делегированный обработчик кликов по обёртке карусели (стрелки и действия карточек).
   * @param {MouseEvent} e - Событие клика.
   * @returns {void}
   */
  function handleWrapClick(e) {
    var prevBtn = e.target.closest('#pagination-prev');
    if (prevBtn && !prevBtn.disabled) { 
      if (uiState.currentPage > 0) { 
        uiState.currentPage--; 
        renderPage(uiState.currentPage); 
      } 
      return; 
    }
    
    var nextBtn = e.target.closest('#pagination-next');
    if (nextBtn && !nextBtn.disabled) { 
      if (uiState.currentPage < uiState.totalPages - 1) { 
        uiState.currentPage++; 
        renderPage(uiState.currentPage); 
      } 
      return; 
    }
    
    var actionEl = e.target.closest('[data-act]');
    if (actionEl) {
      handleItemAction(actionEl.getAttribute('data-act'), actionEl);
    }
  }

  /**
   * Привязывает первичные DOM-события (клики по сегментам и обёртке).
   * Все обработчики привязываются к AbortSignal для автоматической очистки.
   * 
   * @returns {void}
   */
  function bindDOMEvents() {
    if (!abortController) return;
    var signal = abortController.signal;
    
    // Клики по кнопкам сегментов
    document.querySelectorAll('.seg-b').forEach(function(b) { 
      b.addEventListener('click', function() { 
        setSegment(b.getAttribute('data-k')); 
      }, { signal: signal });
    });

    // Делегированный обработчик кликов по обёртке карусели
    var wrap = document.getElementById('carousel-wrap');
    if (wrap) {
      wrap.addEventListener('click', handleWrapClick, { signal: signal });
    }
  }

  /**
   * Инициализирует компонент: привязывает события, подписывается на шину, рендерит UI.
   * Использует AbortController для автоматической отписки при destroy().
   * 
   * @returns {void}
   */
  function init() {
    // Создаём AbortController для централизованной отписки
    abortController = new AbortController();
    var signal = abortController.signal;
    
    bindDOMEvents();
    
    var state = StateManager.getState();
    document.querySelectorAll('.seg-b').forEach(function(b) { 
      b.classList.toggle('on', b.getAttribute('data-k') === state.seg); 
    });
    
    // Scroll listener на карусели с passive: true для оптимизации
    var carouselEl = document.getElementById('carousel');
    if (carouselEl) {
      carouselEl.addEventListener('scroll', onCarouselScroll, { passive: true, signal: signal });
      
      // Keyboard navigation (стрелки влево/вправо)
      carouselEl.addEventListener('keydown', function(e) {
        var currentList = uiState.pages[uiState.currentPage] || [];
        if (!currentList || currentList.length === 0) return;
        if (e.key === 'ArrowRight') { 
          e.preventDefault(); 
          scrollToIndex(Math.min(uiState.activeIndex + 1, currentList.length - 1)); 
        } else if (e.key === 'ArrowLeft') { 
          e.preventDefault(); 
          scrollToIndex(Math.max(uiState.activeIndex - 1, 0)); 
        }
      }, { signal: signal });
    }

    // Resize/orientationchange listeners для пересчёта snapStep
    var resizeHandler = function() {
      recalculateSnapStep();
    };
    window.addEventListener('resize', resizeHandler, { signal: signal });
    window.addEventListener('orientationchange', resizeHandler, { signal: signal });

    // Bus-подписки с автоотпиской через signal
    Bus.subscribe('i18n:change', function() {
      var s = StateManager.getState();
      document.querySelectorAll('.seg-b').forEach(function(b) {
        var lbl = b.querySelector('.lbl'); 
        var k = b.getAttribute('data-k');
        if (lbl && k === 'local') lbl.textContent = I18n.t('seg.local');
        else if (lbl && k === 'world') lbl.textContent = I18n.t('seg.world');
        else if (lbl && k === 'seren') lbl.textContent = I18n.t('seg.seren');
      });
      updateCounts(); 
      cachedQuery = null; 
      cachedRegex = null; 
      initCarousel();
    }, signal);

    Bus.subscribe('state:lists-changed', function() { 
      updateCounts(); 
      cachedQuery = null; 
      cachedRegex = null; 
      uiState.currentPage = 0; 
      initCarousel(); 
    }, signal);
    
    // Примечание: обработка net:deletion централизована в SearchCoordinator.
    // StreamViewComponent реагирует на изменения state через StateManager.subscribe.
    
    Bus.subscribe('net:parent-updated', function() {
      // Перерисовываем карусель, чтобы обновить счетчики детей, если мы не в live stream
      if (StateManager.getUIMode() !== 'idle') initCarousel();
    }, signal);

    // StateManager.subscribe не поддерживает signal, сохраняем функцию отписки
    stateUnsubscribe = StateManager.subscribe(function() { 
      initCarousel(); 
    });
    
    // Регистрируем отписку через signal
    signal.addEventListener('abort', function() {
      if (stateUnsubscribe) {
        stateUnsubscribe();
        stateUnsubscribe = null;
      }
    }, { once: true });

    updateCounts(); 
    initCarousel();
  }

  /**
   * Уничтожает компонент: очищает таймеры, снимает обработчики, отписывается от шины.
   * 
   * @returns {void}
   */
  function destroy() {
    // Отменяем pending requestAnimationFrame
    if (uiState.scrollRAF) { 
      cancelAnimationFrame(uiState.scrollRAF); 
      uiState.scrollRAF = null; 
    }
    
    // Отписываемся от всех событий через AbortController
    if (abortController) {
      abortController.abort();
      abortController = null;
    }
    
    // Очищаем состояние карусели
    uiState.carouselEl = null; 
    uiState.dotsContainer = null; 
    uiState.counterEl = null; 
    uiState.prevBtn = null; 
    uiState.nextBtn = null; 
    uiState.pages = [];
    
    // Сбрасываем кэш RegExp
    cachedQuery = null;
    cachedRegex = null;
    
    // Очищаем функцию отписки от StateManager (если abort не сработал)
    if (stateUnsubscribe) {
      stateUnsubscribe();
      stateUnsubscribe = null;
    }
  }

  return { 
    init: init, 
    destroy: destroy 
  };
}, ['Bus', 'I18n', 'Utils', 'StateManager', 'Config', 'DB', 'Toast', 'EditorComponent', 'Net', 'SearchService', 'Modal']);

/**
 * Компонент вкладки "База" (локальное хранилище заметок).
 * 
 * 🔑 КЛЮЧЕВЫЕ ИЗМЕНЕНИЯ ЭТАПА СТАБИЛИЗАЦИИ v1.4.18:
 * 
 * 1. **Сетевые удаления (Kind 21002):**
 *    - При удалении shared-заметки вызывается `Net.publishDeletion(id)`,
 *      чтобы уведомить сеть об отзыве заметки.
 *    - При переключении shared→private (toggle) также публикуется удаление,
 *      так как заметка больше не должна отображаться у других пиров.
 * 
 * 2. **Визуальная индикация «мёртвых» родительских связей:**
 *    - В `fillBaseItem` добавлена асинхронная проверка наличия родителя
 *      в локальной БД через `DB.get(parentId)`.
 *    - Если родитель недоступен (сетевая заметка ушла в офлайн или удалена),
 *      ссылке добавляется CSS-класс `fi-parent-dead` (opacity: 0.5, line-through).
 *    - Клик по «мёртвой» ссылке открывает модалку с объяснением, что автор
 *      мысли больше не в сети. Связь сохраняется как часть генеалогического древа.
 *    - Проверка выполнена асинхронно после синхронного рендеринга, чтобы не
 *      блокировать виртуальный скролл. Защита от race condition через проверку
 *      актуальности data-id (важно при переиспользовании пула DOM-элементов).
 * 
 * Принцип: "Сетевые заметки живут, пока пир в сети. Локальная база — только свои мысли."
 * 
 * Ключевые возможности:
 * - **Виртуальный скролл:** рендерит только видимые карточки (POOL_SIZE = 15)
 *   из potentially 100,000+ заметок.
 * - **NoteView:** полноэкранное модальное окно для просмотра/редактирования
 *   **локальных** заметок. Навигация по Parent/Child связям через рекурсивные
 *   вызовы openNoteView().
 * - **Экспорт/Импорт:** сохранение всех заметок в JSON-файл и загрузка с валидацией.
 * - **Фильтрация и сортировка:** текстовый поиск + сортировка по дате или алфавиту.
 * 
 * Архитектурные решения:
 * - **DOM-запросы при каждом рендере:** ссылки на элементы берутся через
 *   `getElementById` для защиты от устаревания после `refreshUI()`.
 * - **AbortController:** все подписки привязаны к signal для автоочистки.
 * - **Виртуальный скролл:** пул из 15 DOM-элементов переиспользуется через `fillBaseItem`.
 * - **Async parent check:** проверка статуса родителя идёт асинхронно через DB.get()
 *   после синхронного рендеринга, чтобы не блокировать отрисовку виртуального списка.
 * 
 * Безопасность:
 * - Все текстовые данные вставляются через `textContent` (XSS-safe).
 * - Экспорт/импорт валидирует структуру JSON перед записью в БД.
 * 
 * @module BaseViewComponent
 */
DI.register('BaseViewComponent', function(Bus, I18n, Utils, StateManager, Config, DB, AI, Toast, SearchService, Modal, Net) {
  
  /** @type {number} Высота одной карточки в пикселях (включая border) */
  var ITEM_HEIGHT = 100;
  
  /** @type {number} Вертикальный отступ между карточками */
  var ITEM_GAP = 8;
  
  /** @type {number} Полный шаг строки (высота + gap) для виртуального скролла */
  var ROW_SIZE = ITEM_HEIGHT + ITEM_GAP;
  
  /** @type {number} Количество DOM-элементов в пуле для виртуального рендеринга */
  var POOL_SIZE = 15;

  /** @type {number | null} ID requestAnimationFrame для скролла */
  var scrollRAF = null;
  
  /** @type {Note[]} Отфильтрованный и отсортированный массив заметок */
  var filteredNotes = [];
  
  /** @type {Array<{element: HTMLDivElement, dataIndex: number}>} Пул DOM-элементов */
  var poolItems = [];
  
  /** @type {HTMLDivElement | null} Ссылка на контейнер списка */
  var listContainer = null;
  
  /** @type {HTMLDivElement | null} Ссылка на активный оверлей NoteView (защита от дублей) */
  var activeNoteView = null;

  /**
   * Контроллер для автоматической отписки всех listeners при destroy().
   * @type {AbortController | null}
   */
  var abortController = null;

  /**
   * Функция отписки от StateManager (не поддерживает signal нативно).
   * @type {function(): void | null}
   */
  var stateUnsubscribe = null;

  /**
   * Создаёт DOM-элемент карточки статистики.
   * @param {number|string} value - Значение.
   * @param {string} label - Подпись.
   * @returns {HTMLDivElement}
   */
  function buildStatCard(value, label) {
    var card = document.createElement('div');
    card.className = 'stat';
    var valueEl = document.createElement('div');
    valueEl.className = 'stat-v';
    valueEl.textContent = String(value);
    card.appendChild(valueEl);
    var labelEl = document.createElement('div');
    labelEl.className = 'stat-l';
    labelEl.textContent = label;
    card.appendChild(labelEl);
    return card;
  }

  /**
   * Создаёт DOM-структуру пустого состояния (empty state).
   * @param {string} icon - Символ иконки.
   * @param {string} title - Заголовок.
   * @param {string} description - Описание.
   * @returns {HTMLDivElement}
   */
  function buildEmptyState(icon, title, description) {
    var emptyDiv = document.createElement('div');
    emptyDiv.className = 'feed-empty';
    var icEl = document.createElement('div');
    icEl.className = 'feed-empty-ic';
    icEl.textContent = icon;
    emptyDiv.appendChild(icEl);
    var titleEl = document.createElement('div');
    titleEl.className = 'feed-empty-t';
    titleEl.textContent = title;
    emptyDiv.appendChild(titleEl);
    var descEl = document.createElement('div');
    descEl.className = 'feed-empty-d';
    descEl.textContent = description;
    emptyDiv.appendChild(descEl);
    return emptyDiv;
  }

  /**
   * Заполняет DOM-элемент пула данными конкретной заметки.
   * Отображает текст, теги, дату и кликабельные индикаторы Parent/Child.
   * 
   * 🔑 ИЗМЕНЕНИЕ v1.4.18: Родительская ссылка проходит асинхронную проверку статуса.
   * Если родитель отсутствует в локальной БД (сетевая заметка ушла в офлайн
   * или была удалена), ссылке добавляется класс `fi-parent-dead` и обработчик
   * клика меняется на показ модалки с объяснением. Связь сохраняется визуально
   * как часть генеалогического древа.
   * 
   * Безопасность: все текстовые данные вставляются через textContent (XSS-safe).
   * 
   * @param {HTMLDivElement} element - Целевой DOM-узел из пула.
   * @param {Note} note - Данные заметки (только локальные).
   * @returns {void}
   */
  function fillBaseItem(element, note) {
    while (element.firstChild) element.removeChild(element.firstChild);
    element.className = 'bi' + (note.shared ? ' shared' : '');
    element.setAttribute('data-id', note.id);

    var truncateLength = Config.get('truncateTextLength', 120);
    var textEl = document.createElement('div');
    textEl.className = 'bi-t' + (note.text && note.text.length > truncateLength ? ' truncated' : '');
    textEl.textContent = note.text || '';
    element.appendChild(textEl);

    var foot = document.createElement('div');
    foot.className = 'bi-f';
    var meta = document.createElement('div');
    meta.className = 'bi-meta';
    
    var tagEl = document.createElement('span');
    tagEl.className = 'bi-tag';
    tagEl.textContent = note.shared ? I18n.t('base.tag.shared') : I18n.t('base.tag.private');
    meta.appendChild(tagEl);

    // 🔑 КЛИКАБЕЛЬНАЯ ссылка на родителя с асинхронной проверкой статуса
    if (note.parentId) {
      var parentLink = document.createElement('a');
      parentLink.href = '#';
      parentLink.className = 'fi-parent';
      parentLink.setAttribute('data-parent-id', note.parentId);
      parentLink.textContent = '↳ ' + I18n.t('note.parent');
      
      // Оптимистичный обработчик: по умолчанию считаем, что родитель жив
      parentLink.onclick = function(e) {
        e.preventDefault();
        e.stopPropagation();
        openNoteView(note.parentId);
      };
      meta.appendChild(parentLink);
      
      // Асинхронная проверка статуса родителя через DB.get
      // Не блокируем рендеринг виртуального списка, обновляем ссылку после результата
      (function(link, parentId, parentNoteId) {
        DB.get(parentId).then(function(parent) {
          // Защита от race condition: проверяем, что ссылка ещё в DOM,
          // принадлежит той же заметке (актуально при переиспользовании пула нод)
          if (!link.parentNode) return;
          var currentEl = link.closest('.bi');
          if (!currentEl || currentEl.getAttribute('data-id') !== parentNoteId) return;
          if (link.getAttribute('data-parent-id') !== parentId) return;
          
          if (!parent) {
            // Родитель недоступен (офлайн/удалён) — помечаем ссылку как «мёртвую»
            link.classList.add('fi-parent-dead');
            link.onclick = function(e) {
              e.preventDefault();
              e.stopPropagation();
              try {
                Modal.open({
                  title: I18n.t('note.parent.unavailable.title', null, 'Связь недоступна'),
                  body: I18n.t('note.parent.unavailable.body', null, 'Автор этой мысли больше не в сети или удалил её. Связь сохранена как часть истории.'),
                  buttons: [
                    {
                      text: I18n.t('btn.close', null, 'Закрыть'),
                      primary: true,
                      onClick: function() { Modal.close(); }
                    }
                  ]
                });
              } catch(_) {
                Toast.show('warn', 'Parent unavailable');
              }
            };
          }
        }).catch(function() {
          // При ошибке БД не трогаем ссылку — оставляем оптимистичное поведение
        });
      })(parentLink, note.parentId, note.id);
    }

    // 🔑 КЛИКАБЕЛЬНЫЙ индикатор дочерних ответов
    if (note.children && note.children.length > 0) {
      var childLink = document.createElement('a');
      childLink.href = '#';
      childLink.className = 'fi-children';
      childLink.textContent = '💬 ' + note.children.length;
      childLink.onclick = function(e) {
        e.preventDefault();
        e.stopPropagation();
        Bus.emit('base:show-children', { parentId: note.id, children: note.children });
      };
      meta.appendChild(childLink);
    }

    var dateEl = document.createElement('span');
    dateEl.className = 'bi-date';
    var lang = I18n.getLang();
    var ts = (note.updatedAt && note.updatedAt > note.createdAt) ? note.updatedAt : note.createdAt;
    var prefix = (note.updatedAt && note.updatedAt > note.createdAt) ? (lang === 'ru' ? 'Ред. ' : 'Edit. ') : '';
    dateEl.textContent = prefix + Utils.fmtTime(ts, lang) + ' ' + Utils.fmtDate(ts, lang);
    
    meta.appendChild(dateEl);
    foot.appendChild(meta);
    element.appendChild(foot);
  }

  /**
   * Вычисляет видимую область и обновляет содержимое/позицию элементов пула.
   * @returns {void}
   */
  function updateVisibleItems() {
    if (!listContainer || poolItems.length === 0) return;
    var scrollTop = listContainer.scrollTop;
    var startIdx = Math.floor(scrollTop / ROW_SIZE);
    var maxStart = Math.max(0, filteredNotes.length - POOL_SIZE);
    if (startIdx > maxStart) startIdx = maxStart;

    for (var i = 0; i < poolItems.length; i++) {
      var poolItem = poolItems[i];
      var dataIdx = startIdx + i;

      if (dataIdx >= 0 && dataIdx < filteredNotes.length) {
        if (poolItem.dataIndex !== dataIdx) {
          fillBaseItem(poolItem.element, filteredNotes[dataIdx]);
          poolItem.dataIndex = dataIdx;
        }
        poolItem.element.style.transform = 'translateY(' + (dataIdx * ROW_SIZE) + 'px)';
      } else {
        if (poolItem.dataIndex !== -1) {
          while (poolItem.element.firstChild) poolItem.element.removeChild(poolItem.element.firstChild);
          poolItem.element.className = 'bi';
          poolItem.element.removeAttribute('data-id');
          poolItem.dataIndex = -1;
        }
        poolItem.element.style.transform = 'translateY(-9999px)';
      }
    }
  }

  /**
   * Обработчик скролла списка (троллится через requestAnimationFrame).
   * @returns {void}
   */
  function onListScroll() {
    if (scrollRAF) return;
    scrollRAF = requestAnimationFrame(function() {
      updateVisibleItems();
      scrollRAF = null;
    });
  }

  /**
   * Полностью перерисовывает вкладку "База": статистику, фильтры и виртуальный список.
   * @returns {void}
   */
  function renderBase() {
    listContainer = document.getElementById('base-list');
    if (!listContainer) return;

    // Снимаем старый scroll listener перед пересозданием
    listContainer.removeEventListener('scroll', onListScroll);
    if (scrollRAF) { cancelAnimationFrame(scrollRAF); scrollRAF = null; }

    var queryInput = document.getElementById('base-q');
    var sortSelect = document.getElementById('base-sort');
    var queryValue = queryInput ? queryInput.value.trim().toLowerCase() : '';
    var sortValue = sortSelect ? sortSelect.value : 'new';

    SearchService.getAllNotesCached().then(function(allNotes) {
      var statsEl = document.getElementById('base-stats');
      if (statsEl) {
        while (statsEl.firstChild) statsEl.removeChild(statsEl.firstChild);
        var sharedCount = 0;
        for (var i = 0; i < allNotes.length; i++) {
          if (allNotes[i] && allNotes[i].shared) sharedCount++;
        }
        statsEl.appendChild(buildStatCard(allNotes.length, I18n.t('base.stat.total')));
        statsEl.appendChild(buildStatCard(sharedCount, I18n.t('base.stat.open')));
        statsEl.appendChild(buildStatCard(allNotes.length - sharedCount, I18n.t('base.stat.priv')));
      }

      filteredNotes = allNotes.slice();
      if (queryValue) {
        filteredNotes = filteredNotes.filter(function(n) {
          return n.text && n.text.toLowerCase().indexOf(queryValue) >= 0;
        });
      }
      if (sortValue === 'old') {
        filteredNotes.sort(function(a, b) { return (a.createdAt || 0) - (b.createdAt || 0); });
      } else if (sortValue === 'az') {
        filteredNotes.sort(function(a, b) {
          return (a.text || '').localeCompare(b.text || '', I18n.getLang() === 'en' ? 'en' : 'ru');
        });
      } else {
        filteredNotes.sort(function(a, b) { return (b.createdAt || 0) - (a.createdAt || 0); });
      }

      while (listContainer.firstChild) listContainer.removeChild(listContainer.firstChild);

      if (filteredNotes.length === 0) {
        var emptyTitle = I18n.t('empty.base.t');
        var emptyDesc = allNotes.length === 0 ? I18n.t('empty.base.d') : I18n.t('empty.base.empty');
        listContainer.appendChild(buildEmptyState('▤', emptyTitle, emptyDesc));
        poolItems = [];
        return;
      }

      var spacer = document.createElement('div');
      spacer.className = 'base-spacer';
      spacer.style.height = (filteredNotes.length * ROW_SIZE) + 'px';
      listContainer.appendChild(spacer);

      var itemsContainer = document.createElement('div');
      itemsContainer.className = 'base-items';
      listContainer.appendChild(itemsContainer);
      itemsContainer.style.height = (filteredNotes.length * ROW_SIZE) + 'px';

      poolItems = [];
      for (var i = 0; i < POOL_SIZE; i++) {
        var item = document.createElement('div');
        item.className = 'bi';
        itemsContainer.appendChild(item);
        poolItems.push({ element: item, dataIndex: -1 });
      }

      // Привязываем scroll listener к signal, если контроллер активен
      var signal = abortController ? abortController.signal : null;
      listContainer.addEventListener('scroll', onListScroll, { passive: true, signal: signal });
      listContainer.scrollTop = 0;
      updateVisibleItems();
    }).catch(function(err) {
      Toast.show('err', String(err && err.message || err) || 'Base load failed');
    });
  }

  /**
   * Копирует текст в буфер обмена с фоллбэком на execCommand.
   * @param {string} text - Текст для копирования.
   * @returns {void}
   */
  function copyToClipboard(text) {
    try {
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).then(
          function() { Toast.show('ok', I18n.t('toast.copied')); },
          function() { Toast.show('err', I18n.t('toast.copy.fail')); }
        );
      } else {
        var ta = document.createElement('textarea');
        ta.value = text;
        ta.style.position = 'fixed';
        ta.style.top = '-9999px';
        document.body.appendChild(ta);
        ta.select();
        try { document.execCommand('copy'); Toast.show('ok', I18n.t('toast.copied')); }
        catch (err) { Toast.show('err', I18n.t('toast.copy.fail')); }
        document.body.removeChild(ta);
      }
    } catch (err) {
      Toast.show('err', I18n.t('toast.copy.fail'));
    }
  }

  /**
   * Обрабатывает удаление заметки из NoteView.
   * 
   * 🔑 ИЗМЕНЕНИЕ v1.4.18:
   * - Перед удалением получаем record, чтобы проверить, была ли заметка shared.
   * - Если была shared, после успешного удаления вызываем `Net.publishDeletion(id)`
   *   для уведомления сети об отзыве заметки (Kind 21002).
   * 
   * @param {string} id - ID заметки.
   * @param {HTMLDivElement} nvOverlay - Оверлей NoteView.
   * @returns {void}
   */
  function handleDelete(id, nvOverlay) {
    if (!confirm(I18n.t('nv.delete.confirm'))) return;
    
    // Получаем информацию о заметке ПЕРЕД удалением, чтобы знать, была ли она shared
    DB.get(id).then(function(record) {
      var wasShared = record && record.shared;
      
      return DB.del(id).then(function() {
        // 🔑 НОВОЕ v1.4.18: публикуем удаление в сеть, если заметка была shared
        if (wasShared && Net && typeof Net.publishDeletion === 'function') {
          Net.publishDeletion(id);
        }
        
        Toast.show('ok', I18n.t('toast.deleted'));
        closeNoteView(nvOverlay);
        renderBase();
        try { Bus.emit('editor:search-request', { force: true }); } catch (_) {}
        try { Bus.emit('state:lists-changed'); } catch (_) {}
      });
    }).catch(function(err) {
      Toast.show('err', String(err && err.message || err) || 'Delete failed');
    });
  }

  /**
   * Обрабатывает переключение видимости заметки (личное/открытое).
   * 
   * 🔑 ИЗМЕНЕНИЕ v1.4.18:
   * - Если заметка была shared и стала private — уведомляем сеть об отзыве
   *   через `Net.publishDeletion(id)`. Другие пиры удалят её из своих лент.
   * 
   * @param {string} id - ID заметки.
   * @param {Note} record - Объект заметки.
   * @param {HTMLButtonElement} toggleBtn - Кнопка переключения.
   * @returns {void}
   */
  function handleToggle(id, record, toggleBtn) {
    var wasShared = record.shared;
    record.shared = !record.shared;
    DB.put(record).then(function() {
      Toast.show('ok', record.shared ? I18n.t('toast.saved.public') : I18n.t('toast.saved.private'));
      toggleBtn.setAttribute('aria-label', record.shared ? I18n.t('btn.toggle.priv') : I18n.t('btn.toggle.pub'));
      toggleBtn.textContent = record.shared ? I18n.t('btn.toggle.priv') : I18n.t('btn.toggle.pub');
      renderBase();
      
      // 🔑 НОВОЕ v1.4.18: если заметка была shared и стала private —
      // уведомляем сеть об отзыве (другие пиры удалят её из своих лент)
      if (wasShared && !record.shared && Net && typeof Net.publishDeletion === 'function') {
        Net.publishDeletion(id);
      }
      
      try { Bus.emit('editor:search-request', { force: true }); } catch (_) {}
      try { Bus.emit('state:lists-changed'); } catch (_) {}
    }).catch(function(err) {
      Toast.show('err', String(err && err.message || err) || 'Toggle failed');
    });
  }

  /**
   * Обрабатывает сохранение изменений заметки из NoteView.
   * @param {string} id - ID заметки.
   * @param {Note} record - Объект заметки.
   * @param {HTMLTextAreaElement} ta - Текстовое поле с новым содержимым.
   * @param {HTMLDivElement} nvOverlay - Оверлей NoteView.
   * @returns {void}
   */
  function handleSave(id, record, ta, nvOverlay) {
    var newText = ta.value.trim();
    if (!newText) {
      Toast.show('err', I18n.t('toast.empty'));
      return;
    }
    if (!AI.ready()) {
      Toast.show('err', I18n.t('toast.ai.notready'));
      return;
    }
    
    record.text = newText;
    record.updatedAt = Date.now();
    
    AI.embed(newText).then(function(v) {
      record.vector = v;
      return DB.put(record);
    }).then(function() {
      Toast.show('ok', I18n.t('toast.edit.saved'));
      closeNoteView(nvOverlay);
      renderBase();
      try { Bus.emit('editor:search-request', { force: true }); } catch (_) {}
      try { Bus.emit('state:lists-changed'); } catch (_) {}
    }).catch(function(err) {
      Toast.show('err', String(err && err.message || err) || 'Edit failed');
    });
  }

  /**
   * Закрывает NoteView и удаляет его из DOM с задержкой для анимации.
   * @param {HTMLDivElement} nvOverlay - Оверлей NoteView.
   * @returns {void}
   */
  function closeNoteView(nvOverlay) {
    if (nvOverlay) {
      nvOverlay.classList.remove('on');
      setTimeout(function() {
        if (nvOverlay && nvOverlay.parentNode) {
          try { nvOverlay.parentNode.removeChild(nvOverlay); } catch (_) {}
        }
        if (activeNoteView === nvOverlay) {
          activeNoteView = null;
        }
      }, Config.get('noteViewAnimationDelay', 200));
    }
  }

  /**
   * Открывает полноэкранное модальное окно редактирования заметки (NoteView).
   * 
   * Работает **только с локальными заметками** из БД.
   * Если заметки нет в БД — показывает тост "Note not found" и выходит.
   * 
   * @param {string} id - ID заметки для открытия.
   * @returns {void}
   */
  function openNoteView(id) {
    if (activeNoteView) {
      closeNoteView(activeNoteView);
    }

    DB.get(id).then(function(record) {
      if (!record) {
        Toast.show('warn', 'Note not found');
        return;
      }

      var nvOverlay = document.createElement('div');
      nvOverlay.className = 'nv on';
      document.body.appendChild(nvOverlay);
      activeNoteView = nvOverlay;

      // Верхний бар с кнопками действий
      var topFooter = document.createElement('div');
      topFooter.className = 'nv-f';

      var delBtn = document.createElement('button');
      delBtn.className = 'nv-act danger';
      delBtn.id = 'nv-del';
      delBtn.setAttribute('aria-label', I18n.t('btn.del'));
      delBtn.textContent = I18n.t('btn.del');
      delBtn.onclick = function() { handleDelete(id, nvOverlay); };
      topFooter.appendChild(delBtn);

      var copyBtn = document.createElement('button');
      copyBtn.className = 'nv-act';
      copyBtn.id = 'nv-copy';
      copyBtn.setAttribute('aria-label', I18n.t('btn.copy'));
      copyBtn.textContent = I18n.t('btn.copy');
      copyBtn.onclick = function() { copyToClipboard(record.text); };
      topFooter.appendChild(copyBtn);

      var toggleBtn = document.createElement('button');
      toggleBtn.className = 'nv-act';
      toggleBtn.id = 'nv-toggle';
      toggleBtn.setAttribute('aria-label', record.shared ? I18n.t('btn.toggle.priv') : I18n.t('btn.toggle.pub'));
      toggleBtn.textContent = record.shared ? I18n.t('btn.toggle.priv') : I18n.t('btn.toggle.pub');
      toggleBtn.onclick = function() { handleToggle(id, record, toggleBtn); };
      topFooter.appendChild(toggleBtn);

      nvOverlay.appendChild(topFooter);

      // Центральная область с информацией и текстовым полем
      var body = document.createElement('div');
      body.className = 'nv-b';

      var infoRow = document.createElement('div');
      infoRow.className = 'info-row';

      var tagEl = document.createElement('span');
      tagEl.className = 'bi-tag';
      tagEl.textContent = record.shared ? I18n.t('base.tag.shared') : I18n.t('base.tag.private');
      infoRow.appendChild(tagEl);

      // Ссылка на родителя (только для локальных родителей)
      if (record.parentId) {
        var parentLink = document.createElement('a');
        parentLink.href = '#';
        parentLink.className = 'fi-parent';
        parentLink.textContent = '↳ ' + I18n.t('note.parent');
        parentLink.onclick = function(e) {
          e.preventDefault();
          closeNoteView(nvOverlay);
          setTimeout(function() { openNoteView(record.parentId); }, 250);
        };
        infoRow.appendChild(parentLink);
      }

      // Индикатор дочерних ответов
      if (record.children && record.children.length > 0) {
        var childCount = document.createElement('span');
        childCount.className = 'fi-children';
        childCount.textContent = '💬 ' + record.children.length + ' ' + I18n.t('note.children');
        infoRow.appendChild(childCount);
      }

      var dateEl = document.createElement('span');
      dateEl.className = 'note-date';
      var lang = I18n.getLang();
      var ts = (record.updatedAt && record.updatedAt > record.createdAt) ? record.updatedAt : record.createdAt;
      var prefix = (record.updatedAt && record.updatedAt > record.createdAt) ? (lang === 'ru' ? 'Ред. ' : 'Edit. ') : '';
      dateEl.textContent = prefix + Utils.fmtTime(ts, lang) + ' ' + Utils.fmtDate(ts, lang);
      infoRow.appendChild(dateEl);

      body.appendChild(infoRow);

      var ta = document.createElement('textarea');
      ta.className = 'nv-ta';
      ta.id = 'nv-ta';
      ta.value = record.text || '';
      body.appendChild(ta);

      nvOverlay.appendChild(body);

      // Нижний бар с кнопками управления
      var bottomFooter = document.createElement('div');
      bottomFooter.className = 'nv-f-bottom';

      var cancelBtn = document.createElement('button');
      cancelBtn.className = 'nv-act';
      cancelBtn.id = 'nv-cancel';
      cancelBtn.setAttribute('aria-label', I18n.t('btn.cancel'));
      cancelBtn.textContent = I18n.t('btn.cancel');
      cancelBtn.onclick = function() { closeNoteView(nvOverlay); };
      bottomFooter.appendChild(cancelBtn);

      var saveBtn = document.createElement('button');
      saveBtn.className = 'nv-act primary';
      saveBtn.id = 'nv-save';
      saveBtn.textContent = I18n.t('btn.save');
      saveBtn.onclick = function() { handleSave(id, record, ta, nvOverlay); };
      bottomFooter.appendChild(saveBtn);

      nvOverlay.appendChild(bottomFooter);

      // Escape handler привязывается к signal для автоочистки
      var signal = abortController ? abortController.signal : null;
      document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') closeNoteView(nvOverlay);
      }, { signal: signal });

    }).catch(function(err) {
      Toast.show('err', String(err && err.message || err) || 'Load note failed');
    });
  }

  /**
   * Экспортирует все заметки в JSON-файл и инициирует скачивание.
   * @returns {void}
   */
  function exportData() {
    DB.all().then(function(notes) {
      if (!notes || notes.length === 0) { Toast.show('err', '0'); return; }
      var capsule = { app: 'noomium', format: 'v1', version: 1, exportedAt: Date.now(), notes: notes };
      var blob = new Blob([JSON.stringify(capsule, null, 2)], { type: 'application/json' });
      var url = URL.createObjectURL(blob);
      var anchor = document.createElement('a');
      anchor.href = url;
      anchor.download = 'noomium-' + new Date().toISOString().slice(0, 10) + '.json';
      document.body.appendChild(anchor);
      anchor.click();
      URL.revokeObjectURL(url);
      anchor.remove();
      Toast.show('ok', '✓ ' + notes.length);
    }).catch(function(err) {
      Toast.show('err', String(err && err.message || err) || 'Export failed');
    });
  }

  /**
   * Открывает диалог выбора файла, парсит JSON и импортирует заметки в базу.
   * @returns {void}
   */
  function importData() {
    var input = document.createElement('input');
    input.type = 'file';
    input.accept = 'application/json,.json';
    input.onchange = function() {
      var file = input.files && input.files[0];
      if (!file) return;
      var reader = new FileReader();
      reader.onload = function() {
        try {
          var data = JSON.parse(String(reader.result || '{}'));
          var notes = Array.isArray(data) ? data : (data.notes || []);
          if (!Array.isArray(notes)) throw new Error('bad format');
          var clean = [];
          for (var i = 0; i < notes.length; i++) {
            var note = notes[i];
            if (!note || typeof note.text !== 'string' || !note.text.trim()) continue;
            clean.push({
              id: note.id || ('i' + Math.random().toString(36).slice(2, 10)),
              text: note.text.trim(),
              vector: Array.isArray(note.vector) ? note.vector : null,
              shared: !!note.shared,
              createdAt: typeof note.createdAt === 'number' ? note.createdAt : Date.now(),
              parentId: typeof note.parentId === 'string' ? note.parentId : undefined,
              children: Array.isArray(note.children) ? note.children : undefined
            });
          }
          DB.bulkPut(clean).then(function() {
            Toast.show('ok', '✓ ' + clean.length);
            if (StateManager.getState().view === 'base') renderBase();
            try { Bus.emit('editor:search-request', { force: true }); } catch (_) {}
            try { Bus.emit('state:lists-changed'); } catch (_) {}
          }).catch(function(err) {
            Toast.show('err', String(err && err.message || err) || 'Import failed');
          });
        } catch (err) {
          Toast.show('err', String(err && err.message || err) || 'Import parse failed');
        }
      };
      reader.readAsText(file);
    };
    input.click();
  }

  /**
   * Привязывает события к элементам вкладки "База".
   * Все обработчики привязываются к AbortSignal для автоматической очистки.
   * 
   * @returns {void}
   */
  function bindDOMEvents() {
    if (!abortController) return;
    var signal = abortController.signal;
    
    var baseContainer = document.getElementById('ws-base');
    if (baseContainer) {
      baseContainer.addEventListener('click', function(e) {
        var bi = e.target.closest('.bi');
        if (bi) {
          var id = bi.getAttribute('data-id');
          if (id) openNoteView(id);
        }
      }, { signal: signal });
    }
    
    var baseSearchInput = document.getElementById('base-q');
    if (baseSearchInput) {
      baseSearchInput.addEventListener('input', function() {
        renderBase();
      }, { signal: signal });
    }
    
    var baseSortSelect = document.getElementById('base-sort');
    if (baseSortSelect) {
      baseSortSelect.addEventListener('change', function() {
        renderBase();
      }, { signal: signal });
    }
  }

  /**
   * Инициализирует компонент: привязывает события, подписывается на шину, рендерит UI.
   * Использует AbortController для автоматической отписки при destroy().
   * 
   * @returns {void}
   */
  function init() {
    // Создаём AbortController для централизованной отписки
    abortController = new AbortController();
    var signal = abortController.signal;
    
    bindDOMEvents();

    // Bus-подписки с автоотпиской через signal
    Bus.subscribe('i18n:change', function() {
      var baseSearch = document.getElementById('base-q');
      if (baseSearch) baseSearch.placeholder = I18n.t('base.search');
      var sort = document.getElementById('base-sort');
      if (sort) {
        var opts = sort.querySelectorAll('option');
        if (opts[0]) opts[0].textContent = I18n.t('base.sort.new');
        if (opts[1]) opts[1].textContent = I18n.t('base.sort.old');
        if (opts[2]) opts[2].textContent = I18n.t('base.sort.az');
      }
      if (StateManager.getState().view === 'base') renderBase();
    }, signal);

    Bus.subscribe('state:lists-changed', function() {
      if (StateManager.getState().view === 'base') renderBase();
    }, signal);

    Bus.subscribe('view:changed', function(payload) {
      if (payload && payload.view === 'base') renderBase();
    }, signal);

    Bus.subscribe('editor:edit-note', function(payload) {
      if (payload && payload.id) openNoteView(payload.id);
    }, signal);

    Bus.subscribe('base:show-children', function(payload) {
      if (payload && payload.children) {
        Toast.show('info', 'Children: ' + payload.children.length);
      }
    }, signal);

    // StateManager.subscribe не поддерживает signal, сохраняем функцию отписки
    stateUnsubscribe = StateManager.subscribe(function() {
      if (StateManager.getState().view === 'base') renderBase();
    });
    
    // Регистрируем отписку через signal
    signal.addEventListener('abort', function() {
      if (stateUnsubscribe) {
        stateUnsubscribe();
        stateUnsubscribe = null;
      }
    }, { once: true });

    if (StateManager.getState().view === 'base') renderBase();
  }

  /**
   * Уничтожает компонент: закрывает NoteView, отменяет RAF, отписывается от всех событий.
   * 
   * @returns {void}
   */
  function destroy() {
    // Закрываем активный NoteView (если есть)
    if (activeNoteView) {
      closeNoteView(activeNoteView);
    }
    
    // Отменяем pending requestAnimationFrame
    if (scrollRAF) { 
      cancelAnimationFrame(scrollRAF); 
      scrollRAF = null; 
    }
    
    // Отписываемся от всех событий через AbortController
    if (abortController) {
      abortController.abort();
      abortController = null;
    }
    
    // Очищаем ссылки
    if (listContainer) {
      listContainer.removeEventListener('scroll', onListScroll);
      listContainer = null;
    }
    poolItems = [];
    filteredNotes = [];
    
    // Очищаем функцию отписки от StateManager (если abort не сработал)
    if (stateUnsubscribe) {
      stateUnsubscribe();
      stateUnsubscribe = null;
    }
  }

  return {
    init: init,
    destroy: destroy,
    renderBase: renderBase,
    exportData: exportData,
    importData: importData
  };
}, ['Bus', 'I18n', 'Utils', 'StateManager', 'Config', 'DB', 'AI', 'Toast', 'SearchService', 'Modal', 'Net']);

   * @param {string} msg - Сообщение.
   * @param {'ok' | 'err' | 'warn' | 'info'} [type='info'] - Тип тоста.
   * @returns {void}
   */
  function toast(msg, type) {
    if (Toast && Toast.show) Toast.show(type || 'info', msg);
  }

  /**
   * Применяет цветовую тему: обновляет data-theme у body,
   * сохраняет в Config и синхронизирует мета-тег theme-color для мобильных браузеров.
   * 
   * @param {'dark' | 'light'} theme - Название темы.
   * @returns {void}
   */
  function applyTheme(theme) {
    document.body.setAttribute('data-theme', theme);
    Config.set('theme', theme);
    Config.save();
    var metaTheme = document.querySelector('meta[name="theme-color"]');
    if (metaTheme) {
      metaTheme.setAttribute('content', theme === 'light' ? '#fafafa' : '#0b0b10');
    }
  }

  /**
   * Запускает поиск по текущему тексту из редактора.
   * После завершения публикует событие state:lists-changed для обновления UI.
   * SearchService сам определит приоритет (текст > фокус > live stream).
   * 
   * @param {boolean} [force=false] - Принудительная отправка запроса в сеть.
   * @returns {Promise<void>}
   */
  function executeSearch(force) {
    var text = EditorComponent.getValue();
    return SearchService.search(text, force).then(function() {
      try { Bus.emit('state:lists-changed'); } catch (_) { /* ignore */ }
    });
  }

  /**
   * Переключает активную вкладку приложения (Поток / База).
   * Обновляет StateManager, DOM-классы, видимость блоков и публикует view:changed.
   * 
   * @param {ViewName} viewName - Имя вкладки.
   * @returns {void}
   */
  function switchView(viewName) {
    StateManager.setState({ view: viewName });
    document.querySelectorAll('.btab-b').forEach(function(b) {
      b.classList.toggle('on', b.getAttribute('data-v') === viewName);
    });
    var streamEl = document.getElementById('ws-stream');
    var baseEl = document.getElementById('ws-base');
    if (streamEl) streamEl.style.display = viewName === 'stream' ? 'flex' : 'none';
    if (baseEl) baseEl.style.display = viewName === 'base' ? 'flex' : 'none';
    try { Bus.emit('view:changed', { view: viewName }); } catch (_) { /* ignore */ }
  }

  /**
   * Полностью пересобирает UI: уничтожает старые компоненты,
   * перерисовывает разметку, инициализирует все компоненты заново
   * и восстанавливает сохранённую активную вкладку.
   * Вызывается при смене языка (i18n:change).
   * 
   * @returns {void}
   */
  function refreshUI() {
    var state = StateManager.getState();
    var savedView = state.view;

    cleanup();
    var root = document.getElementById('app-root');
    if (root) {
      root.innerHTML = buildMarkup();
    }
    setupWindowListeners();
    bindEvents();

    try {
      var headerStatus = DI.resolve('HeaderStatusComponent');
      headerStatus.destroy();
      headerStatus.init();
    } catch (_) { /* ignore */ }

    try {
      var offlineBar = DI.resolve('OfflineBarComponent');
      offlineBar.destroy();
      offlineBar.init();
    } catch (_) { /* ignore */ }

    try {
      EditorComponent.destroy();
      EditorComponent.init();
    } catch (_) { /* ignore */ }

    try {
      var streamView = DI.resolve('StreamViewComponent');
      streamView.destroy();
      streamView.init();
    } catch (_) { /* ignore */ }

    try {
      var focusBar = DI.resolve('FocusBarComponent');
      focusBar.destroy();
      focusBar.init();
    } catch (_) { /* ignore */ }

    try {
      var baseView = DI.resolve('BaseViewComponent');
      baseView.destroy();
      baseView.init();
    } catch (_) { /* ignore */ }

    switchView(savedView);

    if (AI.ready()) {
      executeSearch(true);
    }
  }

          setTimeout(function() { location.reload(true); }, 500);

        {
          text: translate('btn.save'),
          primary: true,
          onClick: function() {
            // Сохранение новых значений в Config
            Config.set('room', roomInput.value.trim() || 'noomium-main');
            Config.set('threshold', parseFloat(thresholdInput.value));
            Config.set('serendipity', parseFloat(serenInput.value));
            
            // Парсинг и валидация списка реле
            var relaysText = relaysInput.value.trim();
            var relays = relaysText
              ? relaysText.split(/[\n,]+/).map(function(r) { return r.trim(); }).filter(function(r) { return r && /^wss?:\/\//.test(r); })
              : Config.defaults().relays;
            Config.set('relays', relays);
            Config.save();
            
            Modal.close();
            toast(translate('toast.net.restart'), 'info');
            
            // Перезапуск сети. 
            // Примечание: пароль не требуется, так как sk уже расшифрован и хранится 
            // в памяти модуля Net. Net.init() безопасно пропустит шаг дешифровки.
            setTimeout(function() {
              if (Net && Net.restart) Net.restart(function() { executeSearch(); });
            }, 300);
          }
        }
      ]
    });
  }

   * Использует глобальные хелперы translate() и сервисы Modal, Config из App.State.
   * 
   * @param {boolean} showOnboarding - Показывать ли как онбординг (первый запуск).
   * @returns {void}
   */
  function openHelp(showOnboarding) {
    var body = document.createElement('div');

    /**
     * Внутренний хелпер: создаёт секцию справки с заголовком и описанием.
     * Эквивалент структуры: <div class="help-sec"><div class="help-st">...</div><div class="help-sd">...</div></div>
     * 
     * @param {string} titleKey - Ключ перевода для заголовка.
     * @param {string} descKey - Ключ перевода для описания.
     * @returns {HTMLDivElement} Готовая секция.
     */
    function buildSection(titleKey, descKey) {
      var sec = document.createElement('div');
      sec.className = 'help-sec';
      
      var st = document.createElement('div');
      st.className = 'help-st';
      st.textContent = translate(titleKey);
      sec.appendChild(st);
      
      var sd = document.createElement('div');
      sd.className = 'help-sd';
      sd.textContent = translate(descKey);
      sec.appendChild(sd);
      
      return sec;
    }

    /**
     * Внутренний хелпер: создаёт текстовый блок-коробку.
     * Эквивалент структуры: <div class="help-box">...</div>
     * 
     * @param {string} textKey - Ключ перевода для содержимого.
     * @returns {HTMLDivElement} Готовый блок.
     */
    function buildBox(textKey) {
      var box = document.createElement('div');
      box.className = 'help-box';
      box.textContent = translate(textKey);
      return box;
    }

    /**
     * Внутренний хелпер: создаёт секцию горячих клавиш с заголовком и списком биндов.
     * Эквивалент структуры:
     *   <div class="help-keys-wrapper">
     *     <div class="help-st">...</div>
     *     <div class="help-keys"><div>...</div><div>...</div></div>
     *   </div>
     * 
     * @param {string} titleKey - Ключ перевода для заголовка секции.
     * @param {string[]} keysList - Массив ключей перевода для отдельных горячих клавиш.
     * @returns {HTMLDivElement} Готовая секция с клавишами.
     */
    function buildKeysSection(titleKey, keysList) {
      var wrapper = document.createElement('div');
      wrapper.className = 'help-keys-wrapper';
      
      var st = document.createElement('div');
      st.className = 'help-st';
      st.textContent = translate(titleKey);
      wrapper.appendChild(st);
      
      var keys = document.createElement('div');
      keys.className = 'help-keys';
      
      for (var i = 0; i < keysList.length; i++) {
        var row = document.createElement('div');
        row.textContent = translate(keysList[i]);
        keys.appendChild(row);
      }
      
      wrapper.appendChild(keys);
      return wrapper;
    }

    // --- Построение основных секций справки ---
    body.appendChild(buildSection('seg.local', 'help.local'));
    body.appendChild(buildSection('seg.world', 'help.world'));
    body.appendChild(buildSection('seg.seren', 'help.seren'));
    body.appendChild(buildBox('help.philosophy'));
    body.appendChild(buildBox('help.gestures'));
    body.appendChild(buildKeysSection('help.keys', ['help.k1', 'help.k2']));

    // --- Онбординг-чекбокс (только при первом запуске) ---
    var checkbox = null;
    if (showOnboarding) {
      var row = document.createElement('label');
      row.className = 'onb-row';
      
      checkbox = document.createElement('input');
      checkbox.type = 'checkbox';
      row.appendChild(checkbox);
      
      var span = document.createElement('span');
      span.textContent = translate('onb.dontshow');
      row.appendChild(span);
      
      body.appendChild(row);
    }

    // --- Кнопки футера модального окна ---
    var buttons = [];
    if (showOnboarding) {
      buttons.push({
        text: translate('btn.gotit'),
        primary: true,
        onClick: function() {
          if (checkbox && checkbox.checked) {
            Config.set('onboarded', true);
            Config.save();
          }
          Modal.close();
        }
      });
    } else {
      buttons.push({
        text: translate('btn.close'),
        primary: true,
        onClick: function() { Modal.close(); }
      });
    }

    Modal.open({
      title: translate('help.title'),
      body: body,
      buttons: buttons
    });
  }

  /**
   * @typedef {Object} BusHandlerRecord
   * @description Запись о зарегистрированном обработчике шины для последующей отписки.
   * @property {string} event - Имя события.
   * @property {function(*): void} fn - Ссылка на функцию-обработчик.
   */

  /**
   * Массив всех обработчиков шины, зарегистрированных в App.Events,
   * для массового удаления при cleanup() (например, перед refreshUI).
   * @type {BusHandlerRecord[]}
   */
  var busHandlers = [];

  /**
   * Привязывает первичные DOM-события и глобальные горячие клавиши,
   * подписывается на ключевые события шины (i18n:change, ai:progress,
   * editor:search-request, editor:send-complete).
   * 
   * Горячие клавиши:
   * - Escape: закрытие модальных окон.
   * - '/': перевод фокуса на главный редактор (игнорируется, если фокус уже в input/textarea).
   * 
   * @returns {void}
   */
  function bindEvents() {
    // Переключение вкладок (Поток / База)
    document.querySelectorAll('.btab-b').forEach(function(b) {
      b.onclick = function() { switchView(b.getAttribute('data-v')); };
    });

    // Открытие меню настроек
    var menuBtn = document.getElementById('btn-menu');
    if (menuBtn) menuBtn.onclick = openMenu;

    // Глобальные горячие клавиши
    document.addEventListener('keydown', function(e) {
      // Закрытие модальных окон по Escape
      if (e.key === 'Escape') {
        Modal.close();
      }
      
      // Быстрый фокус на редактор по '/'
      if (e.key === '/') {
        var activeEl = document.activeElement;
        // Игнорируем, если пользователь уже печатает в каком-либо поле ввода
        var isEditable = activeEl && (
          activeEl.tagName === 'INPUT' || 
          activeEl.tagName === 'TEXTAREA' || 
          activeEl.isContentEditable
        );
        
        if (!isEditable) {
          var editor = document.getElementById('ed-ta');
          if (editor) {
            e.preventDefault();
            editor.focus();
          }
        }
      }
    });

    // Подписка на смену языка: требуется полный пересбор UI
    var i18nHandler = function() { refreshUI(); };
    Bus.on('i18n:change', i18nHandler);
    busHandlers.push({ event: 'i18n:change', fn: i18nHandler });

    // Подписка на прогресс загрузки AI модели
    var aiProgressHandler = function(payload) {
      if (Progress && payload && typeof payload.pct === 'number') {
        Progress.update(payload.pct);
      }
    };
    Bus.on('ai:progress', aiProgressHandler);
    busHandlers.push({ event: 'ai:progress', fn: aiProgressHandler });

    // Подписка на запрос поиска из редактора (debounce уже выполнен в EditorComponent)
    uiState.editorSearchHandler = function(payload) {
      var force = payload && payload.force === true;
      executeSearch(force);
    };
    Bus.on('editor:search-request', uiState.editorSearchHandler);
    busHandlers.push({ event: 'editor:search-request', fn: uiState.editorSearchHandler });

    // Подписка на успешное завершение отправки заметки (нужно обновить списки)
    uiState.editorSendHandler = function() {
      executeSearch();
    };
    Bus.on('editor:send-complete', uiState.editorSendHandler);
    busHandlers.push({ event: 'editor:send-complete', fn: uiState.editorSendHandler });
  }

  /**
   * Устанавливает глобальные обработчики окна:
   * - resize, focusin, focusout, orientationchange: для корректной высоты 100vh на мобильных
   *   (обновление CSS-переменной --vh).
   * - beforeunload: предупреждение при закрытии вкладки с несохранённым текстом в редакторе.
   * 
   * Предварительно снимает старые обработчики для избежания дублирования при refreshUI().
   * 
   * @returns {void}
   */
  function setupWindowListeners() {
    var handlers = uiState.windowHandlers;

    // Очистка старых обработчиков
    if (handlers.resize) window.removeEventListener('resize', handlers.resize);
    if (handlers.focusin) window.removeEventListener('focusin', handlers.focusin);
    if (handlers.focusout) window.removeEventListener('focusout', handlers.focusout);
    if (handlers.orientationchange) window.removeEventListener('orientationchange', handlers.orientationchange);
    if (handlers.beforeunload) window.removeEventListener('beforeunload', handlers.beforeunload);

    /**
     * Вычисляет 1% высоты viewport и сохраняет в CSS-переменную --vh.
     * Это решает проблему "прыгающего" 100vh в мобильных браузерах (Safari, Chrome)
     * при появлении/исчезновении адресной строки.
     */
    var setVH = function() {
      var vh = window.innerHeight * 0.01;
      document.documentElement.style.setProperty('--vh', vh + 'px');
    };

    handlers.resize = setVH;
    handlers.focusin = setVH;
    handlers.focusout = setVH;
    handlers.orientationchange = function() { setTimeout(setVH, 100); };

    handlers.beforeunload = function(e) {
      try {
        var text = EditorComponent.getValue();
        if (text && text.trim().length > 0) {
          e.preventDefault();
          e.returnValue = ''; // Требуется для совместимости со старыми браузерами
        }
      } catch (_) { /* ignore */ }
    };

    // Привязка новых обработчиков
    window.addEventListener('resize', handlers.resize);
    window.addEventListener('focusin', handlers.focusin);
    window.addEventListener('focusout', handlers.focusout);
    window.addEventListener('orientationchange', handlers.orientationchange);
    window.addEventListener('beforeunload', handlers.beforeunload);

    // Первичный расчет --vh
    setVH();
  }

  /**
   * Снимает все глобальные обработчики окна и шины событий.
   * Вызывается перед refreshUI() или при уничтожении приложения.
   * Гарантирует отсутствие утечек памяти и "зомби-обработчиков".
   * 
   * @returns {void}
   */
  function cleanup() {
    // Отписка от прогресса AI (он использует отдельный механизм подписки)
    if (uiState.progressHandler) {
      AI.offProgress(uiState.progressHandler);
      uiState.progressHandler = null;
    }
    
    // Снятие window listeners
    var handlers = uiState.windowHandlers;
    if (handlers.resize) window.removeEventListener('resize', handlers.resize);
    if (handlers.focusin) window.removeEventListener('focusin', handlers.focusin);
    if (handlers.focusout) window.removeEventListener('focusout', handlers.focusout);
    if (handlers.orientationchange) window.removeEventListener('orientationchange', handlers.orientationchange);
    if (handlers.beforeunload) window.removeEventListener('beforeunload', handlers.beforeunload);

    handlers.resize = null;
    handlers.focusin = null;
    handlers.focusout = null;
    handlers.orientationchange = null;
    handlers.beforeunload = null;

    // Массовая отписка от шины событий
    for (var i = 0; i < busHandlers.length; i++) {
      Bus.off(busHandlers[i].event, busHandlers[i].fn);
    }
    busHandlers = [];
    
    // Очистка ссылок на специфичные обработчики
    uiState.editorSearchHandler = null;
    uiState.editorSendHandler = null;
  }
<!-- NOOMIUM_MODULE_END App.Events -->
