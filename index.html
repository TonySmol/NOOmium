  var AuthService = DI.resolve('AuthService');

  /**
   * Главная функция загрузки приложения:
   * 1. Показывает прогресс-бар загрузки AI.
   * 2. Загружает ML-модель в Worker'е.
   * 3. Запрашивает пароль у пользователя (создание нового ключа или расшифровка).
   * 4. Инициализирует сеть Nostr.
   * 5. При первом запуске показывает онбординг.
   * @returns {void}
   */
  function bootApp() {
    I18n.addDict('ru', { 'btn.forgot': 'Забыли пароль?' });
    I18n.addDict('en', { 'btn.forgot': 'Forgot password?' });

    Progress.show();

    var aiLoaded = false;
    var netInitialized = false;

    /**
     * Проверяет, завершены ли загрузка AI и инициализация сети,
     * и показывает онбординг при первом запуске.
     * @returns {void}
     */
    function checkOnboarding() {
      if (aiLoaded && netInitialized && !Config.get('onboarded', false)) {
        openHelp(true);
      }
    }

    AI.load().then(function() {
      Progress.hide();
      aiLoaded = true;
      requestAuth();
      checkOnboarding();
    }).catch(function(err) {
      Progress.hide();
      if (Logger) Logger.error('AI', String(err && err.message || err));
      aiLoaded = true;
      checkOnboarding();
    });

    /**
     * Пытается инициализировать сеть с заданным паролем.
     * @param {string} password - Пароль для расшифровки ключа.
     * @returns {Promise<void>}
     */
    function tryInit(password) {
      return Net.init(function() { executeSearch(); }, password).then(function() {
        netInitialized = true;
        StateManager.setState({ netAuthorized: true });
        checkOnboarding();
      }).catch(function(err) {
        if (Logger) Logger.error('Net', String(err && err.message || err));
      });
    }

    /**
     * Запрашивает у пользователя пароль (создание нового или ввод существующего).
     * Рекурсивно вызывает себя при неверном пароле.
     * @param {function(): void} [onSuccess] - Колбэк после успешной авторизации.
     * @returns {void}
     */
    function requestAuth(onSuccess) {
      if (AuthService.needsNewKey()) {
        promptNewPassword(function(pwd) {
          AuthService.createNew(pwd, function() {
            tryInit(pwd).then(function() {
              if (typeof onSuccess === 'function') onSuccess();
            });
          });
        });
      } else {
        promptExistingPassword(function(pwd) {
          AuthService.unlock(pwd,
            function() {
              tryInit(pwd).then(function() {
                if (typeof onSuccess === 'function') onSuccess();
              });
            },
            function() {
              toast(translate('auth.wrong_password'), 'err');
              requestAuth(onSuccess);
            },
            function() {
              showResetModal();
            }
          );
        });
      }
    }

    /**
     * Показывает модалку сброса данных при превышении лимита попыток ввода пароля.
     * @returns {void}
     */
    function showResetModal() {
      var body = document.createElement('div');
      body.innerHTML = '<p class="reset-modal-text">' + translate('auth.reset_body') + '</p>';
      Modal.open({
        title: translate('auth.reset_title'),
        body: body,
        buttons: [
          {
            text: translate('auth.reset_btn'),
            danger: true,
            primary: true,
            onClick: function() {
              AuthService.resetStorage().then(function() {
                location.reload(true);
              });
            }
          }
        ]
      });
    }

    /**
     * Показывает модалку создания нового пароля (первый запуск).
     * @param {function(string): void} callback - Вызывается с введённым паролем.
     * @returns {void}
     */
    function promptNewPassword(callback) {
      var body = document.createElement('div');
      body.innerHTML = '<div class="fg"><label class="fl">' + translate('auth.new_password_label1') + '</label><input type="password" class="fi-input" id="pwd1" /></div>' +
                       '<div class="fg"><label class="fl">' + translate('auth.new_password_label2') + '</label><input type="password" class="fi-input" id="pwd2" /></div>';
      var errorEl = document.createElement('div');
      errorEl.className = 'danger-text fs-12 mt-8';
      body.appendChild(errorEl);

      Modal.open({

              if (p1 !== p2) { errorEl.textContent = translate('auth.new_password_mismatch'); return; }
              Modal.close();
              callback(p1);
            }
          }

      });

    /**
     * Показывает модалку ввода пароля (повторный запуск).
     * Содержит кнопку сброса хранилища при забытом пароле.
     * @param {function(string): void} callback - Вызывается с введённым паролем.
     * @returns {void}
     */
    function promptExistingPassword(callback) {
      var body = document.createElement('div');
      body.innerHTML = '<div class="fg"><label class="fl">' + translate('auth.existing_password_label') + '</label><input type="password" class="fi-input" id="pwd1" /></div>';

      var forgotBtn = document.createElement('button');
      forgotBtn.type = 'button';
      forgotBtn.className = 'nv-act danger full-width mt-10 inline-flex-center';
      forgotBtn.textContent = translate('btn.reset_storage');
      forgotBtn.onclick = function() {
        if (!confirm(translate('reset_storage.confirm'))) return;
        Modal.close();
        AuthService.resetStorage().then(function() {
          location.reload(true);
        });
      };
      body.appendChild(forgotBtn);

      var errorEl = document.createElement('div');
      errorEl.className = 'danger-text fs-12 mt-8';
      body.appendChild(errorEl);

      Modal.open({
        title: translate('auth.existing_password_title'),
        body: body,
        buttons: [
          {
            text: translate('auth.existing_password_btn'),
            primary: true,
            onClick: function() {
              var p1 = document.getElementById('pwd1').value;
              if (!p1) { errorEl.textContent = translate('auth.existing_password_empty'); return; }
              Modal.close();
              callback(p1);
            }
          }
        ]
      });
    }

    /**
     * Колбэк для запроса авторизации сети из SearchService (при попытке отправить в world).
     * @param {function(): void} onSuccess - Вызывается после успешной авторизации.
     * @returns {void}
     */
    function requestNetworkAuth(onSuccess) {
      if (StateManager.getState().netAuthorized) {
        if (typeof onSuccess === 'function') onSuccess();
        return;
      }
      requestAuth(onSuccess);
    }

    StateManager.setState({ requestNetworkAuth: requestNetworkAuth });
  }

  /**
   * Точка монтирования приложения: создаёт корневой элемент,
   * рендерит разметку, инициализирует все UI-компоненты и запускает bootApp().
   * При ошибке показывает экран с кнопкой перезагрузки.
   * @returns {void}
   */
  function mountApp() {
    try {
      cleanup();

      var root = document.getElementById('app-root');
      if (!root) {
        root = document.createElement('div');
        root.id = 'app-root';
        document.body.appendChild(root);
      }
      document.body.classList.add('show-app');
      root.innerHTML = buildMarkup();
      setupWindowListeners();
      bindEvents();

      try { DI.resolve('HeaderStatusComponent').init(); } catch (e) {
        if (Logger) Logger.warn('HeaderStatusComponent init failed', String(e));
      }
      try { DI.resolve('OfflineBarComponent').init(); } catch (e) {
        if (Logger) Logger.warn('OfflineBarComponent init failed', String(e));
      }
      try { EditorComponent.init(); } catch (e) {
        if (Logger) Logger.warn('EditorComponent init failed', String(e));
      }
      try { DI.resolve('StreamViewComponent').init(); } catch (e) {
        if (Logger) Logger.warn('StreamViewComponent init failed', String(e));
      }
      try { DI.resolve('BaseViewComponent').init(); } catch (e) {
        if (Logger) Logger.warn('BaseViewComponent init failed', String(e));
      }

      try { SearchService.init(); } catch (e) {
        if (Logger) Logger.warn('SearchService init failed', String(e));
      }

      bootApp();
      if (Logger) Logger.info('App mounted');
    } catch (err) {
      console.error('App mount failed:', err);
      var root = document.getElementById('app-root');
      if (root) {
        root.textContent = '';
        var wrapper = document.createElement('div');
        wrapper.className = 'error-wrapper';

        var heading = document.createElement('h2');
        heading.className = 'error-heading';
        heading.textContent = 'NOOmium failed to start';

        var message = document.createElement('p');
        message.className = 'error-message';
        message.textContent = String(err && err.message || err);

        var reloadBtn = document.createElement('button');
        reloadBtn.className = 'error-reload-btn';
        reloadBtn.textContent = 'Reload';
        reloadBtn.onclick = function() { location.reload(); };

        wrapper.appendChild(heading);
        wrapper.appendChild(message);
        wrapper.appendChild(reloadBtn);
        root.appendChild(wrapper);
        document.body.classList.add('show-app');
      }
    }
  }

  /**

  function bootstrap() {

   * Логика управления Service Worker'ом для PWA-обновлений.
   *
   * **Жизненный цикл обновления:**
   * 1. При загрузке страницы регистрируется SW с версией из meta-тега `app-version`
   *    (кеш-бастинг для форсирования обновления при смене версии).
   * 2. Если уже есть ожидающий SW (от предыдущей сессии) — ему отправляется
   *    команда SKIP_WAITING для немедленной активации.
   * 3. При обнаружении новой версии SW (updatefound):
   *    - Дожидаемся его установки (state === 'installed')
   *    - Если есть активный контроллер, отправляем SKIP_WAITING
   *    - Перезагружаем страницу для применения новой версии
   * 4. Обработчик `controllerchange` перезагружает страницу, когда новый SW
   *    берёт контроль над клиентом (защита от работы со старой версией кеша).
   *
   * Регистрация SW может не сработать в приватном режиме или при открытии
   * через `file://` — это не критично, приложение продолжает работать.
   *
   * @returns {void}
   */
  (function() {
    if (!('serviceWorker' in navigator)) return;

    var appVersionMeta = document.querySelector('meta[name="app-version"]');
    var appVersion = appVersionMeta ? appVersionMeta.getAttribute('content') : '0';

    navigator.serviceWorker.register('/sw.js?v=' + encodeURIComponent(appVersion))
      .then(function(reg) {
        if (reg.waiting) {
          reg.waiting.postMessage({ type: 'SKIP_WAITING' });
        }

        reg.addEventListener('updatefound', function() {
          var installing = reg.installing;
          if (installing) {
            installing.addEventListener('statechange', function() {
              if (installing.state === 'installed' && navigator.serviceWorker.controller) {

        console.warn('SW registration failed:', err);

      if (refreshing) return;
